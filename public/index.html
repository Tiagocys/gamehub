  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    await (window.__NAVBAR_READY__ || Promise.resolve());
    const i18n = window.__I18N__ || { t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const formatMessage = (key, fallback, params = {}) => Object.entries(params).reduce(
      (message, [paramKey, value]) => message.replaceAll(`{${paramKey}}`, String(value ?? "")),
      t(key, fallback),
    );

    const env = window.__ENV || {};
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";
    const R2_PUBLIC_URL = env.R2_PUBLIC_URL || "";
    const R2_BUCKET = env.R2_BUCKET || "";

    const homeLayout = document.querySelector("main.home-layout");
    const authBtn = document.getElementById("auth-btn");
    const userMenu = document.getElementById("user-menu");
    const avatarBtn = document.getElementById("avatar-btn");
    const avatarImg = document.getElementById("avatar-img");
    const logoutBtn = document.getElementById("logout-btn");
    const menuCreateListing = document.getElementById("menu-create-listing");
    const profileLink = document.getElementById("profile-link");
    const searchForm = document.getElementById("game-search");
    const searchInput = document.getElementById("game-search-input");
    const searchSuggestions = document.getElementById("search-suggestions");
    const createListingBtn = document.getElementById("create-listing-btn");
    const homeSidebar = document.getElementById("home-sidebar");
    const homeSidebarToggle = document.getElementById("home-sidebar-toggle");
    const sidebarUsersSection = document.getElementById("sidebar-users-section");
    const sidebarUsers = document.getElementById("sidebar-users");
    const sidebarUsersEmpty = document.getElementById("sidebar-users-empty");
    const sidebarGames = document.getElementById("sidebar-games");
    const sidebarGamesEmpty = document.getElementById("sidebar-games-empty");
    const homeFeaturedGamesSection = document.getElementById("home-featured-games-section");
    const homeFeaturedGamesRow = document.getElementById("home-featured-games-row");
    const homeGameSections = document.getElementById("home-game-sections");
    const homeGameSectionsEmpty = document.getElementById("home-game-sections-empty");

    const homeSidebarKicker = document.querySelector(".home-sidebar-kicker");
    const homeSidebarTitle = document.querySelector(".home-sidebar-titlebar h2");
    const sidebarUsersTitle = document.querySelector("#sidebar-users")?.previousElementSibling?.querySelector("h3");
    const sidebarGamesTitle = document.querySelector("#sidebar-games")?.previousElementSibling?.querySelector("h3");
    const homeRecommendedGamesTitle = document.querySelector(".home-feed-sections .section-header h2");

    let supabase;
    let currentUser = null;
    let games = [];
    let allSortedGames = [];
    let activeListingsCatalog = [];
    let searchablePlayers = [];
    let serverMap = new Map();
    let recommendationCountMap = new Map();
    let sellerRatingMap = new Map();
    let serverFollowerCountMap = new Map();
    let followedGameIds = new Set();
    const SIDEBAR_USERS_LIMIT = 8;
    const SIDEBAR_GAMES_LIMIT = 8;
    const HOME_GAME_SECTION_LIMIT = 6;
    const HOME_GAME_CARD_LIMIT = 6;
    const HIGHLIGHT_IMPRESSION_WINDOW_MS = 120 * 1000;
    const HIGHLIGHT_IMPRESSION_STORAGE_PREFIX = "gimerr-highlight-impression:";
    const SERVER_FEED_IMPRESSION_WINDOW_MS = 120 * 1000;
    const SERVER_FEED_IMPRESSION_STORAGE_PREFIX = "gimerr-server-feed-impression:";
    const SERVER_FEED_VIEWER_KEY_STORAGE = "gimerr-server-feed-viewer-key";
    let avatarLoaded = false;
    let homeHighlightImpressionObserver = null;
    let homeHighlightImpressionFlushTimer = null;
    const trackedHomeHighlightImpressions = new Map();
    const pendingHomeHighlightImpressionIds = new Set();
    let homeServerBoostImpressionObserver = null;
    const pendingServerBoostImpressionIds = new Set();
    let selectedHomeBoostedServerIds = [];
    let selectedSidebarBoostedServerIds = [];
    const homeFeedRowStates = new Map();
    let homeSectionFeedState = null;
    let homeSectionFeedScrollBound = false;
    let sidebarCollapsed = window.innerWidth < 960;
    let sidebarAutoManaged = true;
    if (avatarImg) {
      avatarImg.referrerPolicy = "no-referrer";
      avatarImg.addEventListener("error", () => {
        if (avatarImg.dataset.fallbackApplied === "1") return;
        avatarImg.dataset.fallbackApplied = "1";
        avatarImg.src = "img/avatar.svg";
      });
    }

    if (homeSidebarKicker) homeSidebarKicker.textContent = t("home.explore", "Explore");
    if (homeSidebarTitle) homeSidebarTitle.textContent = t("home.discoveries", "Discoveries");
    if (sidebarUsersTitle) sidebarUsersTitle.textContent = t("home.recommended_sellers", "Recommended sellers");
    if (sidebarGamesTitle) sidebarGamesTitle.textContent = t("home.recommended_games_sidebar", "Suggested games");
    if (sidebarUsersEmpty) sidebarUsersEmpty.textContent = t("home.no_users", "No user suggestions right now.");
    if (sidebarGamesEmpty) sidebarGamesEmpty.textContent = t("home.no_games", "No games with active listings right now.");
    if (homeRecommendedGamesTitle) homeRecommendedGamesTitle.textContent = t("home.recommended_games", "Recommended games");
    if (homeGameSectionsEmpty) homeGameSectionsEmpty.textContent = t("home.no_feed", "No active listings to build the feed.");

    function getSidebarToggleIconName() {
      const isMobile = window.matchMedia("(max-width: 900px)").matches;
      if (isMobile) {
        return sidebarCollapsed ? "down" : "up";
      }
      return sidebarCollapsed ? "right" : "left";
    }

    function ensureClient() {
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        showSuggestionMessage(t("home.configure_env", "Configure SUPABASE_URL and SUPABASE_ANON_KEY in public/env.js."));
        authBtn.disabled = true;
        throw new Error("Supabase is not configured");
      }
      if (!supabase) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storageKey: "gimerr-auth-token",
          },
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user || null;
          updateAuthUI();
        });
      }
      return supabase;
    }

    function updateAuthUI() {
      if (!authBtn) return;
      authBtn.disabled = false;
      if (currentUser) {
        authBtn.style.display = "none";
        if (userMenu) userMenu.style.display = "inline-flex";
        if (profileLink) profileLink.href = `user?id=${encodeURIComponent(currentUser.id)}`;
        loadUserAvatar();
        if (createListingBtn) createListingBtn.style.display = "inline-flex";
        if (menuCreateListing) menuCreateListing.style.display = "";
        return;
      }
      authBtn.style.display = "inline-flex";
      if (userMenu) userMenu.style.display = "none";
      if (profileLink) profileLink.href = "profile.html";
      if (createListingBtn) createListingBtn.style.display = "none";
      if (menuCreateListing) menuCreateListing.style.display = "none";
      avatarLoaded = false;
      markAvatarReady();
    }

    async function setAvatarImage(src) {
      if (!avatarImg) return;
      const normalizedSrc = typeof src === "string" ? src.trim() : "";
      const finalSrc = normalizedSrc && normalizedSrc !== "null" && normalizedSrc !== "undefined"
        ? normalizedSrc
        : "img/avatar.svg";
      avatarImg.dataset.fallbackApplied = "0";
      avatarImg.src = finalSrc;
      try {
        await avatarImg.decode();
      } catch (_err) {
        if (finalSrc !== "img/avatar.svg") {
          avatarImg.src = "img/avatar.svg";
          try {
            await avatarImg.decode();
          } catch (_innerErr) {
            // ignore
          }
        }
      } finally {
        markAvatarReady();
      }
    }

    async function loadUserAvatar() {
      if (!avatarImg || !currentUser || avatarLoaded) return;
      try {
        ensureClient();
        const { data } = await supabase
          .from("users")
          .select("avatar_url")
          .eq("id", currentUser.id)
          .single();
        let avatar = data?.avatar_url;
        if (!avatar) {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
        }
        await setAvatarImage(avatar);
      } catch (_err) {
        try {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          const avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
          await setAvatarImage(avatar);
        } catch (_innerErr) {
          await setAvatarImage("img/avatar.svg");
        }
      } finally {
        avatarLoaded = true;
      }
    }

    async function handleAuthClick() {
      try {
        await startOAuthLikeNavbar();
      } catch (err) {
        console.error(err);
        showSuggestionMessage(err?.message || "Authentication error.");
        authBtn.disabled = false;
      }
    }

    async function startOAuthLikeNavbar(targetPath = null) {
      const normalizedPath = targetPath
        ? (String(targetPath).startsWith("/") ? String(targetPath) : `/${String(targetPath)}`)
        : `${window.location.pathname}${window.location.search || ""}`;
      window.__OPEN_AUTH_GATEWAY__?.(normalizedPath);
    }

    async function bootstrapAuth() {
      try {
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        updateAuthUI();
      } catch (err) {
        console.error(err);
        showSuggestionMessage("Error loading session.");
        markAvatarReady();
      }
    }

    function mapServerRow(row) {
      return {
        id: row.id,
        name: row.name,
        description: row.description,
        cover_url: row.banner_url || row.cover_url || row.image || row.image_url || row.photo,
        website: row.website || row.site || row.official_site,
        category: row.category || row.type || row.game_type || "Game",
        feed_highlight_status: row.feed_highlight_status || "none",
        feed_highlight_started_at: row.feed_highlight_started_at || null,
      };
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeSearchText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function matchesPrefix(value, term) {
      const normalizedValue = normalizeSearchText(value);
      const normalizedTerm = normalizeSearchText(term);
      if (!normalizedValue || !normalizedTerm) return false;
      if (normalizedValue.startsWith(normalizedTerm)) return true;
      return normalizedValue.split(/\s+/).some((part) => part.startsWith(normalizedTerm));
    }

    function parseStoragePath(urlString) {
      try {
        const url = new URL(urlString);
        const marker = "/storage/v1/object/";
        const idx = url.pathname.indexOf(marker);
        if (idx === -1) return null;
        const rest = url.pathname.substring(idx + marker.length);
        const parts = rest.split("/").filter(Boolean);
        if (parts.length < 2) return null;
        let bucket = parts[0];
        let pathParts = parts.slice(1);
        if (bucket === "public" || bucket === "authenticated" || bucket === "sign") {
          bucket = parts[1];
          pathParts = parts.slice(2);
        }
        if (!bucket || pathParts.length === 0) return null;
        return { bucket, path: pathParts.join("/") };
      } catch (_err) {
        return null;
      }
    }

    function normalizeR2PublicUrl(urlString) {
      try {
        const url = new URL(urlString);
        if (R2_PUBLIC_URL) {
          const publicHost = new URL(R2_PUBLIC_URL).host;
          const accountId = url.hostname.split(".")[1] || "";
          const expectedBucketHost = R2_BUCKET && accountId ? `${R2_BUCKET}.${accountId}.r2.dev` : "";
          if (url.hostname === expectedBucketHost && url.hostname !== publicHost) {
            return `${R2_PUBLIC_URL.replace(/\/$/, "")}${url.pathname}`;
          }
        }
        if (!url.hostname.endsWith(".r2.cloudflarestorage.com")) return urlString;
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length === 0) return urlString;
        const accountId = url.hostname.split(".")[0];
        let bucket = R2_BUCKET;
        let keyParts = parts;
        if (bucket) {
          if (parts[0] === bucket) keyParts = parts.slice(1);
        } else {
          bucket = parts[0];
          keyParts = parts.slice(1);
        }
        if (!bucket || keyParts.length === 0) return urlString;
        const base = R2_PUBLIC_URL ? R2_PUBLIC_URL.replace(/\/$/, "") : `https://${bucket}.${accountId}.r2.dev`;
        return `${base}/${keyParts.join("/")}`;
      } catch (_err) {
        return urlString;
      }
    }

    async function resolveImageUrl(urlString) {
      if (!urlString) return "";
      const normalized = normalizeR2PublicUrl(urlString);
      if (!normalized.includes(SUPABASE_URL) || !normalized.includes("/storage/v1/object/")) {
        return normalized;
      }
      const parsed = parseStoragePath(normalized);
      if (!parsed) return normalized;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || normalized;
      } catch (_err) {
        return normalized;
      }
    }

    function buildPopularityMap(listings) {
      const map = new Map();
      (listings || []).forEach((row) => {
        const key = String(row?.server_id || "").trim();
        if (!key) return;
        map.set(key, (map.get(key) || 0) + 1);
      });
      return map;
    }

    function buildHighlightedServerSet(listings) {
      const highlightedServerIds = new Set();
      (listings || []).forEach((row) => {
        if (row?.highlight_status !== "active") return;
        const key = String(row?.server_id || "").trim();
        if (!key) return;
        highlightedServerIds.add(key);
      });
      return highlightedServerIds;
    }

    function buildFeedBoostedServerSet(servers) {
      const boostedServerIds = new Set();
      (servers || []).forEach((row) => {
        if (String(row?.feed_highlight_status || "none") !== "active") return;
        const key = String(row?.id || "").trim();
        if (!key) return;
        boostedServerIds.add(key);
      });
      return boostedServerIds;
    }

    function getLastHighlightImpressionAt(listingId) {
      try {
        return Number(localStorage.getItem(`${HIGHLIGHT_IMPRESSION_STORAGE_PREFIX}${listingId}`) || 0);
      } catch (_err) {
        return Number(trackedHomeHighlightImpressions.get(listingId) || 0);
      }
    }

    function setLastHighlightImpressionAt(listingId, timestamp) {
      trackedHomeHighlightImpressions.set(listingId, timestamp);
      try {
        localStorage.setItem(`${HIGHLIGHT_IMPRESSION_STORAGE_PREFIX}${listingId}`, String(timestamp));
      } catch (_err) {
        // ignore
      }
    }

    function getOrCreateServerFeedViewerKey() {
      try {
        const existing = localStorage.getItem(SERVER_FEED_VIEWER_KEY_STORAGE);
        if (existing) return existing;
        const nextValue = typeof crypto?.randomUUID === "function"
          ? crypto.randomUUID()
          : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        localStorage.setItem(SERVER_FEED_VIEWER_KEY_STORAGE, nextValue);
        return nextValue;
      } catch (_err) {
        return `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }
    }

    function getLastServerFeedImpressionAt(serverId) {
      try {
        return Number(localStorage.getItem(`${SERVER_FEED_IMPRESSION_STORAGE_PREFIX}${serverId}`) || 0);
      } catch (_err) {
        return 0;
      }
    }

    function setLastServerFeedImpressionAt(serverId, timestamp) {
      try {
        localStorage.setItem(`${SERVER_FEED_IMPRESSION_STORAGE_PREFIX}${serverId}`, String(timestamp));
      } catch (_err) {
        // ignore
      }
    }

    function shuffleArray(items) {
      const copy = [...(items || [])];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sortListingsForHomeRow(listings) {
      const ordered = [...(Array.isArray(listings) ? listings : [])]
        .sort((a, b) => new Date(b.created_at || 0).getTime() - new Date(a.created_at || 0).getTime());
      const highlighted = ordered.filter((listing) => String(listing?.highlight_status || "none") === "active");
      const regular = ordered.filter((listing) => String(listing?.highlight_status || "none") !== "active");
      return [...shuffleArray(highlighted), ...regular];
    }

    function selectHomeBoostedServers() {
      const boosted = allSortedGames.filter((game) => String(game?.feed_highlight_status || "none") === "active");
      if (boosted.length === 0) {
        selectedHomeBoostedServerIds = [];
        selectedSidebarBoostedServerIds = [];
        return;
      }
      const shuffledBoosted = shuffleArray(boosted);
      selectedHomeBoostedServerIds = shuffledBoosted
        .map((game) => String(game?.id || "").trim())
        .filter(Boolean);
      selectedSidebarBoostedServerIds = shuffledBoosted
        .slice(0, 1)
        .map((game) => String(game?.id || "").trim())
        .filter(Boolean);
    }

    function makeHomeFeedRowKey(prefix, value) {
      return `${prefix}:${String(value || "").trim()}`;
    }

    function resetHomeFeedRowStates() {
      homeFeedRowStates.clear();
    }

    function resetHomeSectionFeedState() {
      homeSectionFeedState = null;
    }

    function getHomeFeedRowElement(rowKey) {
      if (!rowKey) return null;
      return document.querySelector(`[data-row-key="${CSS.escape(String(rowKey))}"]`);
    }

    function estimateHomeFeedRowBatchSize(row) {
      const width = row?.clientWidth
        || row?.parentElement?.clientWidth
        || window.innerWidth
        || document.documentElement.clientWidth
        || 1024;
      const isFeatured = row?.classList?.contains("home-game-row-featured");
      const cardMinWidth = isFeatured ? 220 : 220;
      const gap = 14;
      const visibleCards = Math.max(1, Math.floor((width + gap) / (cardMinWidth + gap)));
      return Math.max(2, visibleCards + 1);
    }

    function estimateHomeSectionBatchSize() {
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 900;
      const estimatedSectionHeight = 320;
      const visibleSections = Math.max(1, Math.floor(viewportHeight / estimatedSectionHeight));
      return Math.max(2, visibleSections + 1);
    }

    async function renderFeaturedBoostCards(gamesBatch) {
      return gamesBatch.map((game) => {
        const listings = (activeListingsCatalog || [])
          .filter((listing) => String(listing?.server_id || "").trim() === String(game?.id || "").trim())
          .sort((a, b) => new Date(b.created_at || 0).getTime() - new Date(a.created_at || 0).getTime());
        const subtitleText = listings.length > 0
          ? formatMessage("home.active_listings_count", "{count} active listings", { count: listings.length })
          : t("home.no_active_listings_yet", "No active listings yet");
        const gameId = String(game?.id || "").trim();
        const gameName = escapeHtml(game?.name || t("home.listing_untitled", "Untitled listing"));
        const coverUrl = game?.cover_url ? encodeURI(game.cover_url) : "";
        return `
          <article
            class="home-feed-card home-feed-card-game-boost"
            data-server-feed-boost-track="1"
            data-server-id="${escapeHtml(gameId)}">
            <div class="home-feed-card-media${coverUrl ? "" : " empty"}">
              <button
                class="btn btn-ghost home-feed-card-follow-chip${isFollowedGame(gameId) ? " is-following" : ""}"
                type="button"
                data-action="toggle-follow"
                data-game-id="${escapeHtml(gameId)}">
                ${escapeHtml(isFollowedGame(gameId) ? t("home.following", "Following") : t("home.follow_game", "Follow game"))}
              </button>
              <a class="home-feed-card-media-link" href="game?id=${encodeURIComponent(gameId)}" aria-label="${gameName}">
                ${coverUrl
                  ? `<img src="${coverUrl}" alt="${gameName}" loading="lazy" />`

    }

    function buildHomeFeedGames(gamesList, limit = HOME_GAME_SECTION_LIMIT) {
      const normalizedLimit = Math.max(0, Number(limit || HOME_GAME_SECTION_LIMIT));
      const items = [...(Array.isArray(gamesList) ? gamesList : [])];
      if (items.length === 0 || normalizedLimit === 0) return [];
      const followedGames = shuffleArray(items.filter((game) => isFollowedGame(game?.id)));
      const otherGames = shuffleArray(items.filter((game) => !isFollowedGame(game?.id)));
      return [...followedGames, ...otherGames].slice(0, normalizedLimit);
    }

    async function renderNextHomeFeedRowBatch(rowKey, batchSizeOverride = 0) {
      const state = homeFeedRowStates.get(rowKey);
      if (!state || state.loading) return;
      const row = getHomeFeedRowElement(rowKey);
      if (!row) return;
      if (state.nextIndex >= state.items.length) return;
      state.loading = true;
      try {
        const batchSize = Math.max(1, Number(batchSizeOverride || state.batchSize || 1));
        const nextItems = state.items.slice(state.nextIndex, state.nextIndex + batchSize);
        const cardMarkup = await state.render(nextItems);
        row.insertAdjacentHTML("beforeend", cardMarkup.join(""));
        state.nextIndex += nextItems.length;
        if (state.nextIndex >= state.items.length) {
          row.dataset.rowExhausted = "1";
        }
        observeHomeHighlightImpressions();
        observeServerFeedBoostImpressions();
      } finally {
        state.loading = false;
      }
    }

    async function bindHomeFeedRowInfiniteLoading() {
      const rows = Array.from(document.querySelectorAll("[data-row-key]"));
      const initialLoads = [];
      rows.forEach((row) => {
        const rowKey = String(row.getAttribute("data-row-key") || "").trim();
        const state = homeFeedRowStates.get(rowKey);
        if (!rowKey || !state) return;
        const initialBatchSize = estimateHomeFeedRowBatchSize(row);
        state.batchSize = Math.max(1, initialBatchSize - 1);
        if (row.dataset.initialized !== "1") {
          row.dataset.initialized = "1";
          initialLoads.push(renderNextHomeFeedRowBatch(rowKey, initialBatchSize));
          row.addEventListener("scroll", () => {
            if (row.dataset.rowExhausted === "1") return;
            const remaining = row.scrollWidth - (row.scrollLeft + row.clientWidth);
            if (remaining <= Math.max(120, row.clientWidth * 0.35)) {
              void renderNextHomeFeedRowBatch(rowKey);
            }
          }, { passive: true });
        }
      });
      await Promise.all(initialLoads);
    }

    async function renderNextHomeSectionBatch(batchSizeOverride = 0) {

              items: rowItems,
              render: renderHomeFeedGameRowItemsBatch,
              nextIndex: 0,
              batchSize: 1,
              loading: false,
            });
          }

          const subtitleText = listings.length > 0

        homeSectionFeedState.nextIndex += nextItems.length;
        if (homeSectionFeedState.nextIndex >= homeSectionFeedState.items.length) {
          homeGameSections.dataset.sectionsExhausted = "1";
        }
        await bindHomeFeedRowInfiniteLoading();
        observeHomeHighlightImpressions();
        observeServerFeedBoostImpressions();

    function bindHomeSectionInfiniteLoading() {
      if (!homeGameSections || homeSectionFeedScrollBound) return;

    async function trackServerFeedImpression(serverId) {
      const normalizedServerId = String(serverId || "").trim();
      if (!normalizedServerId || pendingServerBoostImpressionIds.has(normalizedServerId)) return;
      const now = Date.now();
      const lastTrackedAt = getLastServerFeedImpressionAt(normalizedServerId);
      if (now - lastTrackedAt < SERVER_FEED_IMPRESSION_WINDOW_MS) return;

      pendingServerBoostImpressionIds.add(normalizedServerId);
      try {
        ensureClient();
        const viewerKey = getOrCreateServerFeedViewerKey();
        const { error } = await supabase.functions.invoke("server_feed_impression", {
          body: {
            serverId: normalizedServerId,
            viewerKey,
            pagePath: `${window.location.pathname}${window.location.search || ""}`,
          },
        });
        if (!error) {
          setLastServerFeedImpressionAt(normalizedServerId, now);
        }
      } catch (err) {
        console.error(err);
      } finally {
        pendingServerBoostImpressionIds.delete(normalizedServerId);
      }
    }

    function observeServerFeedBoostImpressions() {
      if (homeServerBoostImpressionObserver) {
        homeServerBoostImpressionObserver.disconnect();
        homeServerBoostImpressionObserver = null;
      }
      const targets = Array.from(document.querySelectorAll("[data-server-feed-boost-track='1']"));
      if (targets.length === 0) return;
      homeServerBoostImpressionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting || entry.intersectionRatio < 0.65) return;
          const serverId = String(entry.target?.dataset?.serverId || "").trim();
          if (!serverId) return;
          trackServerFeedImpression(serverId);
        });
      }, {
        root: null,
        threshold: [0.65],
      });
      targets.forEach((target) => homeServerBoostImpressionObserver.observe(target));
    }

    async function attachRecommendationsScore(listings) {
      const items = Array.isArray(listings) ? listings : [];
      const userIds = Array.from(new Set(
        items
          .map((item) => String(item?.user_id || "").trim())
          .filter(Boolean),
      ));
      if (userIds.length === 0) {
        return items.map((item) => ({ ...item, user_recommendations_count: 0 }));
      }

      const scoreMap = new Map();
      await Promise.all(userIds.map(async (userId) => {
        try {
          const { count, error } = await supabase
            .from("recommendations")
            .select("id", { count: "exact", head: true })
            .eq("user_id", userId);
          if (error) throw error;
          scoreMap.set(userId, Number(count || 0));
        } catch (_err) {
          scoreMap.set(userId, 0);
        }
      }));

      return items.map((item) => ({
        ...item,
        user_recommendations_count: scoreMap.get(String(item?.user_id || "").trim()) || 0,
      }));
    }

    function sortGamesByPopularity(servers, popularityMap) {
      return [...(servers || [])].sort((a, b) => {

        if (countB !== countA) return countB - countA;
        return String(a.name || "").localeCompare(
          String(b.name || ""),
          i18n.locale === "en" ? "en-US" : "pt-BR",
          { sensitivity: "base" },
        );
      });
    }

    function getTopSellerIds(limit = SIDEBAR_USERS_LIMIT) {
      const sellers = new Map();
      activeListingsCatalog.forEach((listing) => {
        const userId = String(listing?.user_id || "").trim();
        if (!userId) return;
        if (currentUser?.id && userId === String(currentUser.id).trim()) return;
        const createdAt = new Date(listing?.created_at || 0).getTime();
        const current = sellers.get(userId);
        const isFollowed = isFollowedGame(listing?.server_id);
        if (!current) {
          sellers.set(userId, {
            userId,
            lastCreatedAt: createdAt,
            followedListingsCount: isFollowed ? 1 : 0,
            totalListingsCount: 1,
          });
          return;
        }
        current.lastCreatedAt = Math.max(current.lastCreatedAt, createdAt);
        current.totalListingsCount += 1;
        if (isFollowed) current.followedListingsCount += 1;
      });
      return Array.from(sellers.values())
        .sort((a, b) => {
          const followedDiff = Number(b.followedListingsCount || 0) - Number(a.followedListingsCount || 0);
          if (followedDiff !== 0) return followedDiff;
          const ratingDiff = getSellerRating(b.userId) - getSellerRating(a.userId);
          if (ratingDiff !== 0) return ratingDiff;
          const scoreDiff = getRecommendationCount(b.userId) - getRecommendationCount(a.userId);
          if (scoreDiff !== 0) return scoreDiff;
          const totalListingsDiff = Number(b.totalListingsCount || 0) - Number(a.totalListingsCount || 0);
          if (totalListingsDiff !== 0) return totalListingsDiff;
          return b.lastCreatedAt - a.lastCreatedAt;
        })
        .slice(0, limit)
        .map((item) => item.userId);
    }

    async function fetchSellerRatings() {
      const sellerIds = Array.from(new Set(
        (activeListingsCatalog || [])
          .map((listing) => String(listing?.user_id || "").trim())
          .filter(Boolean),
      ));
      sellerRatingMap = new Map();
      if (sellerIds.length === 0) return;

      const listingOwnerMap = new Map();
      (activeListingsCatalog || []).forEach((listing) => {
        const listingId = String(listing?.id || "").trim();
        const userId = String(listing?.user_id || "").trim();
        if (!listingId || !userId) return;
        listingOwnerMap.set(listingId, userId);
      });

      const [usersResult, profileReportsResult, listingReportsResult] = await Promise.all([
        supabase
          .from("users")
          .select("id,phone_verified")
          .in("id", sellerIds),
        supabase
          .from("reports")
          .select("reported_user_id")
          .eq("target_type", "user")
          .eq("status", "handled")
          .in("action_taken", ["confirmed_report", "user_banned", "listing_deleted"])
          .in("reported_user_id", sellerIds),
        supabase
          .from("reports")
          .select("listing_id")
          .eq("target_type", "listing")
          .eq("status", "handled")
          .in("action_taken", ["confirmed_report", "listing_deleted"])
          .in("listing_id", Array.from(listingOwnerMap.keys())),
      ]);

      if (usersResult.error) throw usersResult.error;
      if (profileReportsResult.error) throw profileReportsResult.error;
      if (listingReportsResult.error) throw listingReportsResult.error;

      const profileReportCountMap = new Map();
      (profileReportsResult.data || []).forEach((row) => {
        const userId = String(row?.reported_user_id || "").trim();
        if (!userId) return;
        profileReportCountMap.set(userId, (profileReportCountMap.get(userId) || 0) + 1);
      });

      const listingReportCountMap = new Map();
      (listingReportsResult.data || []).forEach((row) => {
        const listingId = String(row?.listing_id || "").trim();
        const userId = listingOwnerMap.get(listingId);
        if (!userId) return;
        listingReportCountMap.set(userId, (listingReportCountMap.get(userId) || 0) + 1);
      });

      (usersResult.data || []).forEach((user) => {
        const userId = String(user?.id || "").trim();
        if (!userId) return;
        const recommendations = getRecommendationCount(userId);
        const reports = Number(profileReportCountMap.get(userId) || 0) + Number(listingReportCountMap.get(userId) || 0);
        const isVerified = !!user?.phone_verified;
        const rating = !isVerified
          ? 0
          : recommendations + reports === 0
            ? 0
            : Math.round((recommendations / (recommendations + reports)) * 100) / 10;
        sellerRatingMap.set(userId, rating);
      });
    }

    function renderSidebarGames() {
      if (!sidebarGames || !sidebarGamesEmpty) return;
      const counts = buildPopularityMap(activeListingsCatalog);
      const baseItems = allSortedGames
        .filter((game) => {
          const gameId = String(game.id);
          return (counts.get(gameId) || 0) > 0
            || isFollowedGame(gameId)
            || selectedSidebarBoostedServerIds.includes(gameId);
        });

      if (baseItems.length === 0) {
        sidebarGames.innerHTML = "";
        sidebarGamesEmpty.style.display = "block";
        return;
      }

      sidebarGamesEmpty.style.display = "none";
      const sortedItems = [...baseItems].sort((a, b) => {
        const followedDiff = Number(isFollowedGame(b.id)) - Number(isFollowedGame(a.id));
        if (followedDiff !== 0) return followedDiff;
        const countA = counts.get(String(a.id)) || 0;
        const countB = counts.get(String(b.id)) || 0;
        if (countB !== countA) return countB - countA;
        return String(a.name || "").localeCompare(
          String(b.name || ""),
          i18n.locale === "en" ? "en-US" : "pt-BR",
          { sensitivity: "base" },
        );
      });
      const selectedBoostedGames = selectedSidebarBoostedServerIds
        .map((serverId) => sortedItems.find((game) => String(game.id) === serverId))
        .filter(Boolean);
      const followedItems = sortedItems.filter((game) => isFollowedGame(game.id));
      const nonFollowedItems = sortedItems.filter((game) => !isFollowedGame(game.id));
      const finalItems = Array.from(new Map([
        ...selectedBoostedGames,
        ...followedItems,
        ...nonFollowedItems.slice(0, SIDEBAR_GAMES_LIMIT),
      ].map((game) => [String(game.id), game])).values());
      sidebarGames.innerHTML = finalItems.map((game) => {
        const isSelectedBoostedGame = selectedSidebarBoostedServerIds.includes(String(game.id));
        const count = counts.get(String(game.id)) || 0;
        const listingsText = count > 0
          ? formatMessage("home.active_listings_count", "{count} active listings", { count })
          : t("home.no_active_listings_yet", "No active listings yet");
        const followButtonLabel = isFollowedGame(game.id) ? t("home.following", "Following") : t("home.follow_game", "Follow game");
        const safeGameName = escapeHtml(game.name);
        const gameThumb = game.cover_url
          ? `<span class="sidebar-item-thumb game-logo"><img src="${encodeURI(game.cover_url)}" alt="${safeGameName}" loading="lazy" /></span>`
          : `<span class="sidebar-item-thumb game">${escapeHtml(String(game.name || "G").slice(0, 1))}</span>`;
        const boostAttrs = isSelectedBoostedGame ? ` data-server-feed-boost-track="1" data-server-id="${escapeHtml(String(game.id))}"` : "";
        return `
          <div class="sidebar-game-entry${isSelectedBoostedGame ? " is-highlighted" : ""}"${boostAttrs}>
            ${isSelectedBoostedGame
              ? `<span class="sidebar-game-entry-tag">${escapeHtml(t("home.highlight_simple", "Featured"))}</span>`
              : ""}
            <article class="sidebar-item sidebar-item-with-action${isSelectedBoostedGame ? " sidebar-item-highlighted" : ""}">
              <a class="sidebar-item-thumb-link" href="game?id=${encodeURIComponent(game.id)}" aria-label="${safeGameName}">
                ${gameThumb}
              </a>
              <button
                class="btn btn-ghost sidebar-follow-btn${isFollowedGame(game.id) ? " is-following" : ""}"
                type="button"
                data-action="toggle-follow"
                data-game-id="${escapeHtml(String(game.id))}">
                ${escapeHtml(followButtonLabel)}
              </button>
              <div class="sidebar-item-body">
                <a class="sidebar-item-title-link" href="game?id=${encodeURIComponent(game.id)}">
                  <strong class="sidebar-item-title">${safeGameName}</strong>
                </a>
                <span class="sidebar-item-subtitle">${escapeHtml(listingsText)}</span>
              </div>
            </article>
          </div>
        `;
      }).join("");
      observeServerFeedBoostImpressions();
    }

    async function handleHomeFollowButtonClick(event) {
      const button = event.target.closest('[data-action="toggle-follow"][data-game-id]');
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      const gameId = button.getAttribute("data-game-id") || "";
      if (!gameId) return;
      const originalText = button.textContent;
      try {
        button.disabled = true;
        button.textContent = isFollowedGame(gameId) ? t("home.removing", "Removing...") : t("home.following", "Following...");
        await toggleFollowGame(gameId);
        renderSidebarGames();
        const sellerIds = followedGameIds.size > 0 ? getTopSellerIds() : [];
        const userMap = await fetchUserProfiles(sellerIds);
        renderSidebarUsers(userMap);
        await renderHomeGameSections();
      } catch (err) {
        console.error(err);
        button.disabled = false;
        button.textContent = originalText || t("home.follow_game", "Follow game");
      }
    }

    function renderSidebarUsers(userMap) {
      if (!sidebarUsers || !sidebarUsersEmpty || !sidebarUsersSection) return;
      if (followedGameIds.size === 0) {
        sidebarUsersSection.style.display = "none";
        sidebarUsers.innerHTML = "";
        sidebarUsersEmpty.style.display = "none";
        return;
      }
      sidebarUsersSection.style.display = "";
      const topSellerIds = getTopSellerIds();
      if (topSellerIds.length === 0) {
        sidebarUsersSection.style.display = "none";
        sidebarUsers.innerHTML = "";
        sidebarUsersEmpty.style.display = "block";
        sidebarUsersEmpty.textContent = t("home.no_users", "No user suggestions right now.");
        return;
      }

      sidebarUsersSection.style.display = "";
      sidebarUsersEmpty.style.display = "none";
      sidebarUsers.innerHTML = topSellerIds.map((userId) => {
        const user = userMap.get(String(userId)) || {};
        const sellerName = formatSellerName(user);
        return `
          <a class="sidebar-item" href="user?id=${encodeURIComponent(userId)}">
            <span class="sidebar-item-thumb avatar"><img src="${encodeURI(user.avatar_url || "img/avatar.svg")}" alt="${escapeHtml(sellerName)}" loading="lazy" referrerpolicy="no-referrer" /></span>
            <span class="sidebar-item-copy">
              <strong class="sidebar-item-title">${escapeHtml(sellerName)}</strong>
              <span class="sidebar-item-subtitle">${formatRecommendations(getRecommendationCount(userId))}</span>
            </span>
          </a>
        `;
      }).join("");
    }

    async function toggleFollowGame(serverId) {
      const normalizedServerId = String(serverId || "").trim();
      if (!normalizedServerId) return;
      if (!currentUser) {
        await startOAuthLikeNavbar(`${window.location.pathname}${window.location.search || ""}`);
        return;
      }

      const shouldFollow = !isFollowedGame(normalizedServerId);
      if (shouldFollow) {
        const { error } = await supabase
          .from("server_follows")
          .insert({ user_id: currentUser.id, server_id: normalizedServerId });
        if (error) throw error;
        followedGameIds.add(normalizedServerId);
      } else {
        const { error } = await supabase
          .from("server_follows")
          .delete()
          .eq("user_id", currentUser.id)
          .eq("server_id", normalizedServerId);
        if (error) throw error;
        followedGameIds.delete(normalizedServerId);
      }
    }

    function queueHomeHighlightImpression(listingId) {
      const normalizedId = String(listingId || "").trim();
      if (!normalizedId) return;
      pendingHomeHighlightImpressionIds.add(normalizedId);
      if (homeHighlightImpressionFlushTimer) return;
      homeHighlightImpressionFlushTimer = window.setTimeout(async () => {
        const ids = Array.from(pendingHomeHighlightImpressionIds);
        pendingHomeHighlightImpressionIds.clear();
        homeHighlightImpressionFlushTimer = null;
        if (ids.length === 0) return;
        try {
          ensureClient();
          const { data, error } = await supabase.functions.invoke("listing_highlight_impression", {
            body: { listingIds: ids },
          });
        } catch (err) {
          console.error(err);
        }
      }, 800);
    }

    function observeHomeHighlightImpressions() {
      if (homeHighlightImpressionObserver) {
        homeHighlightImpressionObserver.disconnect();
        homeHighlightImpressionObserver = null;
      }
      if (!homeGameSections) return;
      const cards = [...homeGameSections.querySelectorAll(".home-feed-card[data-highlight-track='1']")];
      if (cards.length === 0) return;
      homeHighlightImpressionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting || entry.intersectionRatio < 0.65) return;
          const listingId = entry.target?.dataset?.listingId;
          if (!listingId) return;
          const now = Date.now();
          const lastTrackedAt = getLastHighlightImpressionAt(listingId);
          if (now - lastTrackedAt < HIGHLIGHT_IMPRESSION_WINDOW_MS) return;
          setLastHighlightImpressionAt(listingId, now);
          queueHomeHighlightImpression(listingId);
        });
      }, {
        root: null,
        threshold: [0.65],
      });
      cards.forEach((card) => homeHighlightImpressionObserver.observe(card));
    }

    function parseCoverStoragePath(urlString) {
      try {
        const url = new URL(urlString);
        const marker = "/storage/v1/object/public/";
        const idx = url.pathname.indexOf(marker);
        if (idx === -1) return null;
        const rest = url.pathname.substring(idx + marker.length);
        const [bucket, ...pathParts] = rest.split("/");
        return { bucket, path: pathParts.join("/") };
      } catch (_err) {
        return null;
      }
    }

    function showSuggestionMessage(message) {
      if (!searchSuggestions) return;
      searchSuggestions.innerHTML = `
        <div class="suggestion-empty">${message}</div>
      `;
      searchSuggestions.style.display = "block";
    }

    async function getSignedCoverUrl(urlString) {
      const parsed = parseCoverStoragePath(urlString);
      if (!parsed) return urlString;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || urlString;
      } catch (err) {
        console.warn("Failed to sign cover image", err);
        return urlString;
      }
    }

    async function renderHomeGameSections() {
      if (!homeGameSections || !homeGameSectionsEmpty) return;
      resetHomeFeedRowStates();
      resetHomeSectionFeedState();
      const groupedListings = new Map();
      activeListingsCatalog.forEach((listing) => {
        const serverId = String(listing?.server_id || "").trim();
        if (!serverId) return;
        if (!groupedListings.has(serverId)) groupedListings.set(serverId, []);
        groupedListings.get(serverId).push(listing);
      });
      const baseGames = [...allSortedGames]
        .filter((game) => groupedListings.has(String(game.id)));
      await renderFeaturedGamesSection();
      const selectedGames = buildHomeFeedGames(baseGames, HOME_GAME_SECTION_LIMIT);
      const hasFeaturedGames = homeFeaturedGamesSection?.style.display !== "none";

      if (selectedGames.length === 0) {
        homeGameSections.innerHTML = "";
        homeGameSections.dataset.sectionsExhausted = "1";
        homeGameSectionsEmpty.style.display = hasFeaturedGames ? "none" : "block";
        await bindHomeFeedRowInfiniteLoading();
        observeServerFeedBoostImpressions();
        return;
      }

      homeGameSectionsEmpty.style.display = "none";
      homeGameSections.innerHTML = "";
      homeGameSections.dataset.sectionsExhausted = "0";
      homeSectionFeedState = {
        items: selectedGames,
        groupedListings,
        nextIndex: 0,
        batchSize: Math.max(1, estimateHomeSectionBatchSize() - 1),
        loading: false,
      };
      bindHomeSectionInfiniteLoading();
      await renderNextHomeSectionBatch(estimateHomeSectionBatchSize());
    }

    async function loadHomeLayout() {
      try {
        ensureClient();
        const { data: sessionData } = await supabase.auth.getSession();
        currentUser = sessionData?.session?.user || currentUser;
        await fetchGamesCatalog();
        selectHomeBoostedServers();
        await fetchRecommendationCounts();
        await fetchSellerRatings();
        await fetchServerFollowerCounts();
        await fetchSearchablePlayers();
        await fetchFollowedGames();
        renderSidebarGames();

        const sellerIds = followedGameIds.size > 0 ? getTopSellerIds() : [];
        const userMap = await fetchUserProfiles(sellerIds);

        renderSidebarUsers(userMap);
        await renderHomeGameSections();
      } catch (err) {
        console.error(err);
        if (sidebarGamesEmpty) {
          sidebarGamesEmpty.style.display = "block";
          sidebarGamesEmpty.textContent = err?.message || t("home.sidebar_error", "Error loading sidebar.");
        }
        if (sidebarUsersEmpty) {
          sidebarUsersEmpty.style.display = "block";
          sidebarUsersEmpty.textContent = err?.message || t("home.users_error", "Error loading users.");
        }
        if (homeGameSectionsEmpty) {
          homeGameSectionsEmpty.style.display = "block";
          homeGameSectionsEmpty.textContent = err?.message || t("home.feed_error", "Error loading feed.");
        }
      } finally {
        await waitForInitialHomeVisuals();
        markContentReady();
      }
    }

    function renderSuggestions(term) {
      if (!searchSuggestions) return;
      if (!term || term.length < 2) {
        searchSuggestions.style.display = "none";
        searchSuggestions.innerHTML = "";
        return;
      }
      const normalizedTerm = normalizeSearchText(term);
      const gameMatches = allSortedGames
        .filter((g) => matchesPrefix(g.name, normalizedTerm))
        .slice(0, 6);
      const playerMatches = searchablePlayers
        .filter((player) => (player.searchTerms || []).some((value) => matchesPrefix(value, normalizedTerm)))
        .sort((a, b) => {
          const aUsername = normalizeSearchText(a.username || "");
          const bUsername = normalizeSearchText(b.username || "");
          const aStarts = aUsername.startsWith(normalizedTerm) ? 1 : 0;
          const bStarts = bUsername.startsWith(normalizedTerm) ? 1 : 0;
          if (bStarts !== aStarts) return bStarts - aStarts;
          const aIncludes = aUsername.includes(normalizedTerm) ? 1 : 0;
          const bIncludes = bUsername.includes(normalizedTerm) ? 1 : 0;
          if (bIncludes !== aIncludes) return bIncludes - aIncludes;
          return String(a.username || a.name || "").localeCompare(
            String(b.username || b.name || ""),
            i18n.locale === "en" ? "en-US" : "pt-BR",
            { sensitivity: "base" },
          );
        })
        .slice(0, 6);
      if (gameMatches.length === 0 && playerMatches.length === 0) {
        searchSuggestions.innerHTML = `
          <div class="suggestion-empty">
            ${t("home.search_not_found_prefix", "We couldn't find games or players for")} "${escapeHtml(term)}".
            <a class="link-ghost" href="game-submit.html" data-action="game-submit">${t("home.submit_game_cta", "Clique aqui")}</a> ${t("home.submit_game_suffix", "para cadastrar um novo game.")}
          </div>
        `;
        searchSuggestions.style.display = "block";
        return;
      }
      const gameItems = gameMatches
        .map((g) => {
          const logoUrl = normalizeR2PublicUrl(g.cover_url || "");
          const websiteLabel = String(g.website || "").replace(/^https?:\/\//i, "").replace(/\/$/, "") || "No official website";
          return `<div class="suggestion-item suggestion-item-rich" data-kind="game" data-game-id="${g.id}" data-game-name="${escapeHtml(g.name)}">
            <span class="suggestion-thumb suggestion-thumb-game">
              ${logoUrl
                ? `<img src="${encodeURI(logoUrl)}" alt="${escapeHtml(g.name)}" loading="lazy" />`
                : `<img src="img/logo.png" alt="" loading="lazy" />`}
            </span>
            <span class="suggestion-copy">
              <strong>${escapeHtml(g.name)}</strong>
              <small>${escapeHtml(websiteLabel)}</small>
            </span>
            <span class="badge">Game</span>
          </div>`;
        })
        .join("");
      const playerItems = playerMatches
        .map((player) => `<div class="suggestion-item suggestion-item-rich" data-kind="player" data-user-id="${player.id}" data-user-name="${escapeHtml(player.username || player.name)}">
          <span class="suggestion-thumb suggestion-thumb-avatar">
            <img src="${encodeURI(player.avatar_url || "img/avatar.svg")}" alt="${escapeHtml(player.name)}" loading="lazy" referrerpolicy="no-referrer" />
          </span>
          <span class="suggestion-copy">
            <strong>${escapeHtml(player.username || player.name)}</strong>
            <small>${escapeHtml(player.name)}</small>
          </span>
          <span class="badge">Player</span>
        </div>`)
        .join("");
      const footer = `
        <div class="suggestion-footer">
          ${t("home.search_not_found_simple", "We couldn't find")}
          <a class="link-ghost" href="game-submit.html" data-action="game-submit">${t("home.submit_game_cta", "Clique aqui")}</a> ${t("home.submit_game_suffix", "para cadastrar um novo game.")}
        </div>
      `;
      searchSuggestions.innerHTML = `${gameItems}${playerItems}${footer}`;
      searchSuggestions.style.display = "block";
    }

    function handleSuggestionClick(event) {
      const item = event.target.closest(".suggestion-item");
      if (!item) return;
      const kind = item.getAttribute("data-kind");
      const gameId = item.getAttribute("data-game-id");
      const gameName = item.getAttribute("data-game-name");
      const userId = item.getAttribute("data-user-id");
      const userName = item.getAttribute("data-user-name");
      if (gameName && searchInput) searchInput.value = gameName;
      if (userName && searchInput) searchInput.value = userName;
      searchSuggestions.style.display = "none";
      if (kind === "game" && gameId) {
        window.location.href = `game?id=${encodeURIComponent(gameId)}`;
        return;
      }
      if (kind === "player" && userId) {
        window.location.href = `user?id=${encodeURIComponent(userId)}`;
      }
    }

    searchForm?.addEventListener("submit", (event) => {
      event.preventDefault();
      const term = searchInput?.value.trim();
      if (!term) {
        showSuggestionMessage(t("home.type_to_search", "Type the name of a game or player to begin."));
        return;
      }
      const normalizedTerm = normalizeSearchText(term);
      const gameMatch = games.find((g) => normalizeSearchText(g.name) === normalizedTerm);
      if (gameMatch) {
        window.location.href = `game?id=${encodeURIComponent(gameMatch.id)}`;
        searchSuggestions.style.display = "none";
        return;
      }
      const playerMatch = searchablePlayers.find((player) => {
        const username = normalizeSearchText(player.username || "");
        return username === normalizedTerm || normalizeSearchText(player.name) === normalizedTerm || player.searchText === normalizedTerm;
      });
      if (playerMatch) {
        window.location.href = `user?id=${encodeURIComponent(playerMatch.id)}`;
        searchSuggestions.style.display = "none";
      } else {
        searchSuggestions.innerHTML = `
          <div class="suggestion-empty">
            ${t("home.search_not_found_simple", "We couldn't find")} "${escapeHtml(term)}".
            <a href="game-submit.html" class="link-ghost" data-action="game-submit">${t("home.submit_game_cta", "Clique aqui")}</a> ${t("home.submit_game_suffix", "para cadastrar um novo game.")}
          </div>
        `;
        searchSuggestions.style.display = "block";
      }
    });

    searchInput?.addEventListener("input", (event) => {
      const term = event.target.value.trim();
      renderSuggestions(term);
    });

    searchSuggestions?.addEventListener("click", handleSuggestionClick);
    searchSuggestions?.addEventListener("click", (event) => {
      const link = event.target.closest('a[data-action="game-submit"]');
      if (!link) return;
      event.preventDefault();
      if (!currentUser) {
        startOAuthLikeNavbar("game-submit.html").catch((err) => {
          console.error(err);
          showSuggestionMessage(err?.message || "Error starting Google sign-in.");
        });
        return;
      }
      window.location.href = "game-submit.html";
    });

    authBtn?.addEventListener("click", handleAuthClick);
    avatarBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      userMenu?.classList.toggle("open");
    });
    document.addEventListener("click", (event) => {
      if (!userMenu) return;
      if (!userMenu.contains(event.target)) {
        userMenu.classList.remove("open");
      }
    });
    logoutBtn?.addEventListener("click", async () => {
      try {
        ensureClient();
        await supabase.auth.signOut();
        currentUser = null;
        updateAuthUI();
      } catch (err) {
        console.error(err);
      }
    });
    function goToCreateListing() {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      window.location.href = "listing-create.html";
    }

    createListingBtn?.addEventListener("click", goToCreateListing);
    menuCreateListing?.addEventListener("click", () => {
      userMenu?.classList.remove("open");
      goToCreateListing();
    });
    homeFeaturedGamesSection?.addEventListener("click", handleHomeFollowButtonClick);
    homeGameSections?.addEventListener("click", handleHomeFollowButtonClick);
    sidebarGames?.addEventListener("click", async (event) => {
      const button = event.target.closest('[data-action="toggle-follow"][data-game-id]');
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      const gameId = button.getAttribute("data-game-id") || "";
      if (!gameId) return;
      const originalText = button.textContent;
      try {
        button.disabled = true;
        button.textContent = isFollowedGame(gameId) ? t("home.removing", "Removing...") : t("home.following", "Following...");
        await toggleFollowGame(gameId);
        renderSidebarGames();
        const sellerIds = followedGameIds.size > 0 ? getTopSellerIds() : [];
        const userMap = await fetchUserProfiles(sellerIds);
        renderSidebarUsers(userMap);
        await renderHomeGameSections();
      } catch (err) {
        console.error(err);
        button.disabled = false;
        button.textContent = originalText || t("home.follow_game", "Follow game");
      }
    });
    homeSidebarToggle?.addEventListener("click", () => {
      sidebarAutoManaged = false;
      setSidebarCollapsed(!sidebarCollapsed);
    });
    setSidebarCollapsed(sidebarCollapsed);
    window.addEventListener("resize", () => {
      if (!sidebarAutoManaged) return;
      setSidebarCollapsed(window.innerWidth < 960);
    });
    bootstrapAuth();
    loadHomeLayout();
    const pageLoader = document.getElementById("page-loader");
    let loaderDone = false;
    let windowLoaded = false;
    let avatarReady = false;
    let contentReady = false;

    function waitForImageElement(img, timeoutMs = 1800) {
      if (!img) return Promise.resolve();
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          img.removeEventListener("load", finish);
          img.removeEventListener("error", finish);
          resolve();
        };
        const timer = setTimeout(finish, timeoutMs);
        const wrappedFinish = () => {
          clearTimeout(timer);
          finish();
        };
        img.addEventListener("load", wrappedFinish, { once: true });
        img.addEventListener("error", wrappedFinish, { once: true });
      });
    }

    async function waitForInitialHomeVisuals() {
      const images = Array.from(document.querySelectorAll(
        "#home-sidebar img, #home-game-sections img"
      ))
        .filter((img) => !img.classList.contains("brand-logo"))
        .slice(0, 12);
      await Promise.all(images.map((img) => waitForImageElement(img)));
    }

    function hideLoader() {
      if (loaderDone || !pageLoader) return;
      if (!windowLoaded || !avatarReady || !contentReady) return;
      loaderDone = true;
      document.documentElement.style.visibility = "visible";
      const guard = document.getElementById("index-guard-style");
      if (guard) guard.remove();
      pageLoader.classList.add("hidden");
      pageLoader.remove();
    }

    function markAvatarReady() {
      avatarReady = true;
      hideLoader();
    }

    function markContentReady() {
      contentReady = true;
      hideLoader();
    }

    window.addEventListener("load", () => {
      windowLoaded = true;
      hideLoader();
    });

    setTimeout(() => {
      windowLoaded = true;
      avatarReady = true;
      contentReady = true;
      hideLoader();
    }, 5000);
  </script>
</body>
</html>
