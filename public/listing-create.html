<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-2685595309963345" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta property="og:image:alt" content="Gimerr" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta name="twitter:image:alt" content="Gimerr" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <title>Gimerr - Create listing</title>
  <link rel="stylesheet" href="css/global.css" />
  <style id="listing-guard-style">html{visibility:hidden;}</style>
  <style>
    .feedback-link {
      color: var(--accent-2);
      font-weight: 600;
      text-decoration: none;
    }

    .listing-create-main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .listing-create-main .form-card {
      width: min(100%, 540px);
      min-width: 0;
    }

    .listing-create-main .field,
    .listing-create-main .suggestions,
    .listing-create-main .input,
    .listing-create-main .textarea {
      min-width: 0;
    }

    .field-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .field-head .helper {
      margin-left: auto;
      max-width: 260px;
      text-align: right;
    }

    .field-soft {
      padding: 14px;
      border-radius: 18px;
      background: rgba(118, 168, 255, 0.09);
      border: 1px solid rgba(118, 168, 255, 0.16);
    }

    .field-soft .helper {
      color: rgba(16, 26, 46, 0.72);
    }

    .feedback-link:hover {
      text-decoration: underline;
    }

    .listing-create-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(12, 21, 51, 0.52);
      z-index: 60;
    }

    .listing-create-modal.open {
      display: flex;
    }

    .listing-create-modal-card {
      width: min(100%, 480px);
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .listing-create-modal-head {
      display: grid;
      gap: 6px;
    }

    .listing-create-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .field-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .field-head .helper {
        margin-left: 0;
        max-width: none;
        text-align: left;
      }
    }
  </style>
  <script>
    (() => {
      try {
        const hasSession = localStorage.getItem("gimerr-auth-token") || localStorage.getItem("gimerr-auth-session");
        if (!hasSession) {
          window.location.replace("index.html");
        }
      } catch (_err) {
        window.location.replace("index.html");
      }
    })();
  </script>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <img src="img/logo.png" alt="Loading" />
  </div>
  <div class="page">
    <site-navbar search-enabled="games"></site-navbar>

    <main class="section listing-create-main">
      <div class="form-card">
        <div>
          <h2 id="form-title">New listing</h2>
          <p id="form-title-helper" class="helper">You can create only 1 listing per game.</p>
        </div>
        <form id="listing-form" class="form-vertical">
          <div class="field">
            <div class="field-head">
              <label id="listing-game-label" for="listing-game">Game name *</label>
            </div>
            <span id="game-helper" class="helper">Select an existing game from the list or submit a new one.</span>
            <div class="suggestions">
              <input id="listing-game" class="input" placeholder="Type to search for a game" autocomplete="off" required />
              <div id="game-suggestions" class="suggestions-panel" style="display:none;"></div>
            </div>
          </div>

          <div class="field">
            <label id="listing-title-label" for="listing-title">Listing title *</label>
            <input id="listing-title" class="input" placeholder="Ex: 1kk gold + rare items" maxlength="70" required />
          </div>

          <div class="field field-soft">
            <div class="field-head">
              <label id="listing-images-label" for="listing-images">Listing images (optional, up to 8)</label>
            </div>
            <span id="listing-images-helper" class="helper">You can upload up to 8 images.</span>
            <input id="listing-images" type="file" accept="image/png,image/jpeg,image/webp" multiple />
            <span id="image-count" class="helper">0/8 selected images.</span>
            <div id="image-previews" class="image-preview-grid" aria-live="polite"></div>
          </div>

          <div class="field">
            <label id="listing-description-label" for="listing-description">Description (optional)</label>
            <textarea id="listing-description" class="textarea" maxlength="1000" placeholder="Describe your listing (up to 1000 characters)."></textarea>
            <span id="desc-counter" class="helper">0/1000</span>
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <button type="submit" class="btn btn-primary" id="submit-btn">Publish listing</button>
            <div id="form-feedback" class="helper"></div>
          </div>
        </form>
      </div>
    </main>

    <div id="custom-game-modal" class="listing-create-modal" aria-hidden="true">
      <div class="listing-create-modal-card">
        <div class="listing-create-modal-head">
          <h3 id="custom-game-modal-title">New game</h3>
          <p id="custom-game-modal-helper" class="helper">Enter the basic information to submit your listing for review.</p>
        </div>
        <div class="field">
          <label id="custom-game-name-label" for="custom-game-name">Game name *</label>
          <input id="custom-game-name" class="input" placeholder="Ex: Miracle 7.4" autocomplete="off" />
        </div>
        <div class="field">
          <label id="custom-game-site-label" for="custom-game-site">Official website *</label>
          <input id="custom-game-site" class="input" type="url" placeholder="https://nomedogame.com" inputmode="url" autocomplete="off" />
        </div>
        <div class="field">
          <label id="custom-game-discord-label" for="custom-game-discord">Official Discord invite (optional)</label>
          <input id="custom-game-discord" class="input" placeholder="https://discord.gg/your-server" autocomplete="off" />
        </div>
        <div class="field">
          <label id="custom-game-logo-label" for="custom-game-logo">Server logo (png/jpg/webp) (optional)</label>
          <input id="custom-game-logo" type="file" accept="image/png,image/jpeg,image/webp" />
        </div>
        <div id="custom-game-feedback" class="helper"></div>
        <div class="listing-create-modal-actions">
          <button type="button" class="btn btn-ghost" id="close-custom-game-modal-btn">Cancel</button>
          <button type="button" class="btn btn-primary" id="save-custom-game-btn">Use this game</button>
        </div>
      </div>
    </div>

  </div>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/site-navbar.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    await (window.__NAVBAR_READY__ || Promise.resolve());

    const env = window.__ENV || {};
    const i18n = window.__I18N__ || { locale: "en", t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const formatMessage = (key, fallback, params = {}) => Object.entries(params).reduce(
      (text, [paramKey, value]) => text.replaceAll(`{${paramKey}}`, String(value)),
      t(key, fallback),
    );
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";
    const R2_PUBLIC_URL = env.R2_PUBLIC_URL || "";

    const authBtn = document.getElementById("auth-btn");
    const userMenu = document.getElementById("user-menu");
    const avatarBtn = document.getElementById("avatar-btn");
    const avatarImg = document.getElementById("avatar-img");
    const logoutBtn = document.getElementById("logout-btn");
    const createListingBtn = document.getElementById("create-listing-btn");
    const menuCreateListing = document.getElementById("menu-create-listing");
    const profileLink = document.getElementById("profile-link");
    const form = document.getElementById("listing-form");
    const formTitle = document.getElementById("form-title");
    const formTitleHelper = document.getElementById("form-title-helper");
    const feedback = document.getElementById("form-feedback");
    const submitBtn = document.getElementById("submit-btn");
    const listingTitleLabel = document.getElementById("listing-title-label");
    const listingTitleInput = document.getElementById("listing-title");
    const listingGameLabel = document.getElementById("listing-game-label");
    const listingImagesLabel = document.getElementById("listing-images-label");
    const listingImagesHelper = document.getElementById("listing-images-helper");
    const listingDescriptionLabel = document.getElementById("listing-description-label");
    const gameInput = document.getElementById("listing-game");
    const gameHelper = document.getElementById("game-helper");
    const suggestionsPanel = document.getElementById("game-suggestions");
    const customGameModal = document.getElementById("custom-game-modal");
    const customGameModalTitle = document.getElementById("custom-game-modal-title");
    const customGameModalHelper = document.getElementById("custom-game-modal-helper");
    const customGameNameLabel = document.getElementById("custom-game-name-label");
    const customGameSiteLabel = document.getElementById("custom-game-site-label");
    const customGameDiscordLabel = document.getElementById("custom-game-discord-label");
    const customGameLogoLabel = document.getElementById("custom-game-logo-label");
    const customGameNameInput = document.getElementById("custom-game-name");
    const customGameSiteInput = document.getElementById("custom-game-site");
    const customGameDiscordInput = document.getElementById("custom-game-discord");
    const customGameLogoInput = document.getElementById("custom-game-logo");
    const customGameFeedback = document.getElementById("custom-game-feedback");
    const closeCustomGameModalBtn = document.getElementById("close-custom-game-modal-btn");
    const saveCustomGameBtn = document.getElementById("save-custom-game-btn");
    const descInput = document.getElementById("listing-description");
    const descCounter = document.getElementById("desc-counter");
    const imagesInput = document.getElementById("listing-images");
    const imagePreviews = document.getElementById("image-previews");
    const imageCount = document.getElementById("image-count");

    const pageLoader = document.getElementById("page-loader");
    let loaderDone = false;
    let windowLoaded = false;
    let avatarReady = false;

    function hideLoader() {
      if (loaderDone || !pageLoader) return;
      if (!windowLoaded || !avatarReady) return;
      loaderDone = true;
      pageLoader.classList.add("hidden");
      pageLoader.remove();
    }

    function markAvatarReady() {
      avatarReady = true;
      hideLoader();
    }

    window.addEventListener("load", () => {
      windowLoaded = true;
      hideLoader();
    });

    const MAX_IMAGES = 8;
    const MAX_DESC = 1000;
    const MAX_TITLE = 70;
    const MAX_IMAGE_BYTES = 5 * 1024 * 1024;
    const MAX_LOGO_BYTES = 3 * 1024 * 1024;
    const MAX_LOGO_WIDTH = 512;
    const MAX_IMAGE_DIMENSION = 1600;
    const WEBP_QUALITY = 0.8;
    const DEFAULT_GAME_HELPER_TEXT = t("listing_create.game_helper", "Select an existing game from the list or submit a new one.");
    const CUSTOM_GAME_TRIGGER_TEXT = t("listing_create.custom_trigger", "Didn't find your game in the list? Click here.");
    const urlParams = new URLSearchParams(window.location.search);
    const editListingId = urlParams.get("edit");

    let supabase;
    let currentUser = null;
    let games = [];
    let editingListing = null;
    let originalImageUrls = [];
    let existingImageUrls = [];
    let selectedImages = [];
    let customGameRequested = false;
    let customGamePayload = null;
    let avatarLoaded = false;
    if (avatarImg) avatarImg.referrerPolicy = "no-referrer";
    if (submitBtn && !submitBtn.dataset.defaultText) {
      submitBtn.dataset.defaultText = submitBtn.textContent || t("listing_create.submit", "Publish listing");
    }

    function applyStaticTranslations() {
      document.title = t("listing_create.title_default", "Gimerr - Create listing");
      document.documentElement.lang = i18n.locale === "en" ? "en" : "pt-BR";
      const loaderImage = pageLoader?.querySelector("img");
      if (loaderImage) loaderImage.alt = t("listing_create.loading", "Loading");
      if (formTitle) formTitle.textContent = editListingId ? t("listing_create.edit_title", "Edit listing") : t("listing_create.page_title", "New listing");
      if (formTitleHelper) formTitleHelper.textContent = t("listing_create.page_helper", "You can create only 1 listing per game.");
      if (listingTitleLabel) listingTitleLabel.textContent = t("listing_create.title_label", "Listing title *");
      if (listingTitleInput) listingTitleInput.placeholder = t("listing_create.title_placeholder", "Ex: 1kk gold + rare items");
      if (listingGameLabel) listingGameLabel.textContent = t("listing_create.game_label", "Game name *");
      if (gameHelper) gameHelper.textContent = DEFAULT_GAME_HELPER_TEXT;
      if (gameInput) gameInput.placeholder = t("listing_create.game_placeholder", "Type to search for a game");
      if (listingImagesLabel) listingImagesLabel.textContent = t("listing_create.images_label", "Listing images (optional, up to 8)");
      if (listingImagesHelper) listingImagesHelper.textContent = t("listing_create.images_helper", "You can upload up to 8 images.");
      if (listingDescriptionLabel) listingDescriptionLabel.textContent = t("listing_create.description_label", "Description (optional)");
      if (descInput) descInput.placeholder = t("listing_create.description_placeholder", "Describe your listing (up to 1000 characters).");
      if (customGameModalTitle) customGameModalTitle.textContent = t("listing_create.modal_title", "New game");
      if (customGameModalHelper) customGameModalHelper.textContent = t("listing_create.modal_helper", "Enter the basic information to submit your listing for review.");
      if (customGameNameLabel) customGameNameLabel.textContent = t("listing_create.modal_name_label", "Game name *");
      if (customGameNameInput) customGameNameInput.placeholder = t("listing_create.modal_name_placeholder", "Ex: Miracle 7.4");
      if (customGameSiteLabel) customGameSiteLabel.textContent = t("listing_create.modal_site_label", "Official website *");
      if (customGameSiteInput) customGameSiteInput.placeholder = t("listing_create.modal_site_placeholder", "https://nomedogame.com");
      if (customGameDiscordLabel) customGameDiscordLabel.textContent = t("listing_create.modal_discord_label", "Official Discord invite (optional)");
      if (customGameDiscordInput) customGameDiscordInput.placeholder = t("listing_create.modal_discord_placeholder", "https://discord.gg/your-server");
      if (customGameLogoLabel) customGameLogoLabel.textContent = t("listing_create.modal_logo_label", "Server logo (png/jpg/webp) (optional)");
      if (closeCustomGameModalBtn) closeCustomGameModalBtn.textContent = t("listing_create.cancel", "Cancel");
      if (saveCustomGameBtn) saveCustomGameBtn.textContent = t("listing_create.modal_submit", "Use this game");
      if (submitBtn) {
        const defaultText = editListingId ? t("listing_create.edit_submit", "Save changes") : t("listing_create.submit", "Publish listing");
        submitBtn.dataset.defaultText = defaultText;
        submitBtn.textContent = defaultText;
      }
    }

    function setSubmitLoading(isLoading) {
      if (!submitBtn) return;
      const defaultText = submitBtn.dataset.defaultText || t("listing_create.submit", "Publish listing");
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? t("listing_create.submitting", "Publishing...") : defaultText;
    }

    function setDefaultSubmitText(text) {
      if (!submitBtn) return;
      submitBtn.dataset.defaultText = text;
      submitBtn.textContent = text;
    }

    function setCustomGameMode(enabled) {
      customGameRequested = !!enabled;
      if (!enabled) {
        customGamePayload = null;
        if (customGameFeedback) customGameFeedback.textContent = "";
        if (customGameNameInput) customGameNameInput.value = "";
        if (customGameSiteInput) customGameSiteInput.value = "";
        if (customGameDiscordInput) customGameDiscordInput.value = "";
        if (customGameLogoInput) customGameLogoInput.value = "";
      }
      if (!enabled && suggestionsPanel) {
        suggestionsPanel.style.display = "none";
        suggestionsPanel.innerHTML = "";
      }
      updateCustomPartnerPolicyField();
    }

    function updateCustomPartnerPolicyField() {
      if (customGameDiscordInput) customGameDiscordInput.required = false;
      if (customGameLogoInput) customGameLogoInput.required = false;
      if (customGameDiscordLabel) {
        customGameDiscordLabel.textContent = t("listing_create.modal_discord_label", "Official Discord invite (optional)");
      }
      if (customGameLogoLabel) {
        customGameLogoLabel.textContent = t("listing_create.modal_logo_label", "Server logo (png/jpg/webp) (optional)");
      }
    }

    function openCustomGameModal() {
      if (!customGameModal) return;
      if (customGameNameInput) {
        customGameNameInput.value = (customGamePayload?.name || gameInput?.value || "").trim();
      }
      if (customGameSiteInput) {
        customGameSiteInput.value = customGamePayload?.website || "";
      }
      if (customGameDiscordInput) {
        customGameDiscordInput.value = customGamePayload?.discord_invite || "";
      }
      updateCustomPartnerPolicyField();
      if (customGameFeedback) customGameFeedback.textContent = "";
      customGameModal.classList.add("open");
      customGameModal.setAttribute("aria-hidden", "false");
      window.setTimeout(() => customGameNameInput?.focus(), 0);
    }

    function closeCustomGameModal() {
      if (!customGameModal) return;
      customGameModal.classList.remove("open");
      customGameModal.setAttribute("aria-hidden", "true");
      if (customGameFeedback) customGameFeedback.textContent = "";
    }

    function fillGameFromSelection(game, fallbackName = "") {
      if (!gameInput) return;
      gameInput.value = game?.name || fallbackName || "";
      gameInput.dataset.gameId = game?.id || "";
    }

    function revealPage() {
      document.documentElement.style.visibility = "visible";
      const guard = document.getElementById("listing-guard-style");
      if (guard) guard.remove();
    }

    function ensureClient() {
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        feedback.textContent = t("listing_create.configure_env", "Configure SUPABASE_URL and SUPABASE_ANON_KEY in public/env.js.");
        authBtn.disabled = true;
        submitBtn.disabled = true;
        throw new Error(t("listing_create.supabase_not_configured", "Supabase is not configured"));
      }
      if (!supabase) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storageKey: "gimerr-auth-token",
          },
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user || null;
          updateAuthUI();
        });
      }
      return supabase;
    }

    function updateAuthUI() {
      if (!authBtn) return;
      authBtn.disabled = false;
      if (currentUser) {
        authBtn.style.display = "none";
        if (userMenu) userMenu.style.display = "inline-flex";
        if (profileLink) profileLink.href = `user?id=${encodeURIComponent(currentUser.id)}`;
        loadUserAvatar();
        if (createListingBtn) createListingBtn.style.display = "inline-flex";
        if (menuCreateListing) menuCreateListing.style.display = "";
        return;
      }
      authBtn.style.display = "inline-flex";
      if (userMenu) userMenu.style.display = "none";
      if (profileLink) profileLink.href = "profile.html";
      if (createListingBtn) createListingBtn.style.display = "none";
      if (menuCreateListing) menuCreateListing.style.display = "none";
      avatarLoaded = false;
      markAvatarReady();
    }

    async function setAvatarImage(src) {
      if (!avatarImg) return;
      const finalSrc = src || "img/avatar.svg";
      avatarImg.src = finalSrc;
      try {
        await avatarImg.decode();
      } catch (_err) {
        if (finalSrc !== "img/avatar.svg") {
          avatarImg.src = "img/avatar.svg";
          try {
            await avatarImg.decode();
          } catch (_innerErr) {
            // ignore
          }
        }
      } finally {
        markAvatarReady();
      }
    }

    async function loadUserAvatar() {
      if (!avatarImg || !currentUser || avatarLoaded) return;
      try {
        ensureClient();
        const { data } = await supabase
          .from("users")
          .select("avatar_url")
          .eq("id", currentUser.id)
          .single();
        let avatar = data?.avatar_url;
        if (!avatar) {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
        }
        await setAvatarImage(avatar);
      } catch (_err) {
        try {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          const avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
          await setAvatarImage(avatar);
        } catch (_innerErr) {
          await setAvatarImage("img/avatar.svg");
        }
      } finally {
        avatarLoaded = true;
      }
    }

    function renderImagePreviews() {
      if (!imagePreviews) return;
      imagePreviews.innerHTML = "";
      const normalizePreviewUrl = (rawUrl) => {
        if (!rawUrl) return "";
        if (String(rawUrl).startsWith("http")) return String(rawUrl);
        if (R2_PUBLIC_URL) {
          return `${R2_PUBLIC_URL.replace(/\/$/, "")}/${String(rawUrl).replace(/^\/+/, "")}`;
        }
        return String(rawUrl);
      };
      existingImageUrls.forEach((url, index) => {
        const wrapper = document.createElement("div");
        wrapper.className = "image-thumb";
        wrapper.innerHTML = `
          <img src="${encodeURI(normalizePreviewUrl(url))}" alt="${escapeHtml(formatMessage("listing_create.current_image_alt", "Current image {index}", { index: index + 1 }))}" />
          <button type="button" class="image-remove" aria-label="${escapeHtml(t("listing_create.remove_image", "Remove image"))}">×</button>
        `;
        const removeBtn = wrapper.querySelector(".image-remove");
        removeBtn.addEventListener("click", () => {
          existingImageUrls = existingImageUrls.filter((_, i) => i !== index);
          renderImagePreviews();
        });
        imagePreviews.appendChild(wrapper);
      });
      selectedImages.forEach((file, index) => {
        const url = URL.createObjectURL(file);
        const wrapper = document.createElement("div");
        wrapper.className = "image-thumb";
        wrapper.innerHTML = `
          <img src="${url}" alt="${escapeHtml(formatMessage("listing_create.image_alt", "Image {index}", { index: index + 1 }))}" />
          <button type="button" class="image-remove" aria-label="${escapeHtml(t("listing_create.remove_image", "Remove image"))}">×</button>
        `;
        const removeBtn = wrapper.querySelector(".image-remove");
        removeBtn.addEventListener("click", () => {
          selectedImages = selectedImages.filter((_, i) => i !== index);
          renderImagePreviews();
        });
        imagePreviews.appendChild(wrapper);
        wrapper.querySelector("img").addEventListener("load", () => {
          URL.revokeObjectURL(url);
        });
      });
      if (imageCount) {
        const total = existingImageUrls.length + selectedImages.length;
        imageCount.textContent = formatMessage("listing_create.image_count", "{count}/{max} selected images.", { count: total, max: MAX_IMAGES });
      }
    }

    function addSelectedImages(files) {
      const incoming = Array.from(files || []);
      if (incoming.length === 0) return;
      const available = MAX_IMAGES - (selectedImages.length + existingImageUrls.length);
      if (available <= 0) {
        feedback.textContent = formatMessage("listing_create.max_images_selected", "You already selected {max} images.", { max: MAX_IMAGES });
        return;
      }
      selectedImages = selectedImages.concat(incoming.slice(0, available));
      if (incoming.length > available) {
        feedback.textContent = formatMessage("listing_create.max_images_allowed", "Only {max} images are allowed.", { max: MAX_IMAGES });
      }
      renderImagePreviews();
    }

    function decodeJwtPayload(token) {
      try {
        const payload = token.split(".")[1];
        if (!payload) return null;
        const normalized = payload.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, "=");
        const json = atob(padded);
        return JSON.parse(json);
      } catch (_err) {
        return null;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function ensureValidSession() {
      const { data, error } = await supabase.auth.getUser();
      if (error || !data?.user) {
        try {
          await supabase.auth.signOut();
        } catch (_err) {
          // Ignore sign-out errors, just clear storage.
        }
        localStorage.removeItem("gimerr-auth-token");
        localStorage.removeItem("gimerr-auth-session");
        window.location.replace("index.html");
        throw new Error(t("listing_create.invalid_session", "Invalid session. Sign in again."));
      }
      currentUser = data.user;
      return data.user;
    }

    function ensureHttpsPrefix(raw) {
      const trimmed = (raw || "").trim();
      if (!trimmed) return "";
      const withoutProtocol = trimmed.replace(/^https?:\/\//i, "");
      const withoutWww = withoutProtocol.replace(/^www\./i, "");
      return `https://${withoutWww}`;
    }

    function normalizeWebsite(raw) {
      const withProtocol = ensureHttpsPrefix(raw);
      if (!withProtocol) return null;
      try {
        const url = new URL(withProtocol);
        url.protocol = "https:";
        url.hash = "";
        const pathname = url.pathname === "/" ? "" : url.pathname.replace(/\/+$/, "");
        const search = url.search || "";
        return `${url.origin}${pathname}${search}`;
      } catch (_err) {
        return null;
      }
    }

    function extractDomainKey(raw) {
      try {
        const url = new URL(ensureHttpsPrefix(raw));
        return url.hostname.toLowerCase().replace(/^www\./, "");
      } catch (_err) {
        return null;
      }
    }

    function normalizeDiscordInvite(raw) {
      const trimmed = String(raw || "").trim();
      if (!trimmed) return null;
      try {
        const withProtocol = ensureHttpsPrefix(trimmed);
        const url = new URL(withProtocol);
        if (url.hostname.toLowerCase() !== "discord.gg") return null;
        if (!url.pathname || url.pathname === "/") return null;
        url.protocol = "https:";
        url.hash = "";
        return `${url.origin}${url.pathname.replace(/\/+$/, "")}`;
      } catch (_err) {
        return null;
      }
    }

    function normalizeR2PublicUrl(urlString) {
      if (!urlString) return "";
      try {
        const r2PublicUrl = String(R2_PUBLIC_URL || "").trim();
        const url = new URL(urlString);
        if (!url.hostname.endsWith(".r2.cloudflarestorage.com")) return urlString;
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length < 2) return urlString;
        const bucket = parts[0];
        const key = parts.slice(1).join("/");
        const accountId = url.hostname.split(".")[0];
        const base = r2PublicUrl ? r2PublicUrl.replace(/\/$/, "") : `https://${bucket}.${accountId}.r2.dev`;
        return `${base}/${key}`;
      } catch (_err) {
        return urlString;
      }
    }

    function parseStoragePath(urlString) {
      try {
        const parsed = new URL(urlString, window.location.origin);
        if (!parsed.pathname.includes("/storage/v1/object/")) return null;
        const marker = "/storage/v1/object/";
        const rawPath = parsed.pathname.slice(parsed.pathname.indexOf(marker) + marker.length);
        const parts = rawPath.split("/").filter(Boolean);
        if (parts.length < 2) return null;
        let bucket = parts[0];
        let pathParts = parts.slice(1);
        if (["public", "authenticated", "sign"].includes(bucket)) {
          bucket = parts[1];
          pathParts = parts.slice(2);
        }
        if (!bucket || pathParts.length === 0) return null;
        return { bucket, path: pathParts.join("/") };
      } catch (_err) {
        return null;
      }
    }

    async function resolveServerLogoUrl(urlString) {
      if (!urlString) return "";
      const normalized = normalizeR2PublicUrl(urlString);
      if (!normalized.includes(SUPABASE_URL) || !normalized.includes("/storage/v1/object/")) {
        return normalized;
      }
      const parsed = parseStoragePath(normalized);
      if (!parsed) return normalized;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || normalized;
      } catch (_err) {
        return normalized;
      }
    }

    async function findExistingServerByDomain(websiteDomain) {
      const normalizedDomain = String(websiteDomain || "").trim().toLowerCase();
      if (!normalizedDomain) return null;

      const localMatch = games.find((game) => String(game.website_domain || "").trim().toLowerCase() === normalizedDomain);
      if (localMatch) return localMatch;

      const { data, error } = await supabase
        .from("servers")
        .select("id,name,official_site,website_domain,status")
        .eq("status", "active")
        .eq("website_domain", normalizedDomain)
        .limit(1)
        .maybeSingle();
      if (error) throw error;
      return data || null;
    }

    async function saveCustomGameSelection() {
      const customName = customGameNameInput?.value?.trim() || "";
      const rawWebsite = customGameSiteInput?.value?.trim() || "";
      const rawDiscord = customGameDiscordInput?.value?.trim() || "";
      const logoFile = customGameLogoInput?.files?.[0] || null;

      if (!customName || !rawWebsite) {
        if (customGameFeedback) customGameFeedback.textContent = t("listing_create.modal_fill_required", "Fill in the game name and official website.");
        return;
      }

      const normalizedWebsite = normalizeWebsite(rawWebsite);
      const websiteDomain = extractDomainKey(rawWebsite);
      if (!normalizedWebsite || !websiteDomain) {
        if (customGameFeedback) customGameFeedback.textContent = t("listing_create.modal_invalid_url", "Enter a valid URL, for example: https://yourgame.com");
        return;
      }

      if (customGameSiteInput) {
        customGameSiteInput.value = normalizedWebsite;
      }

      const discordInvite = rawDiscord ? normalizeDiscordInvite(rawDiscord) : null;
      if (rawDiscord && !discordInvite) {
        if (customGameFeedback) customGameFeedback.textContent = t("listing_create.modal_invalid_discord", "Use an invite that starts with https://discord.gg/");
        return;
      }

      if (logoFile && logoFile.size > MAX_LOGO_BYTES) {
        if (customGameFeedback) customGameFeedback.textContent = t("listing_create.modal_logo_max_size", "Logo deve ter no máximo 3MB.");
        return;
      }

      try {
        const existingServer = await findExistingServerByDomain(websiteDomain);
        if (existingServer?.id) {
          fillGameFromSelection(existingServer);
          setCustomGameMode(false);
          if (gameHelper) gameHelper.textContent = t("listing_create.game_selected", "Selected game.");
          feedback.textContent = formatMessage("listing_create.website_existing_game_selected", "A game is already registered for this official website: {name}. We selected it for you.", {
            name: existingServer.name || t("listing_create.game_found", "game found"),
          });
          closeCustomGameModal();
          return;
        }

        customGameRequested = true;
        customGamePayload = {
          name: customName,
          website: normalizedWebsite,
          websiteDomain,
          discord_invite: discordInvite,
          is_owner: false,
          logoFile,
        };
        if (gameInput) {
          gameInput.value = customName;
          gameInput.dataset.gameId = "";
        }
        if (gameHelper) gameHelper.textContent = t("listing_create.custom_game_ready", "New game ready for review.");
        if (suggestionsPanel) {
          suggestionsPanel.style.display = "none";
          suggestionsPanel.innerHTML = "";
        }
        feedback.textContent = t("listing_create.review_notice", "Your listing will be sent for review before it is published.");
        closeCustomGameModal();
      } catch (err) {
        console.error(err);
        if (customGameFeedback) customGameFeedback.textContent = t("listing_create.modal_validation_error", "Could not validate this website right now. You can still try to submit.");
      }
    }

    function renderSuggestions(term) {
      if (!suggestionsPanel) return;
      if (customGameRequested) {
        suggestionsPanel.style.display = "none";
        suggestionsPanel.innerHTML = "";
        return;
      }
      if (!term || term.length < 2) {
        setCustomGameMode(false);
        suggestionsPanel.style.display = "none";
        suggestionsPanel.innerHTML = "";
        return;
      }
      const normalizedTerm = term.toLowerCase();
      const matches = games.filter((g) => g.name.toLowerCase().includes(normalizedTerm));
      const footer = `
        <div class="suggestion-footer">
          <button type="button" class="link-ghost" data-custom-game-trigger="true">${CUSTOM_GAME_TRIGGER_TEXT}</button>
        </div>
      `;
      if (matches.length === 0) {
        suggestionsPanel.innerHTML = `
          <div class="suggestion-empty">
            <button type="button" class="link-ghost" data-custom-game-trigger="true">${CUSTOM_GAME_TRIGGER_TEXT}</button>
          </div>
        `;
        suggestionsPanel.style.display = "block";
        return;
      }
      if (!customGameRequested) {
        setCustomGameMode(false);
      }
      const items = matches
        .map((g) => {
          const logoUrl = String(g.banner_url || "").trim();
          const logoMarkup = logoUrl
            ? `<img src="${encodeURI(logoUrl)}" alt="" loading="lazy" style="width:28px;height:28px;border-radius:999px;object-fit:cover;border:1px solid var(--border);background:#fff;flex:0 0 28px;" />`
            : "";
          return `<div class="suggestion-item" data-game-id="${g.id}" data-game-name="${g.name}" style="display:flex;align-items:center;gap:10px;">
            ${logoMarkup}
            <span style="min-width:0;flex:1 1 auto;">${escapeHtml(g.name)}</span>
            <span class="badge">${escapeHtml(t("listing_create.select_badge", "Select"))}</span>
          </div>`;
        })
        .join("");
      suggestionsPanel.innerHTML = `${items}${footer}`;
      suggestionsPanel.style.display = "block";
    }

    async function compressLogo(file, maxWidth) {
      const imageBitmap = await createImageBitmap(file);
      const ratio = Math.min(1, maxWidth / imageBitmap.width);
      const width = Math.round(imageBitmap.width * ratio);
      const height = Math.round(imageBitmap.height * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(imageBitmap, 0, 0, width, height);
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error(t("listing_create.logo_compress_error", "Failed to compress the image.")));
            return;
          }
          resolve(blob);
        }, "image/webp", 0.82);
      });
    }

    async function uploadGameLogo(file, userId) {
      const compressed = await compressLogo(file, MAX_LOGO_WIDTH);
      const path = `${userId}/game-logo-${crypto.randomUUID()}.webp`;
      const bucket = supabase.storage.from("server_logos");
      const { error } = await bucket.upload(path, compressed, {
        cacheControl: "3600",
        upsert: false,
        contentType: compressed.type || "image/webp",
      });
      if (error) throw error;
      const { data: publicData, error: publicErr } = bucket.getPublicUrl(path);
      if (publicErr) throw publicErr;
      return publicData.publicUrl;
    }

    async function findWebsiteRecord(website, domainKey) {
      const { data: inServers, error: srvErr } = await supabase
        .from("servers")
        .select("id,official_site,website_domain")
        .eq("website_domain", domainKey)
        .limit(1);
      if (srvErr) throw srvErr;

      const { data: inRequests, error: reqErr } = await supabase
        .from("game_requests")
        .select("id,status,website,website_domain,user_id")
        .eq("website_domain", domainKey)
        .in("status", ["pending", "under_review", "approved"])
        .limit(1);
      if (reqErr) throw reqErr;

      return {
        inServers: Boolean(inServers && inServers.length > 0),
        request: inRequests?.[0] || null,
      };
    }

    async function requestSignedUpload(file) {
      const contentType = file.type || "application/octet-stream";
      const extension = (file.name.split(".").pop() || "").toLowerCase();
      await ensureValidSession();
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) {
        throw new Error(t("listing_create.session_expired", "Session expired. Sign in again."));
      }
      const payload = decodeJwtPayload(token);
      const expectedIss = `${SUPABASE_URL}/auth/v1`;
      if (!payload?.iss || payload.iss !== expectedIss) {
        localStorage.removeItem("gimerr-auth-token");
        localStorage.removeItem("gimerr-auth-session");
        window.location.replace("index.html");
        throw new Error(t("listing_create.invalid_project_session", "Invalid session for this project."));
      }
      const response = await fetch(`${SUPABASE_URL}/functions/v1/r2_sign_upload`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          apikey: SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          contentType,
          extension,
          userToken: token,
        }),
      });
      if (!response.ok) {
        let message = t("listing_create.signed_upload_error", "Error requesting upload.");
        try {
          const payload = await response.json();
          message = payload?.error || message;
        } catch (_err) {
          const text = await response.text();
          if (text) message = text;
        }
        throw new Error(message);
      }
      return response.json();
    }

    async function requestImageDeletion(imageUrls) {
      const keys = Array.isArray(imageUrls)
        ? imageUrls.map((item) => String(item || "").trim()).filter(Boolean)
        : [];
      if (keys.length === 0) {
        return { ok: true, deletedKeys: 0, failedKeys: 0 };
      }

      await ensureValidSession();
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) {
        throw new Error(t("listing_create.session_expired", "Session expired. Sign in again."));
      }

      const response = await fetch(`${SUPABASE_URL}/functions/v1/r2_sign_upload`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          apikey: SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          mode: "delete",
          keys,
          userToken: token,
        }),
      });

      if (!response.ok) {
        let message = t("listing_create.delete_old_images_error", "Error removing old images.");
        try {
          const payload = await response.json();
          message = payload?.error || message;
        } catch (_err) {
          const text = await response.text();
          if (text) message = text;
        }
        throw new Error(message);
      }

      return response.json();
    }

    async function convertToWebp(file) {
      if (file.type === "image/webp") return file;
      const bitmap = await createImageBitmap(file);
      const maxSide = Math.max(bitmap.width, bitmap.height);
      const scale = Math.min(1, MAX_IMAGE_DIMENSION / maxSide);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(bitmap.width * scale));
      canvas.height = Math.max(1, Math.round(bitmap.height * scale));
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/webp", WEBP_QUALITY));
      if (!blob) {
        throw new Error(formatMessage("listing_create.convert_webp_error", "Failed to convert {name} to WebP.", { name: file.name }));
      }
      const baseName = file.name.replace(/\.[^.]+$/, "");
      return new File([blob], `${baseName}.webp`, { type: "image/webp" });
    }

    async function uploadListingImages(files) {
      const uploads = [];
      for (let i = 0; i < files.length; i += 1) {
        const originalFile = files[i];
        if (originalFile.size > MAX_IMAGE_BYTES) {
          throw new Error(formatMessage("listing_create.image_max_size", "Image {name} exceeds 5MB.", { name: originalFile.name }));
        }
        const file = await convertToWebp(originalFile);
        if (file.size > MAX_IMAGE_BYTES) {
          throw new Error(formatMessage("listing_create.image_max_size_after_conversion", "Image {name} exceeds 5MB after compression.", { name: originalFile.name }));
        }
        const signed = await requestSignedUpload(file);
        const uploadRes = await fetch(signed.uploadUrl, {
          method: "PUT",
          headers: {
            "Content-Type": file.type || "application/octet-stream"
          },
          body: file
        });
        if (!uploadRes.ok) {
          throw new Error(formatMessage("listing_create.upload_storage_error", "Failed to upload {name} to storage.", { name: file.name }));
        }
        uploads.push(signed.publicUrl);
      }
      return uploads;
    }

    async function createOrReuseGameRequest(payload) {
      const websiteRecord = await findWebsiteRecord(payload.website, payload.websiteDomain);
      if (websiteRecord.inServers) {
        return { status: "server_exists", request: websiteRecord.request || null };
      }
      if (!websiteRecord.request || websiteRecord.request.user_id === currentUser.id) {
        const requestPayload = {
          name: payload.name,
          website: payload.website,
          discord_invite: payload.discord_invite || null,
          is_owner: Boolean(payload.is_owner),
          cover_url: payload.cover_url || null,
          status: "pending",
          user_id: currentUser.id,
          user_email: currentUser.email || null,
        };
        if (websiteRecord.request?.id && websiteRecord.request.website === payload.website) {
          requestPayload.id = websiteRecord.request.id;
        }
        let { error } = await supabase.from("game_requests").upsert(requestPayload, { onConflict: "website" });
        if (isMissingDiscordInviteColumnError(error)) {
          const { discord_invite: _discordInvite, ...fallbackPayload } = requestPayload;
          const fallback = await supabase.from("game_requests").upsert(fallbackPayload, { onConflict: "website" });
          error = fallback.error;
        }
        if (isMissingOwnerColumnError(error)) {
          const { is_owner: _isOwner, ...fallbackPayload } = requestPayload;
          const fallback = await supabase.from("game_requests").upsert(fallbackPayload, { onConflict: "website" });
          error = fallback.error;
        }
        if (isMissingDiscordInviteColumnError(error) && isMissingOwnerColumnError(error)) {
          const { discord_invite: _discordInvite, is_owner: _isOwner, ...fallbackPayload } = requestPayload;
          const fallback = await supabase.from("game_requests").upsert(fallbackPayload, { onConflict: "website" });
          error = fallback.error;
        }
        if (error) throw error;
        return { status: "created_or_updated", request: websiteRecord.request || null };
      }
      return { status: "reused_other_request", request: websiteRecord.request };
    }

    async function handleSubmit(event) {
      event.preventDefault();
      feedback.textContent = "";
      setSubmitLoading(true);

      try {
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        updateAuthUI();
        if (!currentUser) {
          window.location.href = "index.html";
          return;
        }

        const title = document.getElementById("listing-title").value.trim();
        const gameName = gameInput.value.trim();
        let gameId = gameInput.dataset.gameId;
        const description = descInput.value.trim() || null;
        const files = selectedImages;
        const isEditing = Boolean(editingListing?.id);

        if (!title || !gameName) {
          feedback.textContent = t("listing_create.fill_title_game", "Fill in the title and game.");
          setSubmitLoading(false);
          return;
        }
        if (title.length > MAX_TITLE) {
          feedback.textContent = formatMessage("listing_create.max_title", "The title can have at most {max} characters.", { max: MAX_TITLE });
          setSubmitLoading(false);
          return;
        }

        if (!gameId) {
          const exactGame = findExactGameByName(gameName);
          if (exactGame?.id) {
            gameId = exactGame.id;
            gameInput.dataset.gameId = exactGame.id;
            setCustomGameMode(false);
          }
        }

        const totalImages = existingImageUrls.length + files.length;
        if (totalImages > MAX_IMAGES) {
          feedback.textContent = formatMessage("listing_create.max_images_total", "You can upload at most {max} images.", { max: MAX_IMAGES });
          setSubmitLoading(false);
          return;
        }

        if (gameId) {
          const duplicateListing = await findListingForGame(currentUser.id, gameId, editingListing?.id || null);
          if (duplicateListing) {
            feedback.innerHTML = duplicateListingMessage();
            setSubmitLoading(false);
            return;
          }
        }

        const uploadedImageUrls = files.length > 0 ? await uploadListingImages(files) : [];
        const finalImageUrls = [...existingImageUrls, ...uploadedImageUrls].slice(0, MAX_IMAGES);
        const removedImageUrls = isEditing
          ? originalImageUrls.filter((url) => !finalImageUrls.includes(url))
          : [];

        if (!gameId) {
          if (!customGameRequested || !customGamePayload?.website || !customGamePayload?.websiteDomain) {
            feedback.textContent = formatMessage("listing_create.select_game_or_trigger", 'Select an existing game from the list or click "{trigger}"', { trigger: CUSTOM_GAME_TRIGGER_TEXT });
            if (uploadedImageUrls.length > 0) {
              try {
                await requestImageDeletion(uploadedImageUrls);
              } catch (_cleanupErr) {
                // ignore cleanup failure here
              }
            }
            return;
          }
          const normalizedWebsite = customGamePayload.website;
          const websiteDomain = customGamePayload.websiteDomain;
          const manualGameName = customGamePayload.name || gameName;
          let gameLogoUrl = customGamePayload.cover_url || null;

          if (!gameLogoUrl && customGamePayload.logoFile) {
            gameLogoUrl = await uploadGameLogo(customGamePayload.logoFile, currentUser.id);
            customGamePayload.cover_url = gameLogoUrl;
          }

          const existingServer = await findExistingServerByDomain(websiteDomain);
          if (existingServer?.id) {
            if (uploadedImageUrls.length > 0) {
              try {
                await requestImageDeletion(uploadedImageUrls);
              } catch (_cleanupErr) {
                // ignore cleanup failure here
              }
            }
            fillGameFromSelection(existingServer);
            setCustomGameMode(false);
            feedback.textContent = formatMessage("listing_create.website_existing_game_review", "A game is already registered for this official website: {name}. We selected it for you. Review the details and submit again.", {
              name: existingServer.name || t("listing_create.game_found", "game found"),
            });
            return;
          }

          await createOrReuseGameRequest({
            name: manualGameName,
            website: normalizedWebsite,
            websiteDomain,
            discord_invite: customGamePayload.discord_invite || null,
            is_owner: customGamePayload.is_owner || false,
            cover_url: gameLogoUrl,
          });

          try {
            await createListingReviewRequest({
              user_id: currentUser.id,
              user_email: currentUser.email || null,
              title,
              description,
              images: finalImageUrls,
              game_name: manualGameName,
              website: normalizedWebsite,
              website_domain: websiteDomain,
              status: "pending",
            });
          } catch (requestErr) {
            const isDuplicateRequest = requestErr?.code === "23505"
              && String(requestErr?.message || "").includes("listing_requests_user_domain_pending_idx");
            if (uploadedImageUrls.length > 0) {
              try {
                await requestImageDeletion(uploadedImageUrls);
              } catch (_cleanupErr) {
                // ignore cleanup failure here
              }
            }
            if (isDuplicateRequest) {
              feedback.textContent = duplicateListingRequestMessage();
              return;
            }
            throw requestErr;
          }

          feedback.textContent = t("listing_create.sent_for_review", "Your listing was sent for review. We will review the game before publishing.");
          form.reset();
          gameInput.dataset.gameId = "";
          setCustomGameMode(false);
          existingImageUrls = [];
          originalImageUrls = [];
          selectedImages = [];
          renderImagePreviews();
          updateDescCounter();
          return;
        }

        const payload = {
          server_id: gameId,
          title,
          description,
          images: finalImageUrls,
          status: "active"
        };

        let saveError = null;
        if (isEditing) {
          const { error } = await supabase
            .from("listings")
            .update(payload)
            .eq("id", editingListing.id)
            .eq("user_id", currentUser.id);
          saveError = error;
        } else {
          const { error } = await supabase.from("listings").insert({
            ...payload,
            user_id: currentUser.id,
          });
          saveError = error;
        }
        if (saveError) {
          const isUniqueViolation = saveError.code === "23505" && String(saveError.message || "").includes("listings_user_server_unique");
          if (isUniqueViolation) {
            feedback.innerHTML = duplicateListingMessage();
            setSubmitLoading(false);
            return;
          }
          throw saveError;
        }

        feedback.textContent = isEditing
          ? t("listing_create.updated_success", "Listing updated successfully!")
          : t("listing_create.published_success", "Listing published successfully!");
        if (isEditing) {
          if (removedImageUrls.length > 0) {
            const deleteResult = await requestImageDeletion(removedImageUrls);
            if (!deleteResult?.ok || Number(deleteResult?.failedKeys || 0) > 0) {
              throw new Error(t("listing_create.updated_cleanup_warning", "Listing updated, but not all old images could be removed from storage."));
            }
          }
        }
        window.location.href = "my-listings.html";
        return;
      } catch (err) {
        console.error(err);
        feedback.textContent = err?.message || t("listing_create.publish_error", "Error publishing listing.");
      } finally {
        setSubmitLoading(false);
      }
    }

    gameInput?.addEventListener("input", (event) => {
      gameInput.dataset.gameId = "";
      gameHelper.textContent = DEFAULT_GAME_HELPER_TEXT;
      if (customGameRequested) {
        setCustomGameMode(false);
      }
      renderSuggestions(event.target.value.trim());
    });
    imagesInput?.addEventListener("change", (event) => {
      addSelectedImages(event.target.files);
      imagesInput.value = "";
    });
    suggestionsPanel?.addEventListener("click", handleSuggestionClick);
    saveCustomGameBtn?.addEventListener("click", saveCustomGameSelection);
    closeCustomGameModalBtn?.addEventListener("click", () => {
      closeCustomGameModal();
      if (!customGameRequested) {
        if (gameHelper) gameHelper.textContent = DEFAULT_GAME_HELPER_TEXT;
      }
    });
    customGameModal?.addEventListener("click", (event) => {
      if (event.target === customGameModal) {
        closeCustomGameModal();
      }
    });
    descInput?.addEventListener("input", updateDescCounter);
    authBtn?.addEventListener("click", handleAuthClick);
    avatarBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      userMenu?.classList.toggle("open");
    });
    document.addEventListener("click", (event) => {
      if (!userMenu) return;
      if (!userMenu.contains(event.target)) {
        userMenu.classList.remove("open");
      }
    });
    logoutBtn?.addEventListener("click", async () => {
      try {
        ensureClient();
        await supabase.auth.signOut();
        currentUser = null;
        updateAuthUI();
        window.location.href = "index.html";
      } catch (err) {
        console.error(err);
      }
    });
    function goToCreateListing() {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      window.location.href = "listing-create.html";
    }
    createListingBtn?.addEventListener("click", goToCreateListing);
    menuCreateListing?.addEventListener("click", () => {
      userMenu?.classList.remove("open");
      goToCreateListing();
    });
    form?.addEventListener("submit", handleSubmit);

    (async function init() {
      try {
        applyStaticTranslations();
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        updateAuthUI();
        if (!currentUser) {
          window.location.replace("index.html");
          return;
        }
        await ensureValidSession();
        const profile = await fetchUserProfile(currentUser.id);
        if (!profile?.phone_verified) {
          window.location.replace("profile.html?phone_required=1");
          return;
        }
        await fetchGames();
        updateDescCounter();
        await loadEditingListing();
        revealPage();
      } catch (err) {
        console.error(err);
        feedback.textContent = err?.message || t("listing_create.init_error", "Error starting page.");
        revealPage();
      }
    })();
  </script>
</body>
</html>
