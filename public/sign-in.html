<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-2685595309963345" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta property="og:image:alt" content="Gimerr" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta name="twitter:image:alt" content="Gimerr" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <title>Gimerr - Sign in</title>
  <link rel="stylesheet" href="css/global.css" />
  <style>
    .sign-in-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sign-in-main {
      flex: 1;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 32px 0;
    }

    .sign-in-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(248,250,252,0.98));
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      min-height: min(72vh, 760px);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      overflow: hidden;
    }

    .sign-in-brand {
      padding: clamp(28px, 5vw, 56px);
      display: grid;
      align-content: center;
      gap: 18px;
      background:
        radial-gradient(circle at top left, rgba(14,165,233,0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(15,23,42,0.08), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(244,247,251,0.96));
    }

    .sign-in-brand img {
      width: min(260px, 100%);
      height: auto;
      display: block;
    }

    .sign-in-action h1 {
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      margin: 0;
    }

    .sign-in-brand p {
      margin: 0;
      max-width: 520px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.6;
    }

    .sign-in-action {
      padding: clamp(28px, 5vw, 56px);
      display: grid;
      align-content: center;
      gap: 16px;
      border-left: 1px solid var(--border);
      background: #fff;
    }

    .sign-in-action h2 {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
    }

    .sign-in-action p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .sign-in-action .btn {
      width: 100%;
      justify-content: center;
      min-height: 52px;
      font-size: 15px;
    }

    .sign-in-feedback {
      min-height: 18px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .sign-in-card {
        grid-template-columns: 1fr;
      }

      .sign-in-action {
        border-left: 0;
        border-top: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <div class="sign-in-shell">
    <main class="sign-in-main">
      <section class="sign-in-card">
        <div class="sign-in-brand">
          <img src="img/logo.png" alt="Gimerr" />
          <p id="sign-in-tagline">Community marketplace powered by gamers.</p>
        </div>
        <div class="sign-in-action">
          <h1 id="sign-in-title">Sign in to Gimerr</h1>
          <h2 id="sign-in-action-title">Continue with Google</h2>
          <button id="sign-in-google-btn" class="btn btn-primary" type="button">
            <img src="img/google.svg" alt="" class="btn-google-logo" />
            <span id="sign-in-google-label">Sign in with Google</span>
          </button>
          <p id="sign-in-feedback" class="sign-in-feedback"></p>
        </div>
      </section>
    </main>

    <site-footer></site-footer>
  </div>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/site-footer.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    const i18n = window.__I18N__ || { t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const env = window.__ENV || {};
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";

    const titleEl = document.getElementById("sign-in-title");
    const taglineEl = document.getElementById("sign-in-tagline");
    const actionTitleEl = document.getElementById("sign-in-action-title");
    const buttonEl = document.getElementById("sign-in-google-btn");
    const buttonLabelEl = document.getElementById("sign-in-google-label");
    const feedbackEl = document.getElementById("sign-in-feedback");

    if (titleEl) titleEl.textContent = t("signin.title", "Sign in to Gimerr");
    if (taglineEl) taglineEl.textContent = t("common.brand_tagline", "Community marketplace powered by gamers.");
    if (actionTitleEl) actionTitleEl.textContent = t("signin.action_title", "Continue with Google");
    if (buttonLabelEl) buttonLabelEl.textContent = t("nav.login_google", "Sign in with Google");

    function getClient() {
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        throw new Error(t("signin.env_error", "Supabase is not configured."));
      }
      return createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storageKey: "gimerr-auth-token",
        },
      });
    }

    function getNextPath() {
      const params = new URLSearchParams(window.location.search);
      const raw = String(params.get("next") || "/index.html").trim();
      if (!raw) return "/index.html";
      try {
        if (/^https?:\/\//i.test(raw)) {
          const parsed = new URL(raw, window.location.origin);
          if (parsed.origin !== window.location.origin) return "/index.html";
          return `${parsed.pathname}${parsed.search || ""}`;
        }
      } catch (_err) {
        return "/index.html";
      }
      return raw.startsWith("/") ? raw : `/${raw}`;
    }

    async function bootstrap() {
      try {
        const client = getClient();
        const { data } = await client.auth.getSession();
        if (data?.session?.user) {
          window.location.replace(getNextPath());
        }
      } catch (err) {
        if (feedbackEl) feedbackEl.textContent = err?.message || t("signin.env_error", "Supabase is not configured.");
      }
    }

    async function handleGoogleSignIn() {
      try {
        if (buttonEl) buttonEl.disabled = true;
        if (feedbackEl) feedbackEl.textContent = t("signin.wait", "Please wait...");
        const client = getClient();
        const redirectTo = `${window.location.origin}${getNextPath()}`;
        const { error } = await client.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo },
        });
        if (error) throw error;
      } catch (err) {
        if (feedbackEl) feedbackEl.textContent = err?.message || t("signin.auth_error", "Authentication error.");
        if (buttonEl) buttonEl.disabled = false;
      }
    }

    buttonEl?.addEventListener("click", handleGoogleSignIn);
    bootstrap();
  </script>
</body>
</html>
