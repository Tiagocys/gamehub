  <style>
    .seller-profile-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
    }

    .seller-profile-link:hover {
      text-decoration: underline;
    }

    .listing-server-link {
      width: fit-content;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff, #f7faff);
      box-shadow: 0 10px 24px rgba(12, 21, 51, 0.06);
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .listing-server-link:hover {
      background: linear-gradient(180deg, #ffffff, #f2f7ff);
    }

    .listing-server-logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      object-fit: contain;
      background: #fff;
      border: 1px solid var(--border);
      display: block;
      flex: 0 0 auto;
      padding: 4px;
      box-shadow: 0 8px 18px rgba(12, 21, 51, 0.08);
    }

    .listing-server-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seller-profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fff;
      display: block;
    }

    .seller-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .seller-discord {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      word-break: break-word;
    }

    .seller-discord-icon {
      width: 14px;
      height: 14px;
      object-fit: contain;
      display: block;
    }

    .seller-recommendations {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #76a8ff;
      font-weight: 700;
      white-space: nowrap;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .seller-rating {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .seller-recommendations img {
      width: 14px;
      height: 14px;
      object-fit: contain;
      display: block;
    }

    .listing-report-card {
      margin-top: 2px;
      padding: 12px;
    }

    .report-trigger {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .listing-report-card .report-trigger + .report-trigger {
      margin-top: 8px;
    }

    .listing-gallery-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .listing-gallery-main .listing-gallery-fallback img {
      width: min(220px, 72%);
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0.18;
      filter: saturate(0.7);
      cursor: default;
    }

    .report-icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
      display: block;
    }

    .report-form {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(12, 21, 51, 0.03);
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .report-form textarea {
      min-height: 92px;
      resize: vertical;
    }

    .report-feedback {
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }

    .report-success-banner {
      margin-top: 10px;
      border: 1px solid #bfe6c8;
      border-radius: 12px;
      padding: 10px 12px;
      background: #ecfff1;
      color: #146c2e;
      font-size: 14px;
    }

    .listing-share-actions {
      margin-top: 2px;
    }

    .share-modal-card {
      width: min(620px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .share-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .share-modal-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .share-modal-close {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .share-qr {
      width: min(420px, 100%);
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      object-fit: contain;
      padding: 12px;
      margin-inline: auto;
      display: block;
    }

    .share-link-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    .share-link-row .input {
      min-width: 0;
    }

    .share-feedback {
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .share-link-row {
        grid-template-columns: 1fr;
      }
    }

    .recommenders-modal {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(12, 21, 51, 0.56);
    }

    .recommenders-modal.open {
      display: flex;
    }

    .recommenders-modal-card {
      width: min(560px, 100%);
      max-height: min(80vh, 640px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .recommenders-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }

    .recommenders-modal-head h3 {
      font-size: 18px;
      margin: 0;
    }

    .recommenders-modal-close {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .recommenders-wrap {
      overflow-y: auto;
      display: grid;
      gap: 0;
    }

    .recommender-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--ink);
    }

    .recommender-item:last-child {
      border-bottom: none;
    }

    .recommender-item:hover {
      background: rgba(14, 165, 233, 0.08);
    }

    .recommender-avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #fff;
      display: block;
    }

    .recommender-name {
      font-weight: 700;
      font-size: 13px;
      line-height: 1.2;
    }

    .recommenders-empty {
      padding: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .recommenders-loading {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: rgba(12, 21, 51, 0.02);
    }
  </style>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <img src="img/logo.png" alt="Loading" />
  </div>
  <div class="page">
    <site-navbar search-enabled="games"></site-navbar>

    <main class="section listing-page">
      <div class="listing-hero-card">
        <div class="listing-hero-copy">
          <a id="listing-server-link" class="listing-server-link" href="#" style="display:none;">
            <img id="listing-server-logo" class="listing-server-logo" src="img/logo.png" alt="" />
            <span id="listing-server-name" class="listing-server-name"></span>
          </a>
          <h1 id="listing-title">Loading...</h1>
          <div class="seller-meta-row">
            <a id="seller-profile-link" class="seller-profile-link" href="#" style="display:none;"></a>
            <span id="seller-rating" class="seller-rating" style="display:none;"></span>
            <button id="seller-recommendations" class="seller-recommendations" type="button" style="display:none;" aria-expanded="false"></button>
          </div>
          <span id="seller-discord" class="seller-discord" style="display:none;"></span>
          <div id="listing-contact-actions" class="inline-actions listing-contact-actions" style="display:none;">
            <a id="telegram-chat" class="btn btn-telegram btn-contact-cta" href="#" target="_blank" rel="noopener" style="display:none;">
              Conversar no Telegram
              <img src="img/telegram.webp" alt="" class="btn-icon" />
            </a>
            <a id="whatsapp-chat" class="btn btn-whatsapp btn-contact-cta" href="#" target="_blank" rel="noopener" style="display:none;">
              Conversar no WhatsApp
              <img src="img/wtsp.png" alt="" class="btn-icon" />
            </a>
          </div>
          <div id="listing-meta" class="pill-trail"></div>
          <p id="listing-description" class="listing-description-preserve">Loading description...</p>
        </div>
        <div class="listing-gallery">
          <div id="listing-main" class="listing-gallery-main"></div>
          <div id="listing-thumbs" class="listing-thumb-grid"></div>
          <section id="report-listing-card" class="hero-card listing-report-card">
            <button id="report-listing-btn" class="btn btn-ghost report-trigger" type="button">
              <img src="img/flag.png" alt="" class="report-icon" />
              <span id="report-listing-btn-label">Report listing</span>
            </button>
            <button id="listing-share-btn" class="btn btn-ghost report-trigger" type="button">
              Share listing
            </button>
            <div id="report-listing-form" class="report-form" style="display:none;">
              <label for="report-listing-reason">Describe the issue</label>
              <textarea id="report-listing-reason" placeholder="Explain why this listing should be reviewed."></textarea>
              <label for="report-listing-files">Attachments (optional, up to 4 images)</label>
              <input id="report-listing-files" class="input" type="file" accept="image/*" multiple />
              <div id="report-listing-files-info" class="helper">No images selected.</div>
              <div class="inline-actions">
                <button id="report-listing-submit" class="btn btn-primary" type="button">Submit report</button>
                <button id="report-listing-delete" class="btn btn-danger" type="button" style="display:none;">Delete listing</button>
                <button id="report-listing-cancel" class="btn btn-ghost" type="button">Cancel</button>
              </div>
              <div id="report-listing-feedback" class="report-feedback"></div>
            </div>
            <div id="report-listing-success" class="report-success-banner" style="display:none;" role="status" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </main>

  </div>
  <div id="recommenders-modal" class="recommenders-modal" aria-hidden="true">
    <div class="recommenders-modal-card">
      <div class="recommenders-modal-head">
        <h3>Users who recommended</h3>
        <button id="recommenders-modal-close" class="recommenders-modal-close" type="button" aria-label="Close">×</button>
      </div>
      <div id="recommenders-wrap" class="recommenders-wrap">
        <div id="recommenders-list"></div>
        <div id="recommenders-loading" class="recommenders-loading" style="display:none;">Loading more profiles...</div>
      </div>
      <p id="recommenders-empty" class="recommenders-empty" style="display:none;">No recommendations yet.</p>
    </div>
  </div>
  <div id="share-modal" class="recommenders-modal" aria-hidden="true">
    <div class="share-modal-card">
      <div class="share-modal-head">
        <h3>Share listing</h3>
        <button id="share-modal-close" class="share-modal-close" type="button" aria-label="Close">×</button>
      </div>
      <img id="share-qr-img" class="share-qr" src="" alt="Listing QR code" />
      <label for="share-link-input">Listing link</label>
      <div class="share-link-row">
        <input id="share-link-input" class="input" type="text" readonly />
        <button id="share-copy-btn" class="btn btn-ghost" type="button">Copiar</button>
        <button id="share-copy-qr-btn" class="btn btn-ghost" type="button">Copiar QR</button>
      </div>
      <div class="inline-actions">
        <button id="share-native-btn" class="btn btn-primary" type="button">Share</button>
      </div>
      <div id="share-feedback" class="share-feedback"></div>
    </div>
  </div>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/site-navbar.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";
    import QRCode from "https://esm.sh/qrcode@1.5.4";

    await (window.__NAVBAR_READY__ || Promise.resolve());
    const i18n = window.__I18N__ || { t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const formatMessage = (key, fallback, params = {}) => Object.entries(params).reduce(
      (message, [paramKey, value]) => message.replaceAll(`{${paramKey}}`, String(value ?? "")),
      t(key, fallback),
    );

    const env = window.__ENV || {};
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";
    const R2_PUBLIC_URL = env.R2_PUBLIC_URL || "";
    const R2_BUCKET = env.R2_BUCKET || "";

    const authBtn = document.getElementById("auth-btn");
    const userMenu = document.getElementById("user-menu");
    const avatarBtn = document.getElementById("avatar-btn");
    const avatarImg = document.getElementById("avatar-img");
    const logoutBtn = document.getElementById("logout-btn");
    const createListingBtn = document.getElementById("create-listing-btn");
    const menuCreateListing = document.getElementById("menu-create-listing");
    const profileLink = document.getElementById("profile-link");
    const titleEl = document.getElementById("listing-title");
    const sellerProfileLink = document.getElementById("seller-profile-link");
    const sellerRating = document.getElementById("seller-rating");
    const sellerDiscord = document.getElementById("seller-discord");
    const sellerRecommendations = document.getElementById("seller-recommendations");
    const shareBtn = document.getElementById("listing-share-btn");
    const descriptionEl = document.getElementById("listing-description");
    const metaEl = document.getElementById("listing-meta");
    const listingServerLink = document.getElementById("listing-server-link");
    const listingServerLogo = document.getElementById("listing-server-logo");
    const listingServerName = document.getElementById("listing-server-name");
    const contactActionsRow = document.getElementById("listing-contact-actions");
    const telegramChat = document.getElementById("telegram-chat");
    const whatsappChat = document.getElementById("whatsapp-chat");
    const mainMedia = document.getElementById("listing-main");
    const thumbGrid = document.getElementById("listing-thumbs");
    const reportListingBtn = document.getElementById("report-listing-btn");
    const reportListingBtnLabel = document.getElementById("report-listing-btn-label");
    const reportListingCard = document.getElementById("report-listing-card");
    const reportListingForm = document.getElementById("report-listing-form");
    const reportListingReason = document.getElementById("report-listing-reason");
    const reportListingFiles = document.getElementById("report-listing-files");
    const reportListingFilesInfo = document.getElementById("report-listing-files-info");
    const reportListingSubmit = document.getElementById("report-listing-submit");
    const reportListingDelete = document.getElementById("report-listing-delete");
    const reportListingCancel = document.getElementById("report-listing-cancel");
    const reportListingFeedback = document.getElementById("report-listing-feedback");
    const reportListingSuccess = document.getElementById("report-listing-success");
    const recommendersModal = document.getElementById("recommenders-modal");
    const recommendersModalClose = document.getElementById("recommenders-modal-close");
    const recommendersWrap = document.getElementById("recommenders-wrap");
    const recommendersList = document.getElementById("recommenders-list");
    const recommendersLoadingEl = document.getElementById("recommenders-loading");
    const recommendersEmpty = document.getElementById("recommenders-empty");
    const shareModal = document.getElementById("share-modal");
    const shareModalClose = document.getElementById("share-modal-close");
    const shareQrImg = document.getElementById("share-qr-img");
    const shareLinkInput = document.getElementById("share-link-input");
    const shareCopyBtn = document.getElementById("share-copy-btn");
    const shareCopyQrBtn = document.getElementById("share-copy-qr-btn");
    const shareNativeBtn = document.getElementById("share-native-btn");
    const shareFeedback = document.getElementById("share-feedback");

    const pageLoader = document.getElementById("page-loader");
    let loaderDone = false;
    let windowLoaded = false;
    let avatarReady = false;
    let criticalAssetsReady = false;

    function hideLoader() {
      if (loaderDone || !pageLoader) return;
      if (!windowLoaded || !avatarReady || !criticalAssetsReady) return;
      loaderDone = true;
      pageLoader.classList.add("hidden");
      pageLoader.remove();
    }

    function markAvatarReady() {
      avatarReady = true;
      hideLoader();
    }

    function markCriticalAssetsReady() {
      criticalAssetsReady = true;
      hideLoader();
    }

    window.addEventListener("load", () => {
      windowLoaded = true;
      hideLoader();
    });

    let supabase;
    let currentUser = null;
    let currentUserProfile = null;
    let avatarLoaded = false;
    let currentListing = null;
    let currentGalleryImages = [];
    let lightboxImages = [];
    let lightboxIndex = 0;
    let lightboxRoot = null;
    let recommendersTargetUserId = null;
    let recommendersOffset = 0;
    let recommendersHasMore = true;
    let recommendersLoading = false;
    let recommendersFetched = false;
    const RECOMMENDERS_PAGE_SIZE = 8;
    const REPORT_MAX_ATTACHMENTS = 4;
    const REPORT_MAX_FILE_BYTES = 6 * 1024 * 1024;
    const REPORT_MAX_DIMENSION = 1600;
    const REPORT_WEBP_QUALITY = 0.82;
    let reportSuccessTimer = null;
    let shareUrl = "";
    let shareCardDataUrl = "";
    if (avatarImg) avatarImg.referrerPolicy = "no-referrer";

    document.title = t("listing.title_default", "Gimerr - Listing");
    if (titleEl) titleEl.textContent = t("listing.loading", "Loading...");
    if (descriptionEl) descriptionEl.textContent = t("listing.loading_description", "Loading description...");
    const loaderImage = pageLoader?.querySelector("img");
    if (loaderImage) loaderImage.alt = t("listing.page_loading", "Loading");
    if (telegramChat) {
      telegramChat.childNodes[0].textContent = t("listing.telegram_cta", "Chat on Telegram");
    }
    if (whatsappChat) {
      whatsappChat.childNodes[0].textContent = t("listing.whatsapp_cta", "Chat on WhatsApp");
    }
    if (reportListingBtnLabel) reportListingBtnLabel.textContent = t("listing.report_button", "Report listing");
    if (shareBtn) shareBtn.textContent = t("listing.share_button", "Share listing");
    const reportReasonLabel = document.querySelector('label[for="report-listing-reason"]');
    if (reportReasonLabel) reportReasonLabel.textContent = t("listing.report_problem_label", "Describe the issue");
    if (reportListingReason) reportListingReason.placeholder = t("listing.report_problem_placeholder", "Explain why this listing should be reviewed.");
    const reportFilesLabel = document.querySelector('label[for="report-listing-files"]');
    if (reportFilesLabel) reportFilesLabel.textContent = t("listing.report_files_label", "Attachments (optional, up to 4 images)");
    if (reportListingFilesInfo) reportListingFilesInfo.textContent = t("listing.report_files_empty", "No images selected.");
    if (reportListingSubmit) reportListingSubmit.textContent = t("listing.report_submit", "Submit report");
    if (reportListingDelete) reportListingDelete.textContent = t("listing.report_delete_submit", "Delete listing");
    if (reportListingCancel) reportListingCancel.textContent = t("listing.cancel", "Cancel");
    const recommendersTitle = document.querySelector(".recommenders-modal-head h3");
    if (recommendersTitle) recommendersTitle.textContent = t("listing.recommenders_title", "Users who recommended");

    async function waitForImageElement(imageEl, timeoutMs = 1400) {
      if (!(imageEl instanceof HTMLImageElement)) return;
      if (imageEl.complete) {
        if (typeof imageEl.decode === "function") {
          try {
            await imageEl.decode();
          } catch (_err) {
            // Ignore decode failures and keep the loader moving.
          }
        }
        return;
      }
      await new Promise((resolve) => {
        const timeout = window.setTimeout(() => {
          imageEl.removeEventListener("load", done);
          imageEl.removeEventListener("error", done);
          resolve(null);
        }, timeoutMs);
        const done = () => {
          window.clearTimeout(timeout);
          imageEl.removeEventListener("load", done);
          imageEl.removeEventListener("error", done);
          resolve(null);
        };
        imageEl.addEventListener("load", done, { once: true });
        imageEl.addEventListener("error", done, { once: true });
      });
    }

        titleEl.textContent = t("listing.supabase_not_configured", "Supabase is not configured.");

      if (!supabase) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storageKey: "gimerr-auth-token",
          },
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user || null;

    function drawWrappedText(ctx, text, x, startY, maxWidth, lineHeight, maxLines = Infinity) {
      const words = String(text || "").split(/\s+/).filter(Boolean);
      const lines = [];
      let currentLine = "";
      words.forEach((word) => {
        const testLine = currentLine ? `${currentLine} ${word}` : word;
        if (ctx.measureText(testLine).width <= maxWidth || !currentLine) {
          currentLine = testLine;
        } else {
          lines.push(currentLine);
          currentLine = word;
        }
      });
      if (currentLine) lines.push(currentLine);
      const finalLines = Number.isFinite(maxLines) ? lines.slice(0, maxLines) : lines;
      if (Number.isFinite(maxLines) && lines.length > maxLines && finalLines.length > 0) {
        const lastIndex = finalLines.length - 1;
        finalLines[lastIndex] = `${finalLines[lastIndex].replace(/[.…]*$/, "")}...`;
      }
      finalLines.forEach((line, index) => {
        ctx.fillText(line, x, startY + (index * lineHeight));
      });
      return finalLines.length;
    }

    async function buildShareCard(url) {
      const qrDataUrl = await QRCode.toDataURL(url, {
        width: 420,
        margin: 1,
        color: {
          dark: "#0f172a",
          light: "#ffffff",
        },
      });
      const [logoImg, qrImg] = await Promise.all([
        loadImage("img/logo.png"),
        loadImage(qrDataUrl),
      ]);
      const canvas = document.createElement("canvas");
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvas unavailable");

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#f8fafc";
      ctx.strokeStyle = "#dbe2ef";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(24, 24, canvas.width - 48, canvas.height - 48, 28);
      ctx.fill();
      ctx.stroke();

      const leftColumnX = 72;
      const leftColumnWidth = 520;
      const qrSize = 360;
      const qrX = canvas.width - 96 - qrSize;
      const qrY = Math.round((canvas.height - qrSize) / 2) - 12;
      const logoMaxWidth = 300;
      const logoMaxHeight = 84;
      const logoRatio = Math.min(
        logoMaxWidth / (logoImg.naturalWidth || logoImg.width || logoMaxWidth),
        logoMaxHeight / (logoImg.naturalHeight || logoImg.height || logoMaxHeight),
      );
      const logoWidth = Math.round((logoImg.naturalWidth || logoImg.width || logoMaxWidth) * logoRatio);
      const logoHeight = Math.round((logoImg.naturalHeight || logoImg.height || logoMaxHeight) * logoRatio);
      const logoX = Math.round(leftColumnX + ((leftColumnWidth - logoWidth) / 2));
      const logoY = 94;
      ctx.drawImage(logoImg, logoX, logoY, logoWidth, logoHeight);

      ctx.strokeStyle = "#dbe2ef";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(648, 88);
      ctx.lineTo(648, canvas.height - 88);
      ctx.stroke();

      const listingTitle = String(currentListing?.title || "").trim();
      if (listingTitle) {
        ctx.fillStyle = "#0f172a";
        ctx.font = "700 46px Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        drawWrappedText(
          ctx,
          listingTitle,
          leftColumnX + (leftColumnWidth / 2),
          248,
          leftColumnWidth,
          54,
          3,
        );
      }

      ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

      ctx.fillStyle = "#64748b";
      ctx.font = "600 28px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("gimerr.com", qrX + (qrSize / 2), qrY + qrSize + 24);

      return canvas.toDataURL("image/png");
    }

    async function loadMoreRecommenders({ reset = false } = {}) {
      if (!recommendersTargetUserId || recommendersLoading) return;
      if (!reset && !recommendersHasMore) return;

      if (reset) {
        recommendersOffset = 0;
        recommendersHasMore = true;
        if (recommendersList) recommendersList.innerHTML = "";
      }

      recommendersLoading = true;
      setRecommendersLoading(true);
      try {
        const from = recommendersOffset;
        const to = recommendersOffset + RECOMMENDERS_PAGE_SIZE - 1;
        const { data, error } = await supabase
          .from("recommendations")
          .select("id,author_id,created_at")
          .eq("user_id", recommendersTargetUserId)
          .order("created_at", { ascending: false })
          .range(from, to);
        if (error) throw error;

        const rows = data || [];
        if (reset && rows.length === 0) {
          renderRecommendersEmpty(true);
          recommendersHasMore = false;
          return;
        }

        renderRecommendersEmpty(false);
        recommendersOffset += rows.length;
        if (rows.length < RECOMMENDERS_PAGE_SIZE) {
          recommendersHasMore = false;
        }

        const authorIds = Array.from(new Set(rows.map((row) => row.author_id).filter(Boolean)));
        let usersMap = new Map();
        if (authorIds.length > 0) {
          const { data: usersData, error: usersError } = await supabase
            .from("users")
            .select("id,first_name,last_name,avatar_url")
            .in("id", authorIds);
          if (usersError) throw usersError;
          usersMap = new Map((usersData || []).map((user) => [user.id, user]));
        }

        rows.forEach((row) => {
          appendRecommenderItem(row, usersMap.get(row.author_id));
        });
      } catch (err) {
        console.error(err);
      } finally {
        recommendersLoading = false;
        setRecommendersLoading(false);
      }
    }

    async function convertImageToWebp(file) {
      if (!file?.type || !file.type.startsWith("image/")) {
        throw new Error(t("listing.report_invalid_file", "Select only valid images for the attachments."));
      }
      if (file.size > REPORT_MAX_FILE_BYTES) {
        throw new Error(t("listing.report_max_file_size", "Each attachment image must be at most 6MB."));
      }
      const bitmap = await createImageBitmap(file);
      const maxSide = Math.max(bitmap.width, bitmap.height);
      const scale = Math.min(1, REPORT_MAX_DIMENSION / maxSide);
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(bitmap.width * scale));
      canvas.height = Math.max(1, Math.round(bitmap.height * scale));
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error(t("listing.report_process_image_error", "Failed to process the attachment image."));
      ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/webp", REPORT_WEBP_QUALITY));
      if (!blob) throw new Error(t("listing.report_convert_webp_error", "Failed to convert the attachment to WebP."));
      const baseName = file.name.replace(/\.[^.]+$/, "") || "report";
      return new File([blob], `${baseName}.webp`, { type: "image/webp" });
    }

    async function requestReportSignedUpload(file) {
      ensureClient();
      const { data } = await supabase.auth.getSession();
      const token = data.session?.access_token;
      if (!token) throw new Error(t("listing.session_expired", "Session expired. Sign in again."));

      const extension = (file.name.split(".").pop() || "").toLowerCase();
      const response = await fetch(`${SUPABASE_URL}/functions/v1/r2_sign_upload`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          apikey: SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          contentType: file.type || "application/octet-stream",
          extension,
          userToken: token,
          assetType: "report",
        }),
      });
      if (!response.ok) {
        const payload = await response.json().catch(() => ({}));
        throw new Error(payload?.error || t("listing.report_signed_upload_error", "Error requesting attachment upload."));
      }
      return response.json();
    }

    async function uploadReportEvidence(files, onProgress) {
      const uploaded = [];
      for (let index = 0; index < files.length; index += 1) {
        const webp = await convertImageToWebp(files[index]);
        const signed = await requestReportSignedUpload(webp);
        const uploadRes = await fetch(signed.uploadUrl, {
          method: "PUT",
          headers: {
            "Content-Type": webp.type || "application/octet-stream",
          },
          body: webp,
        });
        if (!uploadRes.ok) throw new Error(t("listing.report_upload_error", "Failed to upload the report attachment."));
        uploaded.push(signed.publicUrl);
        if (typeof onProgress === "function") onProgress(index + 1, files.length);
      }
      return uploaded.filter(Boolean);
    }

      const token = data.session?.access_token || "";

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function parseStoragePath(urlString) {
      try {
        const url = new URL(urlString);
        const marker = "/storage/v1/object/";
        const idx = url.pathname.indexOf(marker);
        if (idx === -1) return null;
        const rest = url.pathname.substring(idx + marker.length);
        const parts = rest.split("/");
        if (parts.length === 0) return null;
        let bucket = parts[0];
        let pathParts = parts.slice(1);
        if (bucket === "public" || bucket === "authenticated" || bucket === "sign") {
          bucket = parts[1];
          pathParts = parts.slice(2);
        }
        if (!bucket || pathParts.length === 0) return null;
        return { bucket, path: pathParts.join("/") };
      } catch (_err) {
        return null;
      }
    }

    function normalizeR2PublicUrl(urlString) {
      try {
        const url = new URL(urlString);
        if (R2_PUBLIC_URL) {
          const publicHost = new URL(R2_PUBLIC_URL).host;
          const accountId = url.hostname.split(".")[1] || "";
          const expectedBucketHost = R2_BUCKET && accountId ? `${R2_BUCKET}.${accountId}.r2.dev` : "";
          if (url.hostname === expectedBucketHost && url.hostname !== publicHost) {
            return `${R2_PUBLIC_URL.replace(/\/$/, "")}${url.pathname}`;
          }
        }
        if (!url.hostname.endsWith(".r2.cloudflarestorage.com")) return urlString;
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length === 0) return urlString;
        const accountId = url.hostname.split(".")[0];
        let bucket = R2_BUCKET;
        let keyParts = parts;
        if (bucket) {
          if (parts[0] === bucket) {
            keyParts = parts.slice(1);
          }
        } else {
          bucket = parts[0];
          keyParts = parts.slice(1);
        }
        if (!bucket || keyParts.length === 0) return urlString;
        const base = R2_PUBLIC_URL ? R2_PUBLIC_URL.replace(/\/$/, "") : `https://${bucket}.${accountId}.r2.dev`;
        return `${base}/${keyParts.join("/")}`;
      } catch (_err) {
        return urlString;
      }
    }

    async function resolveImageUrl(urlString) {
      if (!urlString) return urlString;
      const normalized = normalizeR2PublicUrl(urlString);
      if (!normalized.includes(SUPABASE_URL) || !normalized.includes("/storage/v1/object/")) {
        return normalized;
      }
      const parsed = parseStoragePath(normalized);
      if (!parsed) return normalized;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || normalized;
      } catch (err) {
        console.warn("Failed to sign listing image", err);
        return normalized;
      }
    }

    async function resolveImageUrls(images) {
      const list = Array.isArray(images) ? images : [];
      const resolved = await Promise.all(list.map((url) => resolveImageUrl(url)));
      return resolved.filter(Boolean);
    }

      `;
      document.body.appendChild(lightboxRoot);
      lightboxRoot.addEventListener("click", (event) => {
        const action = event.target?.getAttribute("data-action");
        if (event.target === lightboxRoot || action === "close") {
          closeLightbox();
          return;
        }
        if (action === "prev") {
          lightboxIndex = Math.max(0, lightboxIndex - 1);
          renderLightbox();
          return;
        }
        if (action === "next") {
          lightboxIndex = Math.min(lightboxImages.length - 1, lightboxIndex + 1);
          renderLightbox();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (!lightboxRoot?.classList.contains("open")) return;
        if (event.key === "Escape") {
          closeLightbox();
          return;
        }
        if (event.key === "ArrowLeft") {
          lightboxIndex = Math.max(0, lightboxIndex - 1);
          renderLightbox();
          return;
        }
        if (event.key === "ArrowRight") {
          lightboxIndex = Math.min(lightboxImages.length - 1, lightboxIndex + 1);
          renderLightbox();
        }
      });
      return lightboxRoot;
    }

    function renderLightbox() {
      if (!lightboxRoot) return;
      const imageEl = lightboxRoot.querySelector(".image-lightbox-img");
      const countEl = lightboxRoot.querySelector(".image-lightbox-count");
      const prevBtn = lightboxRoot.querySelector('[data-action="prev"]');
      const nextBtn = lightboxRoot.querySelector('[data-action="next"]');
      const hasMany = lightboxImages.length > 1;
      imageEl.src = lightboxImages[lightboxIndex] || "";
      countEl.textContent = `${lightboxIndex + 1}/${Math.max(1, lightboxImages.length)}`;
      prevBtn.disabled = !hasMany || lightboxIndex <= 0;
      nextBtn.disabled = !hasMany || lightboxIndex >= lightboxImages.length - 1;
    }

    function openLightbox(images, index = 0) {
      if (!Array.isArray(images) || images.length === 0) return;
      ensureLightbox();
      lightboxImages = images.slice();
      lightboxIndex = Math.min(Math.max(index, 0), lightboxImages.length - 1);
      renderLightbox();
      lightboxRoot.classList.add("open");
      document.body.classList.add("no-scroll");
    }

    function closeLightbox() {
      if (!lightboxRoot) return;
      lightboxRoot.classList.remove("open");
      document.body.classList.remove("no-scroll");
    }

    function truncateShareDescription(value, maxLength = 160) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      if (!text) return "";
      if (text.length <= maxLength) return text;
      return `${text.slice(0, maxLength - 3).trimEnd()}...`;
    }

    function setMetaContent(selector, content) {
      const element = document.head.querySelector(selector);
      if (!element || !content) return;
      element.setAttribute("content", content);
    }

    function setLinkHref(selector, href) {
      const element = document.head.querySelector(selector);
      if (!element || !href) return;
      element.setAttribute("href", href);
    }

    function syncShareMeta({ title, description, url, image }) {
      const safeTitle = title || "Gimerr - Listing";
      const safeDescription = description || "Discover listings from the gaming community on Gimerr.";
      const safeUrl = url || `${window.location.origin}/listing.html`;
      const safeImage = image || `${window.location.origin}/img/meta-listing.png`;

      setMetaContent('meta[name="description"]', safeDescription);
      setMetaContent('meta[property="og:title"]', safeTitle);
      setMetaContent('meta[property="og:description"]', safeDescription);
      setMetaContent('meta[property="og:url"]', safeUrl);
      setMetaContent('meta[property="og:image"]', safeImage);
      setMetaContent('meta[property="og:image:secure_url"]', safeImage);
      setMetaContent('meta[property="og:image:alt"]', safeTitle);
      setMetaContent('meta[name="twitter:title"]', safeTitle);
      setMetaContent('meta[name="twitter:description"]', safeDescription);
      setMetaContent('meta[name="twitter:image"]', safeImage);
      setMetaContent('meta[name="twitter:image:alt"]', safeTitle);
      setLinkHref('link[rel="canonical"]', safeUrl);
    }

    function isMissingListingError(error) {
      if (!error) return false;
      const code = String(error.code || "").toUpperCase();
      const message = String(error.message || "").toLowerCase();
      return (
        code === "PGRST116" ||
        message.includes("cannot coerce the result to a single json object") ||
        message.includes("no rows")
      );
    }

    function renderGallery(images) {
      if (!mainMedia || !thumbGrid) return;
      const list = Array.isArray(images) ? images.filter(Boolean) : [];
      currentGalleryImages = list.slice();
      if (list.length === 0) {
        mainMedia.style.display = "";
        mainMedia.innerHTML = `
          <div class="listing-gallery-fallback">
            <img src="img/logo.png" alt="${escapeHtml(t("listing.no_image_alt", "No listing image"))}" loading="eager" />
          </div>
        `;
        thumbGrid.innerHTML = "";
        thumbGrid.style.display = "none";
        return;
      }
      mainMedia.style.display = "";

      const items = list.map((src, index) => ({ src, index }));
      let mainItem = items[0];
      let thumbItems = items.slice(1);

      function renderState() {
        const mainUrl = encodeURI(mainItem.src);
        mainMedia.innerHTML = `<img src="${mainUrl}" alt="${escapeHtml(t("listing.main_image_alt", "Main listing image"))}" loading="eager" data-image-index="${mainItem.index}" style="width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;object-position:center center;display:block;background:#ffffff;" />`;

        thumbGrid.innerHTML = "";
        if (thumbItems.length === 0) {
          thumbGrid.style.display = "none";
          return;
        }
        thumbGrid.style.display = "grid";

        thumbItems.forEach((item, thumbIndex) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "listing-thumb";
          const thumbUrl = encodeURI(item.src);
          button.innerHTML = `<img src="${thumbUrl}" alt="${escapeHtml(formatMessage("listing.thumb_alt", "Thumbnail {index}", { index: thumbIndex + 1 }))}" loading="lazy" />`;
          button.addEventListener("click", () => {
            const previousMain = mainItem;
            mainItem = item;
            thumbItems[thumbIndex] = previousMain;
            renderState();
          });
          thumbGrid.appendChild(button);
        });
      }

      renderState();
    }

    async function fetchRecommendationsCount(userId) {
      if (!userId) return 0;
      try {
        ensureClient();
        const { count, error } = await supabase
          .from("recommendations")
          .select("id", { count: "exact", head: true })
          .eq("user_id", userId);
        if (error) throw error;
        return count || 0;
      } catch (err) {
        console.warn("Failed to load seller recommendations.", err);
        return 0;
      }
    }

    async function fetchReputationStats(userIds) {
      const ids = Array.from(new Set(
        (Array.isArray(userIds) ? userIds : [])
          .map((value) => String(value || "").trim())
          .filter(Boolean),
      ));
      if (ids.length === 0) return new Map();
      const entries = await Promise.all(ids.map(async (userId) => {
        try {
          const [{ data: userRow, error: userError }, { count: recommendationsCount, error: recommendationsError }, { count: profileReportsCount, error: profileReportsError }, { data: userListings, error: listingsError }] = await Promise.all([
            supabase
              .from("users")
              .select("id,phone_verified")
              .eq("id", userId)
              .maybeSingle(),
            supabase
              .from("recommendations")
              .select("id", { count: "exact", head: true })
              .eq("user_id", userId),
            supabase
              .from("reports")
              .select("id", { count: "exact", head: true })
              .eq("target_type", "user")
              .eq("reported_user_id", userId)
              .eq("status", "handled")
              .in("action_taken", ["confirmed_report", "user_banned", "listing_deleted"]),
            supabase
              .from("listings")
              .select("id")
              .eq("user_id", userId),
          ]);
          if (userError) throw userError;
          if (recommendationsError) throw recommendationsError;
          if (profileReportsError) throw profileReportsError;
          if (listingsError) throw listingsError;

          const listingIds = (userListings || []).map((item) => item?.id).filter(Boolean);
          let listingReportsCount = 0;
          if (listingIds.length > 0) {
            const { count, error } = await supabase
              .from("reports")
              .select("id", { count: "exact", head: true })
              .eq("target_type", "listing")
              .eq("status", "handled")
              .in("action_taken", ["confirmed_report", "listing_deleted"])
              .in("listing_id", listingIds);
            if (error) throw error;
            listingReportsCount = Number(count || 0);
          }

          const recommendations = Number(recommendationsCount || 0);
          const reports = Number(profileReportsCount || 0) + listingReportsCount;
          const isVerified = !!userRow?.phone_verified;
          const score = !isVerified
            ? null
            : recommendations + reports === 0
              ? 0
              : Math.round((recommendations / (recommendations + reports)) * 100) / 10;

          return [userId, {
            user_id: userId,
            is_verified: isVerified,
            recommendations_count: recommendations,
            reports_count: reports,
            reputation_score: score,
          }];
        } catch (err) {
          console.warn("Failed to load seller reputation stats.", err);
          return null;
        }
      }));
      return new Map(entries.filter(Boolean));
    }

    async function fetchServerSummary(serverId) {
      if (!serverId) return null;
      try {
        const { data, error } = await supabase
          .from("servers")
          .select("id,name,banner_url")
          .eq("id", serverId)
          .maybeSingle();
        if (error) throw error;
        if (!data) return null;
        return {
          id: data.id,
          name: data.name || "",
          banner_url: data.banner_url ? await resolveImageUrl(data.banner_url) : "",
        };
      } catch (err) {
        console.warn("Failed to load server summary.", err);
        return null;
      }
    }

    async function fetchListing(listingId) {
      try {
        ensureClient();
        const { data, error } = await supabase
          .from("listings")
          .select("id,title,description,images,status,server_id,created_at,user_id,users(id,phone,show_whatsapp_button,show_telegram_button,first_name,last_name,avatar_url,discord_username)")
          .eq("id", listingId)
          .single();
        if (error) {
          if (isMissingListingError(error)) {
            return { listing: null };
          }
          throw error;
        }
        if (data?.images) {
          data.images = await resolveImageUrls(data.images);
        }
        const resolvedAvatarUrl = data?.users?.avatar_url
          ? await resolveImageUrl(data.users.avatar_url)
          : "";
        const phone = data?.users?.phone || null;
        const userShowWhatsapp = !!data?.users?.show_whatsapp_button;
        const userShowTelegram = data?.users?.show_telegram_button !== false;
        const userFirstName = data?.users?.first_name || "seller";
        const userLastName = data?.users?.last_name || "";
        const userAvatarUrl = resolvedAvatarUrl || "";
        const userDiscordUsername = data?.users?.discord_username || "";
        const userProfileId = data?.users?.id || data?.user_id || null;
        const [userRecommendationsCount, reputationMap] = await Promise.all([
          fetchRecommendationsCount(userProfileId),
          fetchReputationStats([userProfileId]),
        ]);
        const userReputation = reputationMap.get(String(userProfileId || "")) || null;
        const serverSummary = await fetchServerSummary(data?.server_id);
        return {
          listing: {
            ...data,
            server_name: serverSummary?.name || "",
            server_banner_url: serverSummary?.banner_url || "",
            user_phone: phone,
            user_show_whatsapp: userShowWhatsapp,
            user_show_telegram: userShowTelegram,
            user_first_name: userFirstName,
            user_last_name: userLastName,
            user_avatar_url: userAvatarUrl,
            user_discord_username: userDiscordUsername,
            user_profile_id: userProfileId,
            user_recommendations_count: userRecommendationsCount,
            user_reputation_score: userReputation?.reputation_score ?? null,
            user_reports_count: Number(userReputation?.reports_count || 0),
            user_is_verified: !!userReputation?.is_verified,
          },
        };
      } catch (err) {
        console.warn("Failed to fetch listing with join, trying fallback.", err);
        const { data, error } = await supabase
          .from("listings")
          .select("id,title,description,images,status,server_id,created_at,user_id")
          .eq("id", listingId)
          .single();
        if (error) {
          if (isMissingListingError(error)) {
            return { listing: null };
          }
          throw error;
        }
        if (data?.images) {
          data.images = await resolveImageUrls(data.images);
        }
        let userPhone = null;
        let userShowWhatsapp = false;
        let userShowTelegram = true;
        let userFirstName = "seller";
        let userLastName = "";
        let userAvatarUrl = "";
        let userDiscordUsername = "";
        let userProfileId = data?.user_id || null;
        if (data?.user_id) {
          const { data: userData } = await supabase
            .from("users")
            .select("id,phone,show_whatsapp_button,show_telegram_button,first_name,last_name,avatar_url,discord_username")
            .eq("id", data.user_id)
            .single();
          userProfileId = userData?.id || userProfileId;
          userPhone = userData?.phone || null;
          userShowWhatsapp = !!userData?.show_whatsapp_button;
          userShowTelegram = userData?.show_telegram_button !== false;
          userFirstName = userData?.first_name || "seller";
          userLastName = userData?.last_name || "";
          userAvatarUrl = userData?.avatar_url
            ? await resolveImageUrl(userData.avatar_url)
            : "";
          userDiscordUsername = userData?.discord_username || "";
        }
        const [userRecommendationsCount, reputationMap] = await Promise.all([
          fetchRecommendationsCount(userProfileId),
          fetchReputationStats([userProfileId]),
        ]);
        const userReputation = reputationMap.get(String(userProfileId || "")) || null;
        const serverSummary = await fetchServerSummary(data?.server_id);
        return {
          listing: {
            ...data,
            server_name: serverSummary?.name || "",
            server_banner_url: serverSummary?.banner_url || "",
            user_phone: userPhone,
            user_show_whatsapp: userShowWhatsapp,
            user_show_telegram: userShowTelegram,
            user_first_name: userFirstName,
            user_last_name: userLastName,
            user_avatar_url: userAvatarUrl,
            user_discord_username: userDiscordUsername || "",
            user_profile_id: userProfileId,
            user_recommendations_count: userRecommendationsCount,
            user_reputation_score: userReputation?.reputation_score ?? null,
            user_reports_count: Number(userReputation?.reports_count || 0),
            user_is_verified: !!userReputation?.is_verified,
          },
        };
      }
    }

    async function init() {
      try {
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        updateAuthUI();
        currentUserProfile = currentUser ? await fetchCurrentUserProfile() : null;

        const params = new URLSearchParams(window.location.search);
        const listingId = params.get("id");
        if (!listingId) {
          setNotFound(t("listing.not_found", "Listing not found."));
          return;
        }
        const result = await fetchListing(listingId);
        if (!result?.listing) {
          setNotFound(t("listing.deleted_or_unavailable", "This listing was deleted or is no longer available."));
          return;
        }
        renderListing(result.listing);
        await waitForInitialVisualAssets();
        markCriticalAssetsReady();
      } catch (err) {
        console.error(err);
        if (isMissingListingError(err)) {
          setNotFound(t("listing.deleted_or_unavailable", "This listing was deleted or is no longer available."));
          return;
        }
        setNotFound(t("listing.deleted_or_unavailable", "This listing was deleted or is no longer available."));
      }
    }

    function isExpectedReportDuplicateError(error) {
      if (!error) return false;
      const code = String(error.code || "").trim();
      const message = String(error.message || "").toLowerCase();
      return code === "23505" || message.includes("pending report") || message.includes("denúncia pendente");
    }

    authBtn?.addEventListener("click", handleAuthClick);
    reportListingBtn?.addEventListener("click", async () => {
      if (!currentUser) {
        redirectToGoogleLogin().catch((err) => {
          console.error(err);
        });
        return;
      }
      hideReportSuccess();
      if (!currentListing) return;
      if (currentListing.user_profile_id && currentUser.id === currentListing.user_profile_id) {
        if (reportListingFeedback) reportListingFeedback.textContent = t("listing.own_report_blocked", "You cannot report your own listing.");
        return;
      }
      if (!currentUserProfile) {
        currentUserProfile = await fetchCurrentUserProfile();
      }
      if (!currentUserProfile?.is_admin && !currentUserProfile?.phone_verified) {
        if (reportListingFeedback) reportListingFeedback.textContent = t("listing.phone_verified_required", "Only users with a verified phone number can submit reports.");
        return;
      }
      if (reportListingForm) {
        const showing = reportListingForm.style.display !== "none";
        reportListingForm.style.display = showing ? "none" : "grid";
        if (!showing && reportListingReason) {
          reportListingReason.focus();
        }
      }
    });
    reportListingCancel?.addEventListener("click", () => {
      if (reportListingForm) reportListingForm.style.display = "none";
      if (reportListingReason) reportListingReason.value = "";
      if (reportListingFeedback) reportListingFeedback.textContent = "";
      if (reportListingFiles) reportListingFiles.value = "";
      updateReportFilesInfo();
    });
    sellerRecommendations?.addEventListener("click", async () => {
      try {
        if (!recommendersTargetUserId) return;
        openRecommendersModal();
        if (!recommendersFetched) {
          recommendersFetched = true;
          await loadMoreRecommenders({ reset: true });
        }
        const shouldShowEmpty = !!recommendersFetched && !recommendersHasMore && (!recommendersList || recommendersList.childElementCount === 0);
        renderRecommendersEmpty(shouldShowEmpty);
      } catch (err) {
        console.error(err);
      }
    });
    shareBtn?.addEventListener("click", () => {
      openShareModal().catch((err) => {
        console.error(err);
        setShareFeedback(t("listing.share_error", "Could not share right now."));
      });
    });
    shareModalClose?.addEventListener("click", () => {
      closeShareModal();
    });
    shareModal?.addEventListener("click", (event) => {
      if (event.target === shareModal) {
        closeShareModal();
      }
    });
    shareCopyBtn?.addEventListener("click", async () => {
      try {
        if (!shareUrl) return;
        await navigator.clipboard.writeText(shareUrl);
        setShareFeedback(t("listing.copy_success", "Link copied."));
      } catch (_err) {
        setShareFeedback(t("listing.copy_auto_error", "Could not copy automatically."));
      }
    });
    shareCopyQrBtn?.addEventListener("click", async () => {
      try {
        if (!shareCardDataUrl) return;
        const blob = await fetch(shareCardDataUrl).then((response) => response.blob());
        if (navigator.clipboard?.write && window.ClipboardItem) {
          await navigator.clipboard.write([
            new window.ClipboardItem({
              [blob.type]: blob,
            }),
          ]);
          setShareFeedback(t("listing.copy_qr_success", "QR copied as an image."));
          return;
        }
        const downloadLink = document.createElement("a");
        downloadLink.href = shareCardDataUrl;
        downloadLink.download = "gimerr-listing-qr.png";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        downloadLink.remove();
        setShareFeedback(t("listing.copy_qr_download", "QR image downloaded."));
      } catch (_err) {
        setShareFeedback(t("listing.copy_qr_error", "Could not copy the QR image automatically."));
      }
    });
    shareNativeBtn?.addEventListener("click", async () => {
      try {
        if (!shareUrl) return;
        if (navigator.share) {
          await navigator.share({
            title: currentListing?.title || t("listing.share_title_native", "Listing on Gimerr"),
            text: t("listing.share_text_native", "Check out this listing on Gimerr:"),
            url: shareUrl,
          });
          setShareFeedback(t("listing.share_success", "Shared successfully."));
          return;
        }
        await navigator.clipboard.writeText(shareUrl);
        setShareFeedback(t("listing.share_copy_fallback", "Link copied. Paste it into the app you want to share to."));
      } catch (_err) {
        setShareFeedback(t("listing.share_error", "Could not share right now."));
      }
    });
    reportListingFiles?.addEventListener("change", updateReportFilesInfo);
    async function handleListingModeration(action = "delete") {
      try {
        if (!currentUser) {
          await redirectToGoogleLogin();
          return;
        }
        if (!currentUserProfile) {
          currentUserProfile = await fetchCurrentUserProfile();
        }
        const isAdminViewer = !!currentUserProfile?.is_admin;
        if (!isAdminViewer && !currentUserProfile?.phone_verified) {
          if (reportListingFeedback) {
            reportListingFeedback.textContent = t("listing.phone_verified_required", "Only users with a verified phone number can submit reports.");
          }
          return;
        }
        hideReportSuccess();
        if (!currentListing?.id) return;
        const reason = String(reportListingReason?.value || "").trim();
        if (reason.length < 10) {
          if (reportListingFeedback) reportListingFeedback.textContent = t("listing.report_min_reason", "Describe the issue using at least 10 characters.");
          return;
        }
        if (isAdminViewer && action === "delete") {
          const confirmed = window.confirm(t("listing.report_delete_confirm", "Delete this listing now? The seller will receive an e-mail."));
          if (!confirmed) return;
        }
        const files = getReportFiles();
        if (reportListingSubmit) reportListingSubmit.disabled = true;
        if (reportListingDelete) reportListingDelete.disabled = true;
        if (reportListingFeedback) reportListingFeedback.textContent = t("listing.report_sending", "Sending report...");
        let evidenceImages = [];
        if (files.length > 0) {
          evidenceImages = await uploadReportEvidence(files, (done, total) => {
            if (reportListingFeedback) {
              reportListingFeedback.textContent = formatMessage("listing.report_uploading_progress", "Uploading attachments {done}/{total}...", { done, total });
            }
          });
        }
        if (reportListingFeedback) reportListingFeedback.textContent = t("listing.report_registering", "Registering report...");
        if (isAdminViewer) {
          await submitAdminListingModeration({
            listingId: currentListing.id,
            reason,
            evidenceImages,
            action,
          });
        } else {
          ensureClient();
          const { error } = await supabase.from("reports").insert({
            reporter_id: currentUser.id,
            target_type: "listing",
            listing_id: currentListing.id,
            reason,
            evidence_images: evidenceImages,
          });
          if (error) {
            if (error.code === "23505") {
              throw new Error(t("listing.report_duplicate", "You already have a pending report for this listing."));
            }
            throw error;
          }
        }
        if (reportListingFeedback) {
          reportListingFeedback.textContent = isAdminViewer
            ? t("listing.report_deleted_admin", "Listing removed and seller notified by e-mail.")
            : t("listing.report_sent", "Report sent for review.");
        }
        showReportSuccess(isAdminViewer
          ? t("listing.report_delete_success_banner", "The listing was removed successfully and the seller was notified.")
          : t("listing.report_success_banner", "Your report was sent successfully. Our team will review the case."));
        if (reportListingReason) reportListingReason.value = "";
        if (reportListingFiles) reportListingFiles.value = "";
        updateReportFilesInfo();
        if (reportListingForm) reportListingForm.style.display = "none";
        if (isAdminViewer && action === "delete") {
          window.location.href = `game.html?id=${encodeURIComponent(currentListing.server_id || "")}`;
          return;
        }
      } catch (err) {
        if (!isExpectedReportDuplicateError(err)) {
          console.error(err);
        }
        if (reportListingFeedback) {
          reportListingFeedback.textContent = err?.message || t("listing.report_send_error", "Error sending report.");
        }
      } finally {
        if (reportListingSubmit) reportListingSubmit.disabled = false;
        if (reportListingDelete) reportListingDelete.disabled = false;
      }
    }
    reportListingSubmit?.addEventListener("click", () => {
      handleListingModeration("report");
    });
    reportListingDelete?.addEventListener("click", () => {
      handleListingModeration("delete");
    });
    avatarBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      userMenu?.classList.toggle("open");
    });
    document.addEventListener("click", (event) => {
      if (!userMenu) return;
      if (!userMenu.contains(event.target)) {
        userMenu.classList.remove("open");
      }
    });
    recommendersWrap?.addEventListener("scroll", () => {
      if (!recommendersWrap || recommendersLoading || !recommendersHasMore) return;
      const threshold = 24;
      const reachedBottom = recommendersWrap.scrollTop + recommendersWrap.clientHeight >= recommendersWrap.scrollHeight - threshold;
      if (reachedBottom) {
        loadMoreRecommenders();
      }
    });
    recommendersModalClose?.addEventListener("click", closeRecommendersModal);
    recommendersModal?.addEventListener("click", (event) => {
      if (event.target === recommendersModal) {
        closeRecommendersModal();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && recommendersModal?.classList.contains("open")) {
        closeRecommendersModal();
        return;
      }
      if (event.key === "Escape" && shareModal?.classList.contains("open")) {
        closeShareModal();
      }
    });
    mainMedia?.addEventListener("click", (event) => {
      const image = event.target.closest("img");
      if (!image || currentGalleryImages.length === 0) return;
      const imageIndex = Number(image.getAttribute("data-image-index") || "0");
      openLightbox(currentGalleryImages, imageIndex);
    });
    logoutBtn?.addEventListener("click", async () => {
      try {
        ensureClient();
        await supabase.auth.signOut();
        currentUser = null;
        updateAuthUI();
      } catch (err) {
        console.error(err);
      }
    });
    function goToCreateListing() {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      window.location.href = "listing-create.html";
    }
    createListingBtn?.addEventListener("click", goToCreateListing);
    menuCreateListing?.addEventListener("click", () => {
      userMenu?.classList.remove("open");
      goToCreateListing();
    });

    init();
  </script>
</body>
</html>
