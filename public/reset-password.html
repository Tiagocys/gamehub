<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <title>Gimerr - Reset password</title>
  <link rel="stylesheet" href="css/global.css" />
  <style id="reset-password-guard-style">html{visibility:hidden;}</style>
  <style>
    .reset-bridge-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top left, rgba(14,165,233,0.12), transparent 30%),
        linear-gradient(180deg, #f8fbff, #eef4fb);
    }

    .reset-bridge-card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .reset-bridge-card img {
      width: 160px;
      height: auto;
      display: block;
    }

    .reset-bridge-feedback {
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 20px;
    }

    .reset-bridge-feedback.is-error {
      color: #b42318;
    }
  </style>
</head>
<body>
  <div id="page-loader" class="page-loader">
    <img src="img/logo.png" alt="Loading" />
  </div>
  <main class="reset-bridge-shell">
    <section class="reset-bridge-card">
      <img src="img/logo.png" alt="Gimerr" />
      <div>
        <h1 id="reset-bridge-title">Validando recuperação</h1>
        <p id="reset-bridge-helper" class="reset-bridge-feedback">Estamos preparando uma sessão segura para você alterar sua senha.</p>
      </div>
      <p id="reset-bridge-feedback" class="reset-bridge-feedback"></p>
    </section>
  </main>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    const env = window.__ENV || {};
    const i18n = window.__I18N__ || { locale: "en", t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";

    const pageLoader = document.getElementById("page-loader");
    const titleEl = document.getElementById("reset-bridge-title");
    const helperEl = document.getElementById("reset-bridge-helper");
    const feedbackEl = document.getElementById("reset-bridge-feedback");

    let supabase;

    function revealPage() {
      document.documentElement.style.visibility = "visible";
      const guard = document.getElementById("reset-password-guard-style");
      if (guard) guard.remove();
      if (pageLoader) {
        pageLoader.classList.add("hidden");
        pageLoader.remove();
      }
    }

    function getClient() {
      if (supabase) return supabase;
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        throw new Error(t("signin.env_error", "Supabase is not configured."));
      }
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storageKey: "gimerr-auth-token",
        },
      });
      return supabase;
    }

    function parseParams(source) {
      const raw = String(source || "").replace(/^#/, "").replace(/^\?/, "");
      return new URLSearchParams(raw);
    }

    function setFeedback(message, isError = false) {
      if (!feedbackEl) return;
      feedbackEl.textContent = message || "";
      feedbackEl.classList.toggle("is-error", !!isError);
    }

    function mapAuthError(err) {
      const message = String(err?.message || "").toLowerCase();
      const status = Number(err?.status || err?.code || 0);
      if (status === 429 || message.includes("rate limit") || message.includes("too many requests") || message.includes("security purposes")) {
        return t("signin.recover_rate_limit", "You recently requested a recovery email. Wait a few minutes before trying again.");
      }
      return t("setings.invalid_recovery_link", "This recovery link is invalid or has expired. Request a new recovery email.");
    }

    async function activateRecoverySession() {
      const client = getClient();
      const search = parseParams(window.location.search);
      const hash = parseParams(window.location.hash);
      const type = search.get("type") || hash.get("type") || search.get("mode") || hash.get("mode") || "";
      const code = search.get("code") || hash.get("code") || "";
      const tokenHash = search.get("token_hash") || hash.get("token_hash") || "";

      if (!code && !tokenHash && type !== "recovery" && type !== "email") {
        throw new Error("invalid_recovery_link");
      }

      if (code) {
        const { error } = await client.auth.exchangeCodeForSession(code);
        if (error) throw error;
      } else if (tokenHash && (type === "recovery" || type === "email")) {
        const { error } = await client.auth.verifyOtp({ token_hash: tokenHash, type: "recovery" });
        if (error) throw error;
      }

      sessionStorage.setItem("gimerr-password-recovery", "1");
      window.location.replace("settings.html?recovery=1");
    }

    document.title = t("reset.title_default", "Gimerr - Reset password");
    document.documentElement.lang = String(i18n.locale || "").startsWith("pt")
      ? "pt-BR"
      : String(i18n.locale || "") === "es"
        ? "es"
        : "en";
    if (titleEl) titleEl.textContent = t("signin.reset_title", "Set a new password");
    if (helperEl) helperEl.textContent = t("reset.validating", "We are validating your recovery link.");

    (async () => {
      try {
        revealPage();
        await activateRecoverySession();
      } catch (err) {
        console.error(err);
        revealPage();
        if (helperEl) helperEl.textContent = t("setings.invalid_recovery_link", "This recovery link is invalid or has expired. Request a new recovery email.");
        setFeedback(mapAuthError(err), true);
      }
    })();
  </script>
</body>
</html>
