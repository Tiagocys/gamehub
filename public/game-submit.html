<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1GK06ZGKW2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-1GK06ZGKW2');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta property="og:image:alt" content="Gimerr" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://gamehub-d35.pages.dev/img/meta.png" />
  <meta name="twitter:image:alt" content="Gimerr" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <title>Gimerr - Submit game</title>
  <link rel="stylesheet" href="css/global.css" />
  <style id="submit-guard-style">html{visibility:hidden;}</style>
</head>
<body>
  <div class="page">
    <site-navbar search-enabled="games"></site-navbar>

    <main class="section">
      <div class="form-card">
        <div>
          <h2 id="game-submit-title">Submit a new game</h2>
          <p id="game-submit-helper" class="helper">Send one request at a time.</p>
        </div>
        <div id="pending-info" class="pill-status" style="display:none;"></div>
        <form id="game-request-form" class="form-vertical">
          <div class="field">
            <label id="game-name-label" for="game-name">Game or server name *</label>
            <input id="game-name" class="input" placeholder="Ex: Miracle 7.4" required />
          </div>
          <div class="field">
            <label id="game-website-label" for="game-website">Official website *</label>
            <input id="game-website" class="input" placeholder="https://miracle74.com" required />
            <span id="website-helper" class="helper"></span>
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <button type="submit" class="btn btn-primary" id="submit-btn">Send request</button>
            <div id="form-feedback" class="helper"></div>
          </div>
        </form>
      </div>
    </main>

  </div>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/site-navbar.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    await (window.__NAVBAR_READY__ || Promise.resolve());

    const env = window.__ENV || {};
    const i18n = window.__I18N__ || { locale: "en", t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";

    const authBtn = document.getElementById("auth-btn");
    const userMenu = document.getElementById("user-menu");
    const avatarBtn = document.getElementById("avatar-btn");
    const avatarImg = document.getElementById("avatar-img");
    const logoutBtn = document.getElementById("logout-btn");
    const createListingBtn = document.getElementById("create-listing-btn");
    const menuCreateListing = document.getElementById("menu-create-listing");
    const profileLink = document.getElementById("profile-link");
    const form = document.getElementById("game-request-form");
    const pendingInfo = document.getElementById("pending-info");
    const feedback = document.getElementById("form-feedback");
    const submitBtn = document.getElementById("submit-btn");
    const websiteInput = document.getElementById("game-website");
    const titleNode = document.getElementById("game-submit-title");
    const helperNode = document.getElementById("game-submit-helper");
    const gameNameLabel = document.getElementById("game-name-label");
    const gameWebsiteLabel = document.getElementById("game-website-label");
    const websiteHelper = document.getElementById("website-helper");
    const WEBSITE_PREFIX_REGEX = /^https:\/\/.+/i;
    function getSubmitDefaultText() {
      return t("game_submit.submit", "Send request");
    }

    let supabase;
    let currentUser = null;
    let currentUserProfile = null;
    let hasPending = null;
    let pageRevealed = false;
    let avatarLoaded = false;
    if (avatarImg) avatarImg.referrerPolicy = "no-referrer";

    function applyStaticTranslations() {
      document.title = t("game_submit.title_default", "Gimerr - Submit game");
      document.documentElement.lang = String(i18n.locale || "").startsWith("pt")
        ? "pt-BR"
        : String(i18n.locale || "") === "es"
          ? "es"
          : "en";
      if (titleNode) titleNode.textContent = t("game_submit.title", "Submit a new game");
      if (helperNode) helperNode.textContent = t("game_submit.helper", "Send one request at a time.");
      if (gameNameLabel) gameNameLabel.textContent = t("game_submit.name_label", "Game or server name *");
      if (document.getElementById("game-name")) document.getElementById("game-name").placeholder = t("game_submit.name_placeholder", "Ex: Miracle 7.4");
      if (gameWebsiteLabel) gameWebsiteLabel.textContent = t("game_submit.website_label", "Official website *");
      if (websiteInput) websiteInput.placeholder = t("game_submit.website_placeholder", "https://miracle74.com");
      if (submitBtn) submitBtn.textContent = getSubmitDefaultText();
    }

    applyStaticTranslations();

    function revealPage() {
      if (pageRevealed) return;
      pageRevealed = true;
      document.documentElement.style.visibility = "visible";
      const guard = document.getElementById("submit-guard-style");
      if (guard) guard.remove();
    }

    function ensureClient() {
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        feedback.textContent = t("game_submit.configure_env", "Configure SUPABASE_URL and SUPABASE_ANON_KEY in public/env.js.");
        if (authBtn) authBtn.disabled = true;
        submitBtn.disabled = true;
        throw new Error(t("game_submit.supabase_not_configured", "Supabase is not configured"));
      }
      if (!supabase) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storageKey: "gimerr-auth-token",
          },
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user || null;
          updateAuthUI();
          if (currentUser) {
            fetchPendingForUser();
            fetchUserProfile();
          } else {
            currentUserProfile = null;
            updateOfficialAdminNote();
          }
        });
      }
      return supabase;
    }

    function updateAuthUI() {
      if (!authBtn) return;
      authBtn.disabled = false;
      if (currentUser) {
        authBtn.style.display = "none";
        if (userMenu) userMenu.style.display = "inline-flex";
        if (profileLink) profileLink.href = `user?id=${encodeURIComponent(currentUser.id)}`;
        if (createListingBtn) createListingBtn.style.display = "inline-flex";
        if (menuCreateListing) menuCreateListing.style.display = "";
        loadUserAvatar();
        return;
      }
      authBtn.style.display = "inline-flex";
      authBtn.innerHTML = `<img src="img/google.svg" alt="" class="btn-google-logo" /> ${t("game_submit.google_login", "Sign in with Google")}`;
      if (userMenu) userMenu.style.display = "none";
      if (profileLink) profileLink.href = "profile.html";
      if (createListingBtn) createListingBtn.style.display = "none";
      if (menuCreateListing) menuCreateListing.style.display = "none";
      avatarLoaded = false;
    }

    async function setAvatarImage(src) {
      if (!avatarImg) return;
      const finalSrc = src || "img/avatar.svg";
      avatarImg.src = finalSrc;
      try {
        await avatarImg.decode();
      } catch (_err) {
        if (finalSrc !== "img/avatar.svg") {
          avatarImg.src = "img/avatar.svg";
          try {
            await avatarImg.decode();
          } catch (_innerErr) {
            // ignore
          }
        }
      }
    }

    async function loadUserAvatar() {
      if (!avatarImg || !currentUser || avatarLoaded) return;
      try {
        ensureClient();
        const { data } = await supabase
          .from("users")
          .select("avatar_url")
          .eq("id", currentUser.id)
          .single();
        let avatar = data?.avatar_url;
        if (!avatar) {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
        }
        await setAvatarImage(avatar);
      } catch (_err) {
        try {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          const avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
          await setAvatarImage(avatar);
        } catch (_innerErr) {
          await setAvatarImage("img/avatar.svg");
        }
      } finally {
        avatarLoaded = true;
      }
    }

    async function handleAuthClick() {
      try {
        ensureClient();
        authBtn.disabled = true;
        await redirectToGoogleOAuth();
      } catch (err) {
        console.error(err);
        feedback.textContent = err?.message || t("game_submit.auth_error", "Authentication error.");
        authBtn.disabled = false;
      }
    }

    async function redirectToGoogleOAuth() {
      window.__OPEN_AUTH_GATEWAY__?.(`${window.location.pathname}${window.location.search || ""}`);
    }

    function ensureHttpsPrefix(raw) {
      const trimmed = (raw || "").trim();
      if (!trimmed) return "";
      const withoutProtocol = trimmed.replace(/^https?:\/\//i, "");
      const withoutWww = withoutProtocol.replace(/^www\./i, "");
      return `https://${withoutWww}`;
    }

    function normalizeWebsite(raw) {
      const withProtocol = ensureHttpsPrefix(raw);
      if (!withProtocol || !WEBSITE_PREFIX_REGEX.test(withProtocol)) return null;
      try {
        const url = new URL(withProtocol);
        url.protocol = "https:";
        url.hash = "";
        const pathname = url.pathname === "/" ? "" : url.pathname.replace(/\/+$/, "");
        const search = url.search || "";
        return `${url.origin}${pathname}${search}`;
      } catch (_err) {
        return null;
      }
    }

    function extractDomainKey(raw) {
      try {
        const url = new URL(ensureHttpsPrefix(raw));
        return url.hostname.toLowerCase();
      } catch (_err) {
        return null;
      }
    }

    function isMissingOwnerColumnError(error) {
      if (!error) return false;
      return String(error.message || "").includes("is_owner");
    }

    function setWebsiteHelper(message) {
      if (!websiteHelper) return;
      websiteHelper.textContent = message || "";
    }

    function handleWebsiteInput() {
      if (!websiteInput) return;
      const value = websiteInput.value.trim();
      if (!value) {
        setWebsiteHelper("");
        return;
      }
      setWebsiteHelper(WEBSITE_PREFIX_REGEX.test(value) ? "" : t("game_submit.website_helper_https", "Add https:// at the beginning of the website."));
    }

    function handleWebsiteBlur() {
      if (!websiteInput) return;
      const formatted = ensureHttpsPrefix(websiteInput.value);
      if (formatted !== websiteInput.value) {
        websiteInput.value = formatted;
      }
      handleWebsiteInput();
    }

    function updateOfficialAdminNote() {}

    async function fetchUserProfile() {
      if (!currentUser) {
        currentUserProfile = null;
        updateOfficialAdminNote();
        return;
      }
      try {
        const { data, error } = await supabase
          .from("users")
          .select("id,phone_verified")
          .eq("id", currentUser.id)
          .single();
        if (error) throw error;
        currentUserProfile = data || null;
      } catch (err) {
        console.warn("Could not load phone status.", err);
        currentUserProfile = null;
      }
      updateOfficialAdminNote();
    }

    async function fetchPendingForUser() {
      if (!currentUser) return;
      try {
        ensureClient();
        const { data, error } = await supabase
          .from("game_requests")
          .select("id,name,website,status")
          .eq("user_id", currentUser.id)
          .in("status", ["pending", "under_review"])
          .limit(1);
        if (error) throw error;
        hasPending = data?.[0] || null;
        renderPending();
      } catch (err) {
        console.error(err);
        feedback.textContent = err?.message || t("game_submit.pending_error", "Error checking requests.");
      }
    }

    function renderPending() {
      if (!pendingInfo) return;
      if (!hasPending) {
        pendingInfo.style.display = "none";
        submitBtn.disabled = false;
        submitBtn.textContent = getSubmitDefaultText();
        return;
      }
      pendingInfo.style.display = "inline-flex";
      pendingInfo.textContent = t("game_submit.pending_info", "You already have a pending request: {name}").replace("{name}", hasPending.name);
      submitBtn.disabled = true;
      submitBtn.textContent = getSubmitDefaultText();
    }

    function goToCreateListing() {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      window.location.href = "listing-create.html";
    }

    async function handleSubmit(event) {
      event.preventDefault();
      feedback.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = t("game_submit.submitting", "Sending...");
      let accessToken = "";

      try {
        ensureClient();
        if (!currentUser) {
          submitBtn.textContent = getSubmitDefaultText();
          await redirectToGoogleOAuth();
          return;
        }
        if (hasPending) {
          feedback.textContent = t("game_submit.already_pending", "You already have a pending request.");
          submitBtn.disabled = false;
          submitBtn.textContent = getSubmitDefaultText();
          return;
        }
        const { data: currentSession } = await supabase.auth.getSession();
        accessToken = currentSession.session?.access_token || "";

        const name = document.getElementById("game-name").value.trim();
        const websiteRaw = document.getElementById("game-website").value.trim();
        const isOwner = false;

        const website = normalizeWebsite(websiteRaw);
        const domainKey = extractDomainKey(website || websiteRaw);
        if (website && websiteInput && websiteInput.value !== website) {
          websiteInput.value = website;
        }
        if (!name || !website) {
          setWebsiteHelper(!website ? t("game_submit.website_helper_invalid", "Use an address that starts with https://.") : "");
          feedback.textContent = t("game_submit.fill_name_site", "Fill in the name and website with https://.");
          submitBtn.disabled = false;
          submitBtn.textContent = getSubmitDefaultText();
          return;
        }

        if (!domainKey) {
          feedback.textContent = t("game_submit.domain_error", "Could not read the website domain. Check the format.");
          submitBtn.disabled = false;
          submitBtn.textContent = getSubmitDefaultText();
          return;
        }

        const { data: requestData, error: requestErr } = await supabase.functions.invoke("game_request_upsert", {
          body: {
            name,
            website,
            is_owner: isOwner,
            userToken: accessToken,
          },
          headers: {
            Authorization: `Bearer ${accessToken}`,
            apikey: SUPABASE_ANON_KEY,
          },
        });
        if (requestErr || !requestData?.ok) {
          const message = requestData?.error || requestErr?.message || t("game_submit.game_exists", "This game is already registered or under review.");
          throw new Error(message);
        }
        feedback.textContent = t("game_submit.success", "Your request will be reviewed. Thanks for helping the Gimerr community.");
        hasPending = { name, website, status: "pending" };
        renderPending();
        form.reset();
        setWebsiteHelper("");
        updateOfficialAdminNote();
      } catch (err) {
        console.error(err);
        feedback.textContent = err?.message || t("game_submit.submit_error", "Error sending request.");
        submitBtn.disabled = false;
        submitBtn.textContent = getSubmitDefaultText();
      }
    }

    async function findWebsiteRecord(website, domainKey) {
      const { data: inServers, error: srvErr } = await supabase
        .from("servers")
        .select("id,official_site,website_domain,status")
        .eq("website_domain", domainKey)
        .limit(1);
      if (srvErr) throw srvErr;

      const { data: inRequests, error: reqErr } = await supabase
        .from("game_requests")
        .select("id,status,website,website_domain")
        .eq("website_domain", domainKey)
        .limit(1);
      if (reqErr) throw reqErr;

      return {
        inServers: Boolean((inServers || []).some((row) => String(row?.status || "") !== "deleted")),
        request: inRequests?.[0] || null
      };
    }

    authBtn?.addEventListener("click", handleAuthClick);
    avatarBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      userMenu?.classList.toggle("open");
    });
    document.addEventListener("click", (event) => {
      if (!userMenu) return;
      if (!userMenu.contains(event.target)) {
        userMenu.classList.remove("open");
      }
    });
    logoutBtn?.addEventListener("click", async () => {
      try {
        ensureClient();
        await supabase.auth.signOut();
        currentUser = null;
        currentUserProfile = null;
        hasPending = null;
        renderPending();
        updateOfficialAdminNote();
        updateAuthUI();
        window.location.replace("index.html");
      } catch (err) {
        console.error(err);
      }
    });
    createListingBtn?.addEventListener("click", goToCreateListing);
    menuCreateListing?.addEventListener("click", () => {
      userMenu?.classList.remove("open");
      goToCreateListing();
    });
    form?.addEventListener("submit", handleSubmit);
    websiteInput?.addEventListener("input", handleWebsiteInput);
    websiteInput?.addEventListener("blur", handleWebsiteBlur);

    (async function init() {
      try {
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        if (!currentUser) {
          await redirectToGoogleOAuth();
          return;
        }
        updateAuthUI();
        await fetchPendingForUser();
        await fetchUserProfile();
        updateOfficialAdminNote();
        revealPage();
      } catch (err) {
        console.error(err);
        feedback.textContent = t("game_submit.init_error", "Error starting page.");
        revealPage();
      }
    })();
  </script>
</body>
</html>
