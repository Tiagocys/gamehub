  <style>
    .game-hero-card {
      padding: 16px 18px;
      gap: 14px;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      min-height: 126px;
    }

    .game-hero-shell,
    .game-toolbar-shell {
      padding-bottom: 0;
    }

    .game-hero-copy {
      display: grid;
      gap: 8px;
    }

    .game-hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px 14px;
    }

    .game-title-block {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .game-hero-copy h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.05;
    }

    .game-site-link {
      width: fit-content;
      color: var(--accent-2);
      font-size: 13px;
      line-height: 1.4;
      text-decoration: none;
      word-break: break-all;
    }

    .game-site-link:hover {
      text-decoration: underline;
    }

    .game-site-link.is-unavailable {
      color: var(--muted);
      pointer-events: none;
      text-decoration: none;
    }

    .game-description {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .game-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .game-follow-btn.is-following {
      background: rgba(14, 165, 233, 0.14);
      border-color: rgba(14, 165, 233, 0.28);
      color: #11506f;
    }

    .game-logo-frame {
      width: 92px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
    }

    #game-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .feed-toolbar {
      margin-top: 10px;
      display: grid;
      gap: 10px;
      width: 100%;
      min-height: 132px;
      align-content: start;
    }

    .section-header {
      display: block;
    }

    .section-header > div {
      width: min(820px, 100%);
      margin-inline: auto;
    }

    .feed-search {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(14, 165, 233, 0.35);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: 0 12px 26px rgba(14, 165, 233, 0.14);
      padding: 12px 14px;
    }

    .feed-search-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1287bc;
      flex: 0 0 auto;
    }

    .feed-search-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .feed-search input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
    }

    .feed-search-meta {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      text-align: center;
    }

    .feed-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .feed-sort {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .feed-filter-btn {
      border: 1px solid var(--border);
      background: rgba(12, 21, 51, 0.04);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.16s ease;
    }

    .feed-filter-btn.active {
      border-color: rgba(27, 79, 211, 0.45);
      background: rgba(27, 79, 211, 0.16);
      color: #18408a;
    }

    .listing-feed {
      margin-top: 18px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    .game-feed-shell {
      position: relative;
      min-height: 220px;
    }

    .feed-loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      border-radius: 12px;
      border: 1px dashed var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(244, 248, 255, 0.98));
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .feed-loading-overlay.open {
      display: flex;
    }

    .feed-loading-overlay img {
      width: 108px;
      height: auto;
      opacity: 0.28;
      animation: feed-logo-pulse 1.2s ease-in-out infinite;
    }

    @keyframes feed-logo-pulse {
      0%, 100% { transform: scale(1); opacity: 0.22; }
      50% { transform: scale(1.04); opacity: 0.36; }
    }

    .listing-feed.is-refreshing {
      opacity: 0.9;
    }

    .feed-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(12, 21, 51, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      height: 100%;
      text-decoration: none;
      color: var(--ink);
    }

    .feed-card.matched {
      border-color: rgba(14, 165, 233, 0.48);
      box-shadow: 0 16px 26px rgba(14, 165, 233, 0.14);
    }

    .feed-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      background: radial-gradient(circle at 20% 20%, rgba(27,79,211,0.08), rgba(15,37,87,0.02));
      display: grid;
      place-items: center;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      align-items: center;
      justify-content: center;
    }

    .feed-highlight-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      background: linear-gradient(120deg, #0ea5e9, #1d4ed8);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 18px rgba(13, 79, 180, 0.3);
    }

    .feed-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .feed-media.feed-media-image {
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
    }

    .feed-media img.feed-media-fallback-logo {
      width: 68%;
      height: 68%;
      object-fit: contain;
      opacity: 0.18;
      filter: grayscale(100%);
      pointer-events: none;
      user-select: none;
    }

    .feed-title {
      font-size: 13px;
      color: var(--ink);
      margin: 0;
      line-height: 1.2;
      font-weight: 700;
      min-height: 30px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .feed-sentinel {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 8px;
    }

    @media (max-width: 860px) {
      .game-hero-card {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .game-hero-head {
        align-items: flex-start;
      }

      .game-logo-frame {
        width: 82px;
        margin-left: 0;
      }

      .feed-search {
        padding: 10px;
      }

      .feed-toolbar {
        min-height: 0;
      }

      .listing-feed {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .feed-media img:not(.feed-media-fallback-logo) {
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
        object-fit: contain !important;
        object-position: center center !important;
        background: #fff;
      }

      .feed-media.feed-media-image {
        background-image: var(--feed-image);
        background-size: contain;
        background-color: #fff;
      }

      .feed-media.feed-media-image img:not(.feed-media-fallback-logo) {
        display: none !important;
      }
    }
  </style>
</head>

  <script src="env.js"></script>
  <script src="i18n/pt-BR.js"></script>
  <script src="i18n/es.js"></script>
  <script src="i18n/en.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/site-navbar.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2.40.0";

    await (window.__NAVBAR_READY__ || Promise.resolve());
    const i18n = window.__I18N__ || { t: (_key, fallback = "") => fallback };
    const t = (key, fallback = "") => i18n.t(key, fallback);
    const formatMessage = (key, fallback, params = {}) => Object.entries(params).reduce(
      (message, [paramKey, value]) => message.replaceAll(`{${paramKey}}`, String(value ?? "")),
      t(key, fallback),
    );

    const env = window.__ENV || {};
    const SUPABASE_URL = env.SUPABASE_URL || "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = env.SUPABASE_ANON_KEY || "YOUR_SUPABASE_ANON_KEY";
    const R2_PUBLIC_URL = env.R2_PUBLIC_URL || "";
    const R2_BUCKET = env.R2_BUCKET || "";

    const authBtn = document.getElementById("auth-btn");
    const userMenu = document.getElementById("user-menu");
    const avatarBtn = document.getElementById("avatar-btn");
    const avatarImg = document.getElementById("avatar-img");
    const logoutBtn = document.getElementById("logout-btn");
    const createListingBtn = document.getElementById("create-listing-btn");
    const menuCreateListing = document.getElementById("menu-create-listing");
    const profileLink = document.getElementById("profile-link");
    const titleEl = document.getElementById("game-title");
    const descriptionEl = document.getElementById("game-description");
    const logoEl = document.getElementById("game-logo");
    const siteLinkEl = document.getElementById("game-site-link");
    const actionsEl = document.getElementById("game-actions");
    const listingSearchInput = document.getElementById("listing-search");
    const listingSearchMeta = document.getElementById("listing-search-meta");
    const listingFeed = document.getElementById("listing-feed");
    const sortFilters = document.getElementById("sort-filters");
    const feedSentinel = document.getElementById("feed-sentinel");
    const listingEmpty = document.getElementById("listing-empty");
    const gameFeedShell = document.getElementById("game-feed-shell");
    const feedLoadingOverlay = document.getElementById("feed-loading-overlay");

    const pageLoader = document.getElementById("page-loader");
    let initialLoaderCompleted = false;
    let transientLoaderCount = 0;
    let windowLoaded = false;
    let avatarReady = false;
    let contentReady = false;

    function hideLoader() {
      if (!pageLoader) return;
      if (!windowLoaded || !avatarReady || !contentReady) return;
      initialLoaderCompleted = true;
      if (transientLoaderCount > 0) {
        pageLoader.classList.remove("hidden");
        return;
      }
      pageLoader.classList.add("hidden");
    }

    function showTransientLoader() {
      if (!pageLoader || !initialLoaderCompleted) return;
      transientLoaderCount += 1;
      pageLoader.classList.remove("hidden");
    }

    function hideTransientLoader() {
      if (!pageLoader || !initialLoaderCompleted) return;
      transientLoaderCount = Math.max(0, transientLoaderCount - 1);
      if (transientLoaderCount === 0) {
        pageLoader.classList.add("hidden");
      }
    }

    function setFeedInlineLoading(isLoading) {
      if (!feedLoadingOverlay || !listingFeed) return;
      if (isLoading) {
        if (gameFeedShell && listingFeed) {
          const currentHeight = Math.max(220, gameFeedShell.offsetHeight || listingFeed.offsetHeight || 0);
          gameFeedShell.style.minHeight = `${currentHeight}px`;
        }
        feedLoadingOverlay.classList.add("open");
        feedLoadingOverlay.setAttribute("aria-hidden", "false");
        listingFeed.style.visibility = "hidden";
        if (feedSentinel) feedSentinel.style.visibility = "hidden";
        if (listingEmpty) listingEmpty.style.visibility = "hidden";
        return;
      }
      listingFeed.style.visibility = "";
      if (feedSentinel) feedSentinel.style.visibility = "";
      if (listingEmpty) listingEmpty.style.visibility = "";
      feedLoadingOverlay.classList.remove("open");
      feedLoadingOverlay.setAttribute("aria-hidden", "true");
      if (gameFeedShell) gameFeedShell.style.minHeight = "";
    }

    function waitForImageWithTimeout(img, timeoutMs = 1600) {
      if (!img) return Promise.resolve();
      if (img.complete) return Promise.resolve();
      return new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve();
        };
        const timer = setTimeout(finish, timeoutMs);
        img.addEventListener("load", finish, { once: true });
        img.addEventListener("error", finish, { once: true });
      });
    }

    async function waitForVisibleFeedCards(maxImages = 16) {
      if (!listingFeed) return;
      const images = Array.from(listingFeed.querySelectorAll(".feed-card img")).slice(0, maxImages);
      if (images.length === 0) return;
      await Promise.all(images.map((img) => waitForImageWithTimeout(img)));
    }

    function markAvatarReady() {
      avatarReady = true;
      hideLoader();
    }

    function markContentReady() {
      contentReady = true;
      hideLoader();
    }

    setTimeout(() => {
      if (!avatarReady) markAvatarReady();
      if (!contentReady) markContentReady();
    }, 5000);

    function markWindowReady() {
      if (windowLoaded) return;
      windowLoaded = true;
      hideLoader();
    }

    document.addEventListener("DOMContentLoaded", markWindowReady, { once: true });
    window.addEventListener("load", markWindowReady, { once: true });
    setTimeout(markWindowReady, 4500);

    let supabase;
    let currentUser = null;
    let currentGame = null;
    let currentGameId = "";
    let currentGameFollowed = false;
    let avatarLoaded = false;
    let allListings = [];
    let orderedListings = [];
    let visibleCount = 0;
    let activeSortFilter = "recent";
    let searchQuery = "";
    let feedObserver = null;
    let gameHighlightImpressionObserver = null;
    let gameHighlightImpressionFlushTimer = null;
    const trackedGameHighlightImpressions = new Map();
    const pendingGameHighlightImpressionIds = new Set();
    let isRenderingBatch = false;
    if (avatarImg) avatarImg.referrerPolicy = "no-referrer";

    document.title = t("game.title_default", "Gimerr - Game");
    if (logoEl) logoEl.alt = t("game.logo_alt", "Game logo");
    if (titleEl) titleEl.textContent = t("game.loading", "Loading...");
    if (listingSearchInput) listingSearchInput.placeholder = t("game.search_placeholder", "What are you looking for?");
    if (feedSentinel) feedSentinel.textContent = t("game.scroll_more", "Scroll to load more");
    if (listingEmpty) listingEmpty.textContent = t("game.empty", "No listings for this game yet.");
    const loadingOverlayImage = feedLoadingOverlay?.querySelector("img");
    if (loadingOverlayImage) loadingOverlayImage.alt = t("game.loading_listings", "Loading listings");

    const CARD_MIN_WIDTH_DESKTOP = 180;
    const CARD_ESTIMATED_HEIGHT = 238;
    const FEED_MIN_BATCH_SIZE = 16;
    const FEED_MAX_BATCH_SIZE = 84;
    let feedPageSize = 24;
    const SORT_OPTIONS = [
      { value: "relevant", label: t("game.sort_relevant", "Most relevant") },
      { value: "recent", label: t("game.sort_recent", "Most recent") },
    ];

    function computeFeedPageSize() {
      const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 1024;
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 800;
      const feedWidth = listingFeed?.clientWidth || viewportWidth;
      const columns = viewportWidth <= 860
        ? 2
        : Math.max(2, Math.floor(feedWidth / CARD_MIN_WIDTH_DESKTOP));
      const reservedHeight = viewportWidth <= 860 ? 360 : 330;
      const usableHeight = Math.max(320, viewportHeight - reservedHeight);
      const visibleRows = Math.max(2, Math.ceil(usableHeight / CARD_ESTIMATED_HEIGHT));
      const preloadRows = 2;
      const computed = columns * (visibleRows + preloadRows);
      return Math.max(FEED_MIN_BATCH_SIZE, Math.min(FEED_MAX_BATCH_SIZE, computed));
    }

    function ensureClient() {
      if (!SUPABASE_URL || SUPABASE_URL.startsWith("YOUR_") || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("YOUR_")) {
        titleEl.textContent = t("game.supabase_not_configured", "Supabase is not configured.");
        if (authBtn) authBtn.disabled = true;
        throw new Error(t("game.supabase_not_configured", "Supabase is not configured."));
      }
      if (!supabase) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storageKey: "gimerr-auth-token",
          },
        });
        supabase.auth.onAuthStateChange((_event, session) => {
          currentUser = session?.user || null;
          updateAuthUI();
        });
      }
      return supabase;
    }

    function updateAuthUI() {
      if (authBtn) authBtn.disabled = false;
      if (currentUser) {
        if (authBtn) authBtn.style.display = "none";
        if (userMenu) userMenu.style.display = "inline-flex";
        if (profileLink) profileLink.href = `user?id=${encodeURIComponent(currentUser.id)}`;
        if (!avatarImg) {
          markAvatarReady();
        } else {
          loadUserAvatar();
        }
        if (createListingBtn) createListingBtn.style.display = "inline-flex";
        if (menuCreateListing) menuCreateListing.style.display = "";
        if (currentGameId) {
          loadFollowState(currentGameId);
        }
        return;
      }
      if (authBtn) authBtn.style.display = "inline-flex";
      if (userMenu) userMenu.style.display = "none";
      if (profileLink) profileLink.href = "profile.html";
      if (createListingBtn) createListingBtn.style.display = "none";
      if (menuCreateListing) menuCreateListing.style.display = "none";
      currentGameFollowed = false;
      renderGameActions(currentGame);
      avatarLoaded = false;
      markAvatarReady();
    }

    async function setAvatarImage(src) {
      if (!avatarImg) return;
      const finalSrc = src || "img/avatar.svg";
      avatarImg.src = finalSrc;
      try {
        await avatarImg.decode();
      } catch (_err) {
        if (finalSrc !== "img/avatar.svg") {
          avatarImg.src = "img/avatar.svg";
          try {
            await avatarImg.decode();
          } catch (_innerErr) {
            // ignore
          }
        }
      } finally {
        markAvatarReady();
      }
    }

    async function loadUserAvatar() {
      if (!currentUser || avatarLoaded) return;
      if (!avatarImg) {
        markAvatarReady();
        return;
      }
      try {
        ensureClient();
        const { data } = await supabase
          .from("users")
          .select("avatar_url")
          .eq("id", currentUser.id)
          .single();
        let avatar = data?.avatar_url;
        if (!avatar) {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
        }
        await setAvatarImage(avatar);
      } catch (_err) {
        try {
          const { data: authData } = await supabase.auth.getUser();
          const meta = authData?.user?.user_metadata || {};
          const avatar = meta.avatar_url || meta.picture || currentUser.user_metadata?.avatar_url || currentUser.user_metadata?.picture;
          await setAvatarImage(avatar);
        } catch (_innerErr) {
          await setAvatarImage("img/avatar.svg");
        }
      } finally {
        avatarLoaded = true;
      }
    }

    async function handleAuthClick() {
      try {
        await redirectToGoogleAuth();
      } catch (err) {
        console.error(err);
        if (authBtn) authBtn.disabled = false;
      }
    }

    async function redirectToGoogleAuth(targetPath = null) {
      if (authBtn) authBtn.disabled = true;
      const normalizedPath = targetPath
        ? (String(targetPath).startsWith("/") ? String(targetPath) : `/${String(targetPath)}`)
        : `${window.location.pathname}${window.location.search || ""}`;
      window.__OPEN_AUTH_GATEWAY__?.(normalizedPath);
    }

    function parseStoragePath(urlString) {
      try {
        const url = new URL(urlString);
        const marker = "/storage/v1/object/";
        const idx = url.pathname.indexOf(marker);
        if (idx === -1) return null;
        const rest = url.pathname.substring(idx + marker.length);
        const parts = rest.split("/");
        if (parts.length === 0) return null;
        let bucket = parts[0];
        let pathParts = parts.slice(1);
        if (bucket === "public" || bucket === "authenticated" || bucket === "sign") {
          bucket = parts[1];
          pathParts = parts.slice(2);
        }
        if (!bucket || pathParts.length === 0) return null;
        return { bucket, path: pathParts.join("/") };
      } catch (_err) {
        return null;
      }
    }

    function normalizeR2PublicUrl(urlString) {
      try {
        const url = new URL(urlString);
        if (R2_PUBLIC_URL) {
          const publicHost = new URL(R2_PUBLIC_URL).host;
          if (url.hostname.endsWith(".r2.dev") && url.hostname !== publicHost) {
            return `${R2_PUBLIC_URL.replace(/\/$/, "")}${url.pathname}`;
          }
        }
        if (!url.hostname.endsWith(".r2.cloudflarestorage.com")) return urlString;
        const parts = url.pathname.split("/").filter(Boolean);
        if (parts.length === 0) return urlString;
        const accountId = url.hostname.split(".")[0];
        let bucket = R2_BUCKET;
        let keyParts = parts;
        if (bucket) {
          if (parts[0] === bucket) {
            keyParts = parts.slice(1);
          }
        } else {
          bucket = parts[0];
          keyParts = parts.slice(1);
        }
        if (!bucket || keyParts.length === 0) return urlString;
        const base = R2_PUBLIC_URL ? R2_PUBLIC_URL.replace(/\/$/, "") : `https://${bucket}.${accountId}.r2.dev`;
        return `${base}/${keyParts.join("/")}`;
      } catch (_err) {
        return urlString;
      }
    }

    async function resolveImageUrl(urlString) {
      if (!urlString) return urlString;
      const normalized = normalizeR2PublicUrl(urlString);
      if (!normalized.includes(SUPABASE_URL) || !normalized.includes("/storage/v1/object/")) {
        return normalized;
      }
      const parsed = parseStoragePath(normalized);
      if (!parsed) return normalized;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || normalized;
      } catch (err) {
        console.warn(t("game.feed_signing_warning", "Failed to sign listing image"), err);
        return normalized;
      }
    }

    async function getSignedCoverUrl(urlString) {
      const parsed = parseStoragePath(urlString);
      if (!parsed) return urlString;
      try {
        ensureClient();
        const { data, error } = await supabase.storage
          .from(parsed.bucket)
          .createSignedUrl(parsed.path, 60 * 60 * 6);
        if (error) throw error;
        return data?.signedUrl || urlString;
      } catch (err) {
        console.warn(t("game.cover_signing_warning", "Failed to sign cover image"), err);
        return urlString;
      }
    }

    async function fetchGameById(id) {
      try {
        ensureClient();
        const { data, error } = await supabase
          .from("servers")
          .select("id,name,official_site,banner_url,description")
          .eq("id", id)
          .single();
        if (error) throw error;
        return data ? {
          id: data.id,
          name: data.name,
          website: data.official_site,
          cover_url: data.banner_url,
          description: data.description,
        } : null;
      } catch (err) {
        console.warn(t("game.servers_fallback_warning", "Failed to fetch from servers, trying games."), err);
        const { data, error } = await supabase
          .from("games")
          .select("id,name,website,cover_url")
          .eq("id", id)
          .single();
        if (error) throw error;
        return data ? {
          id: data.id,
          name: data.name,
          website: data.website,
          cover_url: data.cover_url,
          description: null,
        } : null;
      }
    }

    function renderGameActions(game) {
      if (!actionsEl) return;
      const followMarkup = `
        <button
          id="game-follow-btn"
          class="btn btn-ghost game-follow-btn${currentGameFollowed ? " is-following" : ""}"
          type="button">
          ${currentGameFollowed ? t("game.following", "Following") : t("game.follow_game", "Follow game")}
        </button>
      `;
      actionsEl.innerHTML = followMarkup;
    }

    function renderGame(game) {
      if (!game) {
        titleEl.textContent = t("game.not_found", "Game not found.");
        logoEl.style.display = "none";
        if (siteLinkEl) siteLinkEl.style.display = "none";
        if (descriptionEl) descriptionEl.style.display = "none";
        if (actionsEl) actionsEl.innerHTML = "";
        return;
      }
      document.title = `${game.name} | Gimerr`;
      titleEl.textContent = game.name;
      if (siteLinkEl) {
        if (game.website) {
          siteLinkEl.href = game.website;
          siteLinkEl.textContent = game.website;
          siteLinkEl.style.display = "inline-flex";
          siteLinkEl.classList.remove("is-unavailable");
        } else {
          siteLinkEl.removeAttribute("href");
          siteLinkEl.textContent = t("game.site_unavailable", "Official site unavailable");
          siteLinkEl.style.display = "inline-flex";
          siteLinkEl.classList.add("is-unavailable");
        }
      }
      if (descriptionEl) {
        const text = String(game.description || "").trim();
        if (text) {
          descriptionEl.textContent = text;
          descriptionEl.style.display = "block";
        } else {
          descriptionEl.textContent = "";
          descriptionEl.style.display = "none";
        }
      }
      if (game.cover_url) {
        logoEl.src = game.cover_url;
        logoEl.style.display = "block";
      } else {
        logoEl.style.display = "none";
      }
      renderGameActions(game);
    }

    async function loadFollowState(gameId) {
      currentGameFollowed = false;
      if (!currentUser || !gameId) {
        renderGameActions(currentGame);
        return;
      }
      try {
        ensureClient();
        const { data, error } = await supabase
          .from("server_follows")
          .select("id")
          .eq("user_id", currentUser.id)
          .eq("server_id", gameId)
          .maybeSingle();
        if (error && error.code !== "PGRST116") throw error;
        currentGameFollowed = Boolean(data?.id);
      } catch (err) {
        console.error(err);
        currentGameFollowed = false;
      } finally {
        renderGameActions(currentGame);
      }
    }

    async function toggleFollowGame() {
      if (!currentGameId) return;
      if (!currentUser) {
        await redirectToGoogleAuth(`${window.location.pathname}${window.location.search || ""}`);
        return;
      }
      const followBtn = document.getElementById("game-follow-btn");
      const nextState = !currentGameFollowed;
      try {
        if (followBtn) {
          followBtn.disabled = true;
          followBtn.textContent = nextState ? t("game.following_progress", "Following...") : t("game.unfollowing_progress", "Removing...");
        }
        ensureClient();
        if (nextState) {
          const { error } = await supabase
            .from("server_follows")
            .insert({ user_id: currentUser.id, server_id: currentGameId });
          if (error) throw error;
        } else {
          const { error } = await supabase
            .from("server_follows")
            .delete()
            .eq("user_id", currentUser.id)
            .eq("server_id", currentGameId);
          if (error) throw error;
        }
        currentGameFollowed = nextState;
      } catch (err) {
        console.error(err);
      } finally {
        renderGameActions(currentGame);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function isHighlightActive(listing) {
      return Boolean(listing && listing.highlight_status === "active");
    }

    function getListingRelevanceScore(listing) {
      return Number(listing?.user_recommendations_count || 0);
    }

    function listingMatchesQuery(listing, query) {
      const normalizedQuery = String(query || "").trim().toLowerCase();
      if (!normalizedQuery) return true;
      const haystack = `${listing?.title || ""} ${listing?.description || ""}`.toLowerCase();
      return haystack.includes(normalizedQuery);
    }

    function getCardImageUrl(listing) {
      const list = Array.isArray(listing?.images) ? listing.images : [];
      return list.find(Boolean) || "";
    }

    function waitForImageElement(img, timeoutMs = 1800) {
      if (!img) return Promise.resolve();
      const src = img.getAttribute("src");
      if (!src) return Promise.resolve();
      if (img.complete) return Promise.resolve();
      return new Promise((resolve) => {
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          clearTimeout(timer);
          resolve();
        };
        const timer = setTimeout(finish, timeoutMs);
        img.addEventListener("load", finish, { once: true });
        img.addEventListener("error", finish, { once: true });
      });
    }

    async function waitForCriticalVisuals() {
      const criticalImages = Array.from(
        document.querySelectorAll("#game-logo, #listing-feed .feed-card:nth-child(-n+2) img"),
      );
      await Promise.all(criticalImages.map((img) => waitForImageElement(img)));
    }

    function compareListingBySort(a, b) {
      if (activeSortFilter === "relevant") {
        const relevanceDiff = getListingRelevanceScore(b) - getListingRelevanceScore(a);
        if (relevanceDiff !== 0) return relevanceDiff;
      }
      return new Date(b.created_at).getTime() - new Date(a.created_at).getTime();
    }

    function buildOrderedFeed(list) {
      if (!Array.isArray(list) || list.length === 0) return [];
      const highlighted = [];
      const normal = [];

      list.forEach((item) => {
        if (isHighlightActive(item)) {
          highlighted.push(item);
        } else {
          normal.push(item);
        }
      });

      for (let i = highlighted.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [highlighted[i], highlighted[j]] = [highlighted[j], highlighted[i]];
      }

      normal.sort(compareListingBySort);

      const merged = [];
      const maxLen = Math.max(highlighted.length, normal.length);
      for (let i = 0; i < maxLen; i += 1) {
        if (highlighted[i]) merged.push(highlighted[i]);
        if (normal[i]) merged.push(normal[i]);
      }

      return merged;
    }

    function renderSortFilters() {
      if (!sortFilters) return;
      sortFilters.innerHTML = SORT_OPTIONS
        .map((option) => `
          <button
            type="button"
            class="feed-filter-btn${activeSortFilter === option.value ? " active" : ""}"
            data-sort="${option.value}">
            ${option.label}
          </button>
        `)
        .join("");
    }

    async function attachRecommendationsScore(listings) {
      const items = Array.isArray(listings) ? listings : [];
      const userIds = Array.from(new Set(
        items
          .map((item) => String(item?.user_id || "").trim())
          .filter(Boolean),
      ));
      if (userIds.length === 0) {
        return items.map((item) => ({ ...item, user_recommendations_count: 0 }));
      }

      const scoreMap = new Map();
      await Promise.all(userIds.map(async (userId) => {
        try {
          const { count, error } = await supabase
            .from("recommendations")
            .select("id", { count: "exact", head: true })
            .eq("user_id", userId);
          if (error) throw error;
          scoreMap.set(userId, Number(count || 0));
        } catch (_err) {
          scoreMap.set(userId, 0);
        }
      }));

      return items.map((item) => ({
        ...item,
        user_recommendations_count: scoreMap.get(String(item?.user_id || "").trim()) || 0,
      }));
    }

    async function ensureCardImageResolved(listing) {
      const rawImage = getCardImageUrl(listing);
      if (!rawImage) {
        listing._cardImageSource = "";
        listing.cardImage = "";
        return listing;
      }

      if (listing._cardImageSource === rawImage && typeof listing.cardImage === "string") {
        return listing;
      }

      const resolvedImage = await resolveImageUrl(rawImage);
      listing._cardImageSource = rawImage;
      listing.cardImage = resolvedImage || "";
      return listing;
    }

    function createListingCard(listing) {
      const card = document.createElement("a");
      card.className = "feed-card";
      card.href = `listing.html?id=${encodeURIComponent(listing.id)}`;
      card.dataset.listingId = String(listing.id || "");
      if (isHighlightActive(listing)) {
        card.dataset.highlightTrack = "1";
      }
      const matched = listingMatchesQuery(listing, searchQuery);
      card.classList.toggle("matched", matched && String(searchQuery || "").trim().length > 0);
      const highlightBadge = isHighlightActive(listing)
        ? `<span class="feed-highlight-badge">${escapeHtml(t("game.highlight_badge", "Featured"))}</span>`
        : "";
      const cardImageUrl = listing.cardImage ? encodeURI(listing.cardImage).replace(/'/g, "%27") : "";
      const media = listing.cardImage
        ? `<div class="feed-media feed-media-image" style="--feed-image:url('${cardImageUrl}');">${highlightBadge}<img src="${cardImageUrl}" alt="${escapeHtml(formatMessage("game.listing_image_alt", "Listing image {title}", { title: listing.title || t("game.listing_title_fallback", "Listing") }))}" loading="lazy" /></div>`
        : `<div class="feed-media empty">${highlightBadge}<img src="img/logo.png" alt="" class="feed-media-fallback-logo" loading="lazy" /></div>`;
      card.innerHTML = `
        ${media}
        <h3 class="feed-title">${escapeHtml(listing.title || t("game.listing_title_fallback", "Listing"))}</h3>
      `;
      return card;
    }

    function queueGameHighlightImpression(listingId) {
      const normalizedId = String(listingId || "").trim();
      if (!normalizedId) return;
      pendingGameHighlightImpressionIds.add(normalizedId);
      if (gameHighlightImpressionFlushTimer) return;
      gameHighlightImpressionFlushTimer = window.setTimeout(async () => {
        const ids = Array.from(pendingGameHighlightImpressionIds);
        pendingGameHighlightImpressionIds.clear();
        gameHighlightImpressionFlushTimer = null;
        if (ids.length === 0) return;
        try {
          ensureClient();
          await supabase.functions.invoke("listing_highlight_impression", {
            body: { listingIds: ids },
          });
        } catch (err) {
          console.error(err);
        }
      }, 800);
    }

    function observeGameHighlightImpressions() {
      if (gameHighlightImpressionObserver) {
        gameHighlightImpressionObserver.disconnect();
        gameHighlightImpressionObserver = null;
      }
      if (!listingFeed) return;
      const cards = [...listingFeed.querySelectorAll(".feed-card[data-highlight-track='1']")];
      if (cards.length === 0) return;
      gameHighlightImpressionObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting || entry.intersectionRatio < 0.65) return;
          const listingId = entry.target?.dataset?.listingId;
          if (!listingId) return;
          const now = Date.now();
          const lastTrackedAt = Number(trackedGameHighlightImpressions.get(listingId) || 0);
          if (now - lastTrackedAt < 30000) return;
          trackedGameHighlightImpressions.set(listingId, now);
          queueGameHighlightImpression(listingId);
        });
      }, {
        root: null,
        threshold: [0.65],
      });
      cards.forEach((card) => gameHighlightImpressionObserver.observe(card));
    }

    function updateFeedState() {
      if (!listingEmpty || !feedSentinel) return;
      if (orderedListings.length === 0) {
        listingEmpty.style.display = "block";
        listingEmpty.textContent = String(searchQuery || "").trim()
          ? formatMessage("game.empty_search", "No listings found for \"{query}\".", { query: searchQuery.trim() })
          : t("game.empty", "No listings for this game yet.");
        feedSentinel.style.display = "none";
        return;
      }
      listingEmpty.style.display = "none";
      feedSentinel.style.display = "block";
      if (visibleCount >= orderedListings.length) {
        feedSentinel.textContent = t("game.end_of_listings", "End of listings.");
      } else {
        feedSentinel.textContent = t("game.scroll_more", "Scroll to load more");
      }
    }

    function updateSearchMeta(total) {
      if (!listingSearchMeta) return;
      const normalizedQuery = String(searchQuery || "").trim();
      if (!normalizedQuery) {
        listingSearchMeta.textContent = formatMessage("game.loaded_count", "{count} listing(s) loaded.", { count: total });
        return;
      }
      listingSearchMeta.textContent = formatMessage("game.search_results_count", "{count} result(s) for \"{query}\".", {
        count: total,
        query: normalizedQuery,
      });
    }

    async function renderNextBatch() {
      if (isRenderingBatch || !listingFeed) return;
      if (visibleCount >= orderedListings.length) {
        updateFeedState();
        return;
      }

      isRenderingBatch = true;
      try {
        const batch = orderedListings.slice(visibleCount, visibleCount + feedPageSize);
        await Promise.all(batch.map((item) => ensureCardImageResolved(item)));
        const fragment = document.createDocumentFragment();
        batch.forEach((item) => {
          fragment.appendChild(createListingCard(item));
        });
        listingFeed.appendChild(fragment);
        observeGameHighlightImpressions();
        visibleCount += batch.length;
        updateFeedState();
      } finally {
        isRenderingBatch = false;
      }
    }

    async function resetFeed() {
      if (!listingFeed) return;
      visibleCount = 0;
      if (orderedListings.length === 0) {
        listingFeed.innerHTML = "";
        updateFeedState();
        return;
      }

      const initialBatch = orderedListings.slice(0, feedPageSize);
      listingFeed.classList.add("is-refreshing");
      try {
        await Promise.all(initialBatch.map((item) => ensureCardImageResolved(item)));
        const fragment = document.createDocumentFragment();
        initialBatch.forEach((item) => {
          fragment.appendChild(createListingCard(item));
        });
        listingFeed.innerHTML = "";
        listingFeed.appendChild(fragment);
        observeGameHighlightImpressions();
        visibleCount = initialBatch.length;
        updateFeedState();
        await fillFeedUntilTarget();
      } finally {
        listingFeed.classList.remove("is-refreshing");
      }
    }

    async function fillFeedUntilTarget() {
      while (visibleCount < feedPageSize && visibleCount < orderedListings.length) {
        await renderNextBatch();
      }
    }

    function setupFeedObserver() {
      if (!feedSentinel) return;
      if (feedObserver) feedObserver.disconnect();
      feedObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            renderNextBatch();
          }
        });
      }, {
        root: null,
        rootMargin: "280px 0px 280px 0px",
        threshold: 0.01,
      });
      feedObserver.observe(feedSentinel);
    }

    async function refreshFeed(options = {}) {
      const withLoader = Boolean(options?.withLoader);
      const withInlineLoader = Boolean(options?.inlineLoader);
      if (withLoader) {
        showTransientLoader();
        await new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }
      if (withInlineLoader) {
        setFeedInlineLoading(true);
        await new Promise((resolve) => requestAnimationFrame(() => resolve()));
      }
      try {
        feedPageSize = computeFeedPageSize();
        const filtered = String(searchQuery || "").trim()
          ? allListings.filter((item) => listingMatchesQuery(item, searchQuery))
          : allListings;
        orderedListings = buildOrderedFeed(filtered);
        updateSearchMeta(filtered.length);
        renderSortFilters();
        await resetFeed();
      } finally {
        if (withInlineLoader) {
          await waitForVisibleFeedCards();
          setFeedInlineLoading(false);
        }
        if (withLoader) {
          hideTransientLoader();
        }
      }
    }

    async function fetchListings(gameId) {
      try {
        ensureClient();
        const { data, error } = await supabase
          .from("listings")
          .select("id,title,description,images,status,server_id,user_id,created_at,highlight_status,highlight_expires_at")
          .eq("server_id", gameId)
          .eq("status", "active")
          .order("created_at", { ascending: false });
        if (error) throw error;
        allListings = await attachRecommendationsScore(data || []);
        await refreshFeed();
      } catch (err) {
        console.error(err);
        allListings = [];
        orderedListings = [];
        if (listingFeed) listingFeed.innerHTML = "";
        if (listingEmpty) {
          listingEmpty.style.display = "block";
          listingEmpty.textContent = err?.message || t("game.loading_listings_error", "Error loading listings.");
        }
        if (feedSentinel) feedSentinel.style.display = "none";
        setFeedInlineLoading(false);
      }
    }

    async function init() {
      try {
        ensureClient();
        const { data } = await supabase.auth.getSession();
        currentUser = data.session?.user || null;
        updateAuthUI();
        const params = new URLSearchParams(window.location.search);
        currentGameId = params.get("id") || "";
        if (!currentGameId) {
          titleEl.textContent = t("game.not_found", "Game not found.");
          logoEl.style.display = "none";
          return;
        }
        const game = await fetchGameById(currentGameId);
        if (game?.cover_url) {
          game.cover_url = await getSignedCoverUrl(game.cover_url);
        }
        currentGame = game;
        renderGame(game);
        await loadFollowState(currentGameId);
        setupFeedObserver();
        await fetchListings(currentGameId);
      } catch (err) {
        console.error(err);
        titleEl.textContent = t("game.loading_error", "Error loading game.");
        if (listingSearchMeta) {
          listingSearchMeta.textContent = err?.message || t("game.try_again", "Try again.");
        }
      } finally {
        try {
          await waitForCriticalVisuals();
        } catch (_err) {
          // ignore image wait errors
        }
        markContentReady();
      }
    }

    authBtn?.addEventListener("click", handleAuthClick);
    avatarBtn?.addEventListener("click", (event) => {
      event.stopPropagation();
      userMenu?.classList.toggle("open");
    });
    document.addEventListener("click", (event) => {
      if (!userMenu) return;
      if (!userMenu.contains(event.target)) {
        userMenu.classList.remove("open");
      }
    });
    sortFilters?.addEventListener("click", (event) => {
      const button = event.target.closest(".feed-filter-btn[data-sort]");
      if (!button) return;
      const sort = button.getAttribute("data-sort") || "recent";
      if (sort === activeSortFilter) return;
      activeSortFilter = sort;
      refreshFeed({ inlineLoader: true });
    });
    listingSearchInput?.addEventListener("input", () => {
      searchQuery = listingSearchInput.value || "";
      refreshFeed();
    });
    window.addEventListener("resize", () => {
      const nextSize = computeFeedPageSize();
      if (nextSize === feedPageSize) return;
      feedPageSize = nextSize;
      if (visibleCount < feedPageSize && visibleCount < orderedListings.length) {
        fillFeedUntilTarget();
      }
    });
    logoutBtn?.addEventListener("click", async () => {
      try {
        ensureClient();
        await supabase.auth.signOut();
        currentUser = null;
        updateAuthUI();
      } catch (err) {
        console.error(err);
      }
    });
    function goToCreateListing() {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }
      window.location.href = "listing-create.html";
    }
    createListingBtn?.addEventListener("click", goToCreateListing);
    menuCreateListing?.addEventListener("click", () => {
      userMenu?.classList.remove("open");
      goToCreateListing();
    });
    actionsEl?.addEventListener("click", (event) => {
      const followBtn = event.target.closest("#game-follow-btn");
      if (!followBtn) return;
      toggleFollowGame();
    });
    init();
  </script>
